.base-applinth-admin-ui:
  variables:
    DIR: applinth-admin-ui
    IMAGE: ${REGISTRY}/${IMAGE_PREFIX}applinth-admin-ui

applinth-admin-ui:test:
  stage: test
  extends:
    - .base-test
    - .base-applinth-admin-ui

applinth-admin-ui:build:
  stage: build
  variables:
    MAKE_TARGET: rebuild
  needs:
    - job: applinth-admin-ui:test
      optional: false
  extends:
    - .base-dind-build
    - .base-applinth-admin-ui
