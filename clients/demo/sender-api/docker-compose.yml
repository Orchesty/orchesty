---

version: '2'

services:
  notification-sender-api:
    image: dkr.hanaboso.net/pipes/pipes/php-dev:dev
    user: ${DEV_UID}:${DEV_GID}
    working_dir: /var/www/pipes/clients/demo/sender-api
    environment:
      DEV_UID: ${DEV_UID}
      DEV_GID: ${DEV_GID}
    volumes:
      - ../../../:/var/www/pipes
      - ${SSH_AUTH_SOCK}:/tmp/bound-ssh-agent
      - ${HOME}/.composer:/srv/.composer

  mongo:
    image: mongo:latest
    environment:
      - MONGO_DATA_DIR=/data/db
    ports:
      - ${DEV_IP}:27017:27017
    volumes:
      - mongodb:/data/db

volumes:
  mongodb: {}
