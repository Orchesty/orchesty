    multi-probe:
        image: dkr.hanaboso.net/pipes/pipes/multi-probe:master
        ports:
            - ${DEV_IP}:8007:8007

    multi-counter:
        image: dkr.hanaboso.net/pipes/pipes/pf-bridge:master
        environment:
            # NODE_ENV: debug
            METRICS_HOST: kapacitor
            METRICS_PORT: 9100
            METRICS_SERVICE: influx
            PROGRESS_DSN: mongodb://mongo/demo
            PROGRESS_SAVE: 'true'
        command: './dist/src/bin/pipes.js start multi_counter'
        ports:
            - ${DEV_IP}:8005:8005

    repeater:
        image: dkr.hanaboso.net/pipes/pipes/pf-bridge:master
        environment:
            MONGO_HOST: mongo
            REPEATER_CHECK_TIMEOUT: 5000
        command: './dist/src/bin/pipes.js start repeater'

    ## BEGIN DEV
    starting-point:
        image: hanabosocom/go-base:dev
        user: ${DEV_UID}:${DEV_GID}
        environment:
            DEV_UID: ${DEV_UID}
            DEV_GID: ${DEV_GID}
            APP_DEBUG: 'true'
            MONGO_DSN: mongodb://mongo/demo?connectTimeoutMS=2500&serverSelectionTimeoutMS=2500&socketTimeoutMS=2500&heartbeatFrequencyMS=2500
            METRICS_DSN: influxdb://kapacitor:9100
            #METRICS_DSN: mongodb://mongo/metrics?connectTimeoutMS=2500&serverSelectionTimeoutMS=2500&socketTimeoutMS=2500&heartbeatFrequencyMS=2500
            RABBIT_COUNTER_QUEUE_DURABLE: 'true'
            RABBIT_QUEUE_DURABLE: 'true'
            RABBIT_DELIVERY_MODE: 2
            APP_CLEANUP_TIME: 300
            GOROUTINE_LIMIT: 1000
        volumes:
            - ./../../starting-point/:/app
        ports:
            - ${DEV_IP}:82:8080
        command: go run cmd/starting-point.go
    ## END DEV
    ## BEGIN STAGE
    #starting-point:
    #  image: dkr.hanaboso.net/pipes/pipes/starting-point:master
    #  environment:
    #    MONGO_DSN: mongodb://mongo/demo?connectTimeoutMS=2500&serverSelectionTimeoutMS=2500&socketTimeoutMS=2500&heartbeatFrequencyMS=2500
