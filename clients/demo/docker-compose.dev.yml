---

version: '2'

services:
    # Nodes

    # Services
    pipes-api:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:dev
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www/pipes/clients/demo/pipes-api
        environment:
          DEV_UID: ${DEV_UID}
          DEV_GID: ${DEV_GID}
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/ssh-agent
        depends_on:
          - mongo
          - rabbitmq

    xml-parser:
        image: 'dkr.hanaboso.net/pipes/pipes/python-xml-parser:prod'
        environment:
          PARSER_HOST: xml-parser
          PARSER_PORT: '80'
          PARSER_RELOADED: '1'
          METRICS_HOST: metrics
          METRICS_PORT: '5555'
        ports:
          - ${DEV_IP}:8080:80

    # Backend
    app:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:dev
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www/pipes/clients/demo/pipes-api
        environment:
          DEV_UID: ${DEV_UID}
          DEV_GID: ${DEV_GID}
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/ssh-agent
        depends_on:
          - mongo
          - rabbitmq

    # Frontend
    frontend:
        image: dkr.hanaboso.net/pipes/pipes/nodejs-build:dev
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www/pipes/frontend
        environment:
          DEV_UID: ${DEV_UID}
          DEV_GID: ${DEV_GID}
          PHP_WEBROOT: /var/www/pipes/clients/demo/pipes-api/web
        ports:
          - ${DEV_IP}:80:80
          #- ${DEV_IP}:81:8080
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/ssh-agent
        depends_on:
          - app
        #command: bash -c "npm install && npm start"

    # RabbitMQ
    rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - ${DEV_IP}:15672:15672
        volumes:
          - ./.docker-volumes/rabbitmq:/var/lib/rabbitmq

    # Storage
    mongo:
        image: mongo:3.4
        ports:
          - ${DEV_IP}:27017:27017
        volumes:
          - ./.docker-volumes/mongodb:/data/db

    # ELK
    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:5.6.0
        ports:
          - ${DEV_IP}:9200:9200
        volumes:
          - elasticsearch:/usr/share/elasticsearch/data

    kibana:
        image: docker.elastic.co/kibana/kibana:5.6.0
        ports:
          - ${DEV_IP}:5601:5601

    logstash:
        image: docker.elastic.co/logstash/logstash:5.6.0
        volumes:
          - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf

    # Metrics
    grafana:
        image: grafana/grafana:4.2.0
        environment:
          GF_SERVER_ROOT_URL: http://${DEV_IP}:3000
          GF_SECURITY_ADMIN_PASSWORD: password
        ports:
          - ${DEV_IP}:3000:3000
        volumes:
          - ./.docker-volumes/grafana-data:/var/lib/grafana
          - ./.docker-volumes/grafana-plugins:/var/lib/grafana/plugins
          - ./.docker-volumes/grafana-logs:/var/log/grafana

    influxdb:
        image: influxdb:1.2-alpine
        ports:
          - ${DEV_IP}:8083:8083
          - ${DEV_IP}:8086:8086
          - ${DEV_IP}:8089:8089/udp
        volumes:
          - ./.docker-volumes/influxdb-data:/var/lib/influxdb
          - ./influxdb.conf:/etc/influxdb/influxdb.conf

    # Fake Services
    mailhog:
        image: mailhog/mailhog
        ports:
          - ${DEV_IP}:8025:8025

    magento:
        image: alexcheng/magento2
        environment:
          MYSQL_HOST: magento-mysql
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_DATABASE: magento
          MAGENTO_LOCALE: en_GB
          MAGENTO_TIMEZONE: Pacific/Auckland
          MAGENTO_DEFAULT_CURRENCY: NZD
          MAGENTO_URL: http://${DEV_IP}:8090
          MAGENTO_ADMIN_FIRSTNAME: Admin
          MAGENTO_ADMIN_LASTNAME: MyStore
          MAGENTO_ADMIN_EMAIL: amdin@example.com
          MAGENTO_ADMIN_USERNAME: admin
          MAGENTO_ADMIN_PASSWORD: magentorocks1
        ports:
          - ${DEV_IP}:8090:80

    magento-mysql:
        image: mariadb
        environment:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: magento

    requestbin:
        image: agaveapi/requestbin:master
        ports:
          - ${DEV_IP}:5000:5000

    # Fake API editor
    swagger-ui:
            image: swaggerapi/swagger-ui
            ports:
              - ${DEV_IP}:8087:8080

    swagger-editor:
        image: swaggerapi/swagger-editor
        ports:
          - ${DEV_IP}:8088:8080

volumes:
  elasticsearch: {}
