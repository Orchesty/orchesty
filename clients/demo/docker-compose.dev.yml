            RABBIT_DSN: amqp://rabbitmq:5672/
            USER_TASK_LISTENER_ENABLE: 0
        working_dir: /var/www/pipes/clients/demo/pipes-api
        volumes:
            - ../../:/var/www/pipes
            - ${SSH_AUTH_SOCK}:${SSH_AUTH}
            - ${HOME}/dev/.composer:${HOME}/dev/.composer
