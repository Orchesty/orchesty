        working_dir: /var/www/pipes/frontend
        environment:
            FRONTEND_URL: ${BACKEND_URL}:80
            BACKEND_URL: ${BACKEND_URL}:81
            STARTING_POINT_URL: http://${DEV_IP}:82
        ports:
            - ${DEV_IP}:80:8080
        volumes:
            - ../../:/var/www/pipes
