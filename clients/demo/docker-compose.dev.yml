    notification-sender-consumer:
        image: dkr.hanaboso.net/pipes/notification-sender:master
        command: bash -c 'while ! [ -f vendor/autoload.php ]; do sleep 1; echo "sleep 1"; done; bin/console rabbit_mq:consumer:notification'
        working_dir: /var/www
        environment:
            MONGO_HOST: mongo
            RABBITMQ_DSN: amqp://rabbitmq:5672
