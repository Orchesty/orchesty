    #telegraf:
    #    image: dkr.hanaboso.net/pipes/pipes/rabbitmq-telegraf:master
    #    environment:
    #      METRICS_DSN: influxdb://kapacitor:9100
    ## END STAGE

    ## BEGIN DEV
    cron-api:
        image: hanabosocom/go-base:dev
        user: ${DEV_UID}:${DEV_GID}
        environment:
            DEV_UID: ${DEV_UID}
            DEV_GID: ${DEV_GID}
            APP_DEBUG: 'true'
            MONGO_DSN: mongodb://mongo/cron?connectTimeoutMS=2500&serverSelectionTimeoutMS=2500&socketTimeoutMS=2500&heartbeatFrequencyMS=2500
            MONGO_COLLECTION: cron_table
        volumes:
            - ../../cron:/app
        command: /bin/sh -c '
            su-exec root chmod u+s /usr/bin/crontab &&
            su-exec root chmod 777 /etc/crontabs/root &&
            su-exec root crond -l 0 -L /var/log/cron.log &&
            go run cmd/cron.go'
    ## END DEV
    ## BEGIN STAGE
    #cron-api:
