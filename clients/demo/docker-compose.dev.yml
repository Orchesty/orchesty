    batch-connector:
        image: hanabosocom/php-dev:php-7.4-alpine
        user: ${DEV_UID}:${DEV_GID}
        environment:
            COMPOSER_HOME: ${HOME}/dev/.composer
            BACKEND_HOST: ${BACKEND_URL}/
            ELASTIC_HOST: elasticsearch
            ELASTIC_INDEX: index
            METRICS_SERVICE: influx
            METRICS_HOST: kapacitor
            METRICS_PORT: 9100
            RABBIT_DSN: amqp://rabbitmq:5672/
            USER_TASK_LISTENER_ENABLE: 0
        command: bash -c 'while ! [ -f vendor/autoload.php ];do sleep 1; echo "sleep 1"; done; bin/console rabbit_mq:consumer:batch-connector'
        working_dir: /var/www/pipes/clients/demo/pipes-api
        volumes:
            - ../../:/var/www/pipes
            - ${SSH_AUTH_SOCK}:${SSH_AUTH}
            - ${HOME}/dev/.composer:${HOME}/dev/.composer
