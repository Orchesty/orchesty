            METRICS_PORT: 9100
            METRICS_SERVICE: influx
            ELASTIC_HOST: elasticsearch
            ELASTIC_INDEX: index
            CRON_DSN: cron-api:8080
            MONOLITH_API_DSN: php-sdk
            MULTI_PROBE_DSN: multi-probe:8007
            STARTING_POINT_DSN: starting-point:8080
            TOPOLOGY_API_DSN: topology-api:8080
            WORKER_DEFAULT_PORT: 8008
        working_dir: /var/www/pipes/pf-bundles
        volumes:
            - ../../:/var/www/pipes
            - ${SSH_AUTH_SOCK}:${SSH_AUTH}
            - ${HOME}/dev/.composer:${HOME}/dev/.composer
    ## END DEV
