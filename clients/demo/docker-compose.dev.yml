        image: hanabosocom/go-base:dev
        user: ${DEV_UID}:${DEV_GID}
        environment:
            DEV_UID: ${DEV_UID}
            DEV_GID: ${DEV_GID}
            APP_DEBUG: 'true'
            METRICS_DSN: influxdb://kapacitor:9100
        volumes:
            - ../../rabbitmq-telegraf:/app
        command: go run main.go
    ## END DEV
