services:
    ## BEGIN DEV
    downloader:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:dev
        user: ${DEV_UID}:${DEV_GID}
        environment:
          BACKEND_HOST: ${BACKEND_URL}/
          ELASTIC_HOST: elasticsearch
          ELASTIC_INDEX: 'index'
        command: bash -c 'while ! [ -f vendor/autoload.php ];do sleep 1; echo "sleep 1"; done; bin/console downloader:run'
        working_dir: /var/www/pipes/clients/demo/pipes-api
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/tmp/bound-ssh-agent
          - ${HOME}/.composer:/srv/.composer
    ## END DEV
    ## BEGIN STAGE
    #donwlader:
    #    image: dkr.hanaboso.net/pipes/client-demo/monolith-fpm:${TAG_MONOLITH}
    #    command: bin/console downloader:run
    #    environment:
    #      BACKEND_HOST: ${BACKEND_URL}/
    #      ELASTIC_HOST: elasticsearch
    #      ELASTIC_INDEX: 'logstash-2018.01.31'
    ## END STAGE

    ## BEGIN DEV
    batch:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:dev
        user: ${DEV_UID}:${DEV_GID}
        environment:
          BACKEND_HOST: ${BACKEND_URL}/
          ELASTIC_HOST: elasticsearch
          ELASTIC_INDEX: 'index'
        command: bash -c 'while ! [ -f vendor/autoload.php ];do sleep 1; echo "sleep 1"; done; bin/console rabbit-mq:async-consumer batch'
        working_dir: /var/www/pipes/clients/demo/pipes-api
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/tmp/bound-ssh-agent
          - ${HOME}/.composer:/srv/.composer
    ## END DEV
    ## BEGIN STAGE
    #batch:
    #    image: dkr.hanaboso.net/pipes/client-demo/monolith-fpm:${TAG_MONOLITH}
    #    command: bin/console rabbit-mq:async-consumer batch
    #    environment:
    #      BACKEND_HOST: ${BACKEND_URL}/
    #      ELASTIC_HOST: elasticsearch
    #      ELASTIC_INDEX: 'logstash-2018.01.31'
    ## END STAGE

    ## BEGIN DEV
    status-service:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:dev
        user: ${DEV_UID}:${DEV_GID}
        environment:
          BACKEND_HOST: ${BACKEND_URL}/
          ELASTIC_HOST: elasticsearch
          ELASTIC_INDEX: 'index'
        command: bash -c 'while ! [ -f vendor/autoload.php ];do sleep 1; echo "sleep 1"; done; bin/console rabbit-mq:consumer status-service'
        working_dir: /var/www/pipes/clients/demo/pipes-api
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/tmp/bound-ssh-agent
          - ${HOME}/.composer:/srv/.composer
    ## END DEV
    ## BEGIN STAGE
    #status-service:
    #    image: dkr.hanaboso.net/pipes/client-demo/monolith-fpm:${TAG_MONOLITH}
    #    command: bin/console rabbit-mq:consumer status-service
    #    environment:
    #      BACKEND_HOST: ${BACKEND_URL}/
    #      ELASTIC_HOST: elasticsearch
    #      ELASTIC_INDEX: 'logstash-2018.01.31'
    ## END STAGE

    multi-probe:
      image: 'dkr.hanaboso.net/pipes/pipes/multi-probe:dev'
      environment:
        REDIS_HOST: 'redis'
        REDIS_PORT: '6379'
        REDIS_PASS: ''
        REDIS_DB: '0'
      ports:
        - ${DEV_IP}:8007:8007

    multi-counter:
      image: 'dkr.hanaboso.net/pipes/pipes/pf-bridge:dev'
      user: ${DEV_UID}:${DEV_GID}
      command: './dist/src/bin/pipes.js start multi_counter'
      environment:
        RABBITMQ_HOST: rabbitmq
        RABBITMQ_PORT: '5672'
        RABBITMQ_USER: guest
        RABBITMQ_PASS: guest
        RABBITMQ_VHOST: /
        REDIS_HOST: 'redis'
        REDIS_PORT: '6379'
        REDIS_PASS: ''
        REDIS_DB: '0'
        COUNTER_PREFETCH: '30'
        METRICS_HOST: 'kapacitor'
        METRICS_PORT: '9092'
      depends_on:
        - redis
        - rabbitmq
      command: './dist/src/bin/pipes.js start multi_counter'
      ports:
        - ${DEV_IP}:8005:8005
      # TODO: unify usages and remove the alias
      networks:
        default:
          aliases:
            - multi-counter-api

    repeater:
      image: 'dkr.hanaboso.net/pipes/pipes/pf-bridge:dev'
      user: ${DEV_UID}:${DEV_GID}
      command: './dist/src/bin/pipes.js start repeater'
      environment:
        RABBITMQ_HOST: rabbitmq
        RABBITMQ_PORT: '5672'
        RABBITMQ_USER: guest
        RABBITMQ_PASS: guest
        RABBITMQ_VHOST: /
        MONGO_HOST: mongo
        REPEATER_CHECK_TIMEOUT: '5000'

    # PHP Services monolith
    ## BEGIN DEV
    monolith-fpm:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:dev
        user: ${DEV_UID}:${DEV_GID}
        environment:
          BACKEND_HOST: ${BACKEND_URL}/
          ELASTIC_HOST: elasticsearch
          ELASTIC_INDEX: 'index'
        working_dir: /var/www/pipes/clients/demo/pipes-api
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/tmp/bound-ssh-agent
          - ${HOME}/.composer:/srv/.composer
    ## END DEV
    ## BEGIN STAGE
    #monolith-fpm:
    #    image: dkr.hanaboso.net/pipes/client-demo/monolith-fpm:${TAG_MONOLITH}
    #    environment:
    #      BACKEND_HOST: ${BACKEND_URL}/
    #      ELASTIC_HOST: elasticsearch
    #      ELASTIC_INDEX: 'logstash-2018.01.31'
    #    secrets:
    #      - source: clevermonitor-ca.pem
    #        target: /var/www/html/var/secret/ca.crt
    #      - source: clevermonitor-hanaboso.pem
    #        target: /var/www/html/var/secret/keypair.pem
    ## END STAGE

    ## BEGIN DEV
    topology-api:
        user: ${DEV_UID}:${DEV_GID}
        image: dkr.hanaboso.net/pipes/pipes/topology-api:dev
        environment:
          DEPLOYMENT_PREFIX: demo
          GENERATOR_NETWORK: demo_default
          GENERATOR_MODE: compose
          GENERATOR_PATH: /srv/topology
          MONGO_HOST: mongo
          MONGO_DATABASE: demo
          RABBITMQ_HOST: rabbitmq
          PROJECT_SOURCE_PATH: ${PROJECT_SOURCE_PATH}/../topology
        volumes:
          - ${DOCKER_SOCKET_PATH}:/var/run/docker.sock
          - ../topology:/srv/topology
    ## END DEV
    ## BEGIN STAGE
    #topology-api:
    #    image: dkr.hanaboso.net/pipes/pipes/topology-api:dev
    #    environment:
    #      DEPLOYMENT_PREFIX: ${DEPLOYMENT_PREFIX}
    #      DOCKER_HOST: tcp://${DOCKER_HOST}
    #      DOCKER_CERT_PATH: /srv/docker-pki
    #      DOCKER_TLS_VERIFY: 1
    #      GENERATOR_NETWORK: ${DEPLOYMENT_PREFIX}_default
    #      GENERATOR_MODE: swarm
    #      GENERATOR_PATH: /tmp
    #      MONGO_HOST: mongo
    #      MONGO_DATABASE: demo
    #      RABBITMQ_HOST: rabbitmq
    #    secrets:
    #      - source: docker-ca.pem
    #        target: /srv/docker-pki/ca.pem
    #      - source: docker-client-cert.pem
    #        target: /srv/docker-pki/cert.pem
    #      - source: docker-client-key.pem
    #        target: /srv/docker-pki/key.pem
    #      - source: docker-config.json
    #        target: /root/.docker/config.json
    ## END STAGE

    frontend:
    ## BEGIN DEV
        image: dkr.hanaboso.net/pipes/pipes/nodejs-build:dev
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www/pipes/frontend
        environment:
          PHP_WEBROOT: /var/www/pipes/clients/demo/pipes-api/public
          PHP_APP_INDEX: index.php
          NPM_INSTALL: ${NPM_INSTALL}
          NPM_START: "yes" # webpackserver
        ports:
          - ${DEV_IP}:80:80
          - ${DEV_IP}:81:8080
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/tmp/bound-ssh-agent
          - ./stack/nginx.conf:/etc/nginx/nginx.conf
        # TODO: Use dynamic dns resolution in Nginx instead
        depends_on:
          - monolith-fpm
          - topology-api
          - cron-api
    ## END DEV
    ## BEGIN STAGE
    #    image: dkr.hanaboso.net/pipes/pipes/frontend:${TAG_FRONTEND}
    #    environment:
    #      BACKEND_URL: ${BACKEND_URL}/api
    #      PHP_WEBROOT: /var/www/html/public
    #    ports:
    #      - ${PUBLISH_HTTP_PORT}:80
    ## END STAGE
        networks:
          default:
            aliases:
              - connector-api
              - mailer-api
              - ftp-api
              - mapper-api
              - monolith-api
              - notification-sender-api

    stream:
        image: dkr.hanaboso.net/pipes/pipes/stream:dev
        environment:
          - RABBITMQ_HOST=rabbitmq
          - STREAM_WS_PORT=80
          - STREAM_HTTP_PORT=3030
          - STREAM_QUEUE=pipes.stream
        ports:
          - ${DEV_IP}:3030:3030
        # - ${DEV_IP}:8080:80

    # RabbitMQ
    rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - ${DEV_IP}:15672:15672
        volumes:
          - rabbitmq:/var/lib/rabbitmq

    # Storage
    mongo:
        image: mongo:3.4
        ports:
          - ${DEV_IP}:27017:27017
        volumes:
          - mongodb:/data/db

    redis:
        image: redis:3.2-alpine
        ports:
        - ${DEV_IP}:6379:6379
        volumes:
        - redis:/data

    logstash:
        image: dkr.hanaboso.net/pipes/pipes/logstash:dev
        environment:
          - MONGO_HOST=mongo
          - MONGO_DATABASE=demo
          - MONGO_COLLECTION=Logs
        #command: --log.level debug
        restart: on-failure
        ## BEGIN DEV
        volumes:
          - ./stack/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
        ## END DEV
        ## BEGIN STAGE
        #configs:
        #  - source: logstash.conf
        #    target: /usr/share/logstash/pipeline/logstash.conf
        ## END STAGE

    # Metrics
    influxdb:
        image: influxdb:1.2-alpine
        ports:
          - ${DEV_IP}:8083:8083
          - ${DEV_IP}:8086:8086
          - ${DEV_IP}:8089:8089/udp
        volumes:
          - influxdb:/var/lib/influxdb
        ## BEGIN DEV
          - ./stack/influxdb.conf:/etc/influxdb/influxdb.conf
        ## END DEV
        ## BEGIN STAGE
        #configs:
        #  - source: influxdb.conf
        #    target: /etc/influxdb/influxdb.conf
        ## END STAGE

    telegraf:
        image: telegraf:1.4.2
        ## BEGIN DEV
        volumes:
          - ./stack/telegraf.conf:/etc/telegraf/telegraf.conf
        ## END DEV
        ## BEGIN STAGE
        #configs:
        #  - source: telegraf.conf
        #    target: /etc/telegraf/telegraf.conf
        ## END STAGE

    kapacitor:
        image: kapacitor:1.4
        ## BEGIN DEV
        volumes:
          - ./stack/kapacitor.conf:/etc/kapacitor/kapacitor.conf
        ## END DEV
        ## BEGIN STAGE
        #configs:
        #  - source: kapacitor.conf
        #    target: /etc/kapacitor/kapacitor.conf
        ## END STAGE

    notification-sender-fpm:
        image: dkr.hanaboso.net/clever-monitor/clever-notification-sender:master
        ## BEGIN DEV
        environment:
            - DEV_UID=${DEV_UID}
            - DEV_GID=${DEV_GID}
            - BACKEND_HOST=${BACKEND_URL}
        ## END DEV
        ## BEGIN STAGE
        #environment:
        #    - BACKEND_HOST=${BACKEND_URL}
        ## END STAGE

    cron-api:
        image: dkr.hanaboso.net/pipes/pipes/python-cron:dev
        ## BEGIN DEV
        user: ${DEV_UID}:${DEV_GID}
        environment:
          - DEV_UID={DEV_UID}
          - DEV_GID={DEV_GID}
        ## END DEV
        ports:
          - ${DEV_IP}:5000:5000
        links:
          - mongo

## BEGIN DEV
volumes:
  mongodb: {}
  grafana: {}
  rabbitmq: {}
  elasticsearch: {}
  redis: {}
  influxdb: {}
## END DEV

