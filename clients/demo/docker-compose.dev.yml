    topology-api:
        image: dkr.hanaboso.net/pipes/pipes/topology-api-v2:dev
        user: ${DEV_UID}:${DEV_GID}
        environment:
            DEV_UID: ${DEV_UID}
            DEV_GID: ${DEV_GID}
            DEPLOYMENT_PREFIX: demo
            GENERATOR_NETWORK: demo_default
            GENERATOR_MODE: compose
            GENERATOR_PATH: /srv/topology
            MONGO_DSN: mongodb://mongo/demo?connectTimeoutMS=2500&serverSelectionTimeoutMS=2500&socketTimeoutMS=2500&heartbeatFrequencyMS=2500
            RABBITMQ_HOST: rabbitmq
            PROJECT_SOURCE_PATH: ${PROJECT_SOURCE_PATH}/../topology
        volumes:
            - ./../../topology-generator/:/topology-generator
            - ${DOCKER_SOCKET_PATH}:/var/run/docker.sock
            - ../topology:/srv/topology
    ## END DEV
