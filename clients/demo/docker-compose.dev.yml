    #      NOTIFICATION_DSN: notification-sender-api
    #      WORKER_DEFAULT_PORT: 8008
    ## END STAGE

    # RabbitMQ
    rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
            - ${DEV_IP}:15672:15672
        volumes:
            - rabbitmq:/var/lib/rabbitmq
    ## BEGIN STAGE
    #    deploy:
    #      resources:
    #        limits:
    #          memory: 2G
    ## END STAGE

    # Storage
    mongo:
        image: mongo:3.4
        ports:
            - ${DEV_IP}:27017:27017
        volumes:
            - mongodb:/data/db
    ## BEGIN STAGE
    #    deploy:
    #      resources:
    #        limits:
    #          memory: 3G
    ## END STAGE

    logstash:
        image: dkr.hanaboso.net/pipes/pipes/logstash-mongo:master
        environment:
            - MONGO_DSN=mongodb://mongo:27017/demo?connectTimeoutMS=2500&serverSelectionTimeoutMS=2500&socketTimeoutMS=2500&heartbeatFrequencyMS=2500
            - MONGO_DB=demo
            - MONGO_COLLECTION=Logs
            - LS_JAVA_OPTS=-Xms512m -Xmx512m
        #command: --log.level debug
        ## BEGIN STAGE
        #deploy:
        #  restart_policy:
        #    condition: on-failure
        ## END STAGE

    # Metrics
    influxdb:
        image: dkr.hanaboso.net/pipes/pipes/influxdb:dev
        environment:
            - INFLUXDB_DB=pipes
        ports:
            - ${DEV_IP}:8083:8083
            - ${DEV_IP}:8086:8086
            - ${DEV_IP}:8089:8089/udp
        volumes:
            - influxdb:/var/lib/influxdb

    kapacitor:
        image: dkr.hanaboso.net/pipes/pipes/kapacitor:dev
        hostname: kapacitor

    ## BEGIN DEV
    tsa:
        image: timeseriesadmin/timeseriesadmin:latest
        ports:
            - ${DEV_IP}:8085:80
        mem_limit: 128M
    ## END DEV

    ## BEGIN DEV
    fakes3:
        image: olalond3/fakes3
        mem_limit: 128M
    ## END DEV

## BEGIN DEV
volumes:
    mongodb: {}
    rabbitmq: {}
    influxdb: {}
## END DEV

