---
version: '3.5'

services:
    wait-for-it:
        image: hanabosocom/wait-for-it:master

    node-sdk:
        image: node-sdk:tag
        build: node-sdk/docker
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www
        volumes:
            - ./node-sdk/:/var/www:cached
        environment:
            # Envs for tests are load from node-sdk/.jest/testEnvs.js
            JEST_DOCKER: 1
            APP_ENV: debug
            CRYPT_SECRET: ThisIsNotSoSecret
            BACKEND_URL: ${BACKEND_URL}
            STARTING_POINT_URL: starting-point:8080
            UDP_LOGGER_DSN: fluentd:5120
            METRICS_DSN: ${METRICS_DSN}
            MONGODB_DSN: ${MONGO_DSN}
        command: sh -c 'pnpm install && pnpm run start'

    notification-sender-api:
        image: orchesty/notification-sender:${VERSION}
        working_dir: /var/www
        environment:
            MONGO_DB: ${MAIN_DB}
            MONGO_CONNECTION: ${MONGO_DSN}

    starting-point:
        image: hanabosocom/go-base:1.18
        user: ${DEV_UID}:${DEV_GID}
        environment:
            DEV_UID: ${DEV_UID}
            DEV_GID: ${DEV_GID}
            APP_DEBUG: 'true'
            ORCHESTY_API_KEY: ${ORCHESTY_API_KEY}
            MONGO_DSN: ${MONGO_DSN}
            METRICS_DSN: ${METRICS_DSN}
            RABBIT_COUNTER_QUEUE_DURABLE: 'true'
            RABBIT_QUEUE_DURABLE: 'true'
            RABBIT_DELIVERY_MODE: 2
        volumes:
            - ./../../starting-point/:/app:cached
        ports:
            - ${DEV_IP}:82:8080
        command: go run cmd/starting-point.go

    topology-api:
        image: orchesty/topology-api:${VERSION}
        environment:
            DEPLOYMENT_PREFIX: ${MAIN_DB}
            GENERATOR_NETWORK: ${NETWORK_NAME}
            PLATFORM: ${PLATFORM}
            GENERATOR_PATH: /srv/topology
            MONGO_DSN: ${MONGO_DSN}
            PROJECT_SOURCE_PATH: ${PROJECT_SOURCE_PATH}/../topology
        volumes:
            - ./../../topology-generator/:/topology-generator
            - ${DOCKER_SOCKET_PATH}:/var/run/docker.sock
            - ../topology:/srv/topology

    cron-api:
        image: hanabosocom/go-base:1.19
        user: ${DEV_UID}:${DEV_GID}
        environment:
            DEV_UID: ${DEV_UID}
            DEV_GID: ${DEV_GID}
            APP_DEBUG: 'true'
            MONGO_DSN: ${MONGO_DSN}
            MONGO_COLLECTION: Cron
            ORCHESTY_API_KEY: ${ORCHESTY_API_KEY}
            STARTING_POINT_DSN: http://starting-point:8080
        volumes:
            - ../../cron:/app:cached
        command: /run.sh -p cmd/cron.go -c api -l 2345
        security_opt: ['seccomp:unconfined']

    backend:
        image: hanabosocom/php-dev:php-8.1-alpine
        user: ${DEV_UID}:${DEV_GID}
        ports:
            - ${DEV_IP}:8080:80
        environment:
            APP_ENV: dev
            APP_DEBUG: 'true'
            PHP_WEBROOT: /var/www/pipes/applinth/public
            ORCHESTY_API_KEY: ${ORCHESTY_API_KEY}
            COMPOSER_HOME: ${HOME}/dev/.composer
            BACKEND_DSN: ${BACKEND_URL}/
            FRONTEND_DSN: ${FRONTEND_URL}/
            NOTIFICATION_DSN: notification-sender-api
            UDP_LOGGER_URL: fluentd:5120
            RABBITMQ_DSN: ${RABBITMQ_DSN}
            MONGODB_DSN: ${MONGO_DSN}
            MONGODB_DB: ${MAIN_DB}
            METRICS_DSN: ${METRICS_DSN}
            METRICS_DB: metrics
            METRICS_SERVICE: mongo
            CRON_DSN: cron-api:8080
            MONOLITH_API_DSN: php-sdk
            STARTING_POINT_DSN: starting-point:8080
            TOPOLOGY_API_DSN: topology-api:8080
            WORKER_DEFAULT_PORT: 8000
            DOCKER_REGISTRY: orchesty
