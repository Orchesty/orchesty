    fluentd:
        image: hanaboso/pipes-fluentd:dev
        environment:
            - MONGO_DSN=${MONGO_DSN}
            - MONGO_COLLECTION=Logs

    mongo:
        image: mongo
        ports:
            - ${DEV_IP}:27017:27017
        volumes:
            - mongodb:/data/db

    rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
            - ${DEV_IP}:15672:15672
        volumes:
            - rabbitmq:/var/lib/rabbitmq

