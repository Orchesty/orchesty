# NOTE: cpu limit of 1001m means "this should have been unlimited but the defaults don't allow it"
global:
  applinthMarketplaceUI:
    resources:
      requests:
        cpu: 25m
        memory: 16Mi
      limits:
        cpu: 1001m
        memory: 64Mi

  backend:
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 1001m
        memory: 144Mi

  cronApi:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 1001m
        memory: 64Mi

  detector:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 1001m
        memory: 128Mi

  fluentd:
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 1001m
        memory: 512Mi

  frontend:
    resources:
      requests:
        cpu: 25m
        memory: 16Mi
      limits:
        cpu: 1001m
        memory: 64Mi

  limiter:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 1001m
        memory: 128Mi

  multiCounter:
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 1001m
        memory: 96Mi

  # more cpu than needed requested because it's accessible from wild internet
  # cpu is limited to not starve the other resources for the same reason
  startingPoint:
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 1000m
        memory: 128Mi

  topologyApi:
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 1001m
        memory: 128Mi

  workerApi:
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  worker:
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 1001m
        memory: 1Gi
