---

orchesty:
  # force legacy resource names
  nameOverride: pipes

global:
  backend_url: https://api-hm8rohmtf6.eu1.cloud.orchesty.io
  frontend_url: https://ui-hm8rohmtf6.eu1.cloud.orchesty.io
  starting_point_url: https://start-hm8rohmtf6.eu1.cloud.orchesty.io

  imageOverrides:
    nodejssdk: hanaboso/demo-nodejs:master
    applinth-marketplace-ui: dkr.hanaboso.net/pipes/pipes/applinth-marketplace-ui:2.0.0
    backend: dkr.hanaboso.net/pipes/pipes/applinth:2.0.0

  nodejsSdk:
    extraEnv:
      APP_ENV:
        value: debug
      AWS_SES_KEY:
        valueFrom:
          secretKeyRef:
            name: pipes-secrets
            key: aws_ses_key
      AWS_SES_SECRET:
        valueFrom:
          secretKeyRef:
            name: pipes-secrets
            key: aws_ses_secret

  backend:
    alpha_instance_id: hm8rohmtf6

  applinthMarketplaceUI:
    auth_backlink: https://example.com/foo
