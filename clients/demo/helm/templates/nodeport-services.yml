---
apiVersion: v1
kind: Service
metadata:
  name: public-frontend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: pipes-frontend
  ports:
  - port: 80
    protocol: TCP
    targetPort: http
    nodePort: 31825

---
apiVersion: v1
kind: Service
metadata:
  name: public-backend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: pipes-backend
  ports:
  - port: 80
    protocol: TCP
    targetPort: http
    nodePort: 31826

---
apiVersion: v1
kind: Service
metadata:
  name: public-starting-point
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: pipes-starting-point
  ports:
  - port: 80
    protocol: TCP
    targetPort: http
    nodePort: 31827
