---

orchesty:
  # force legacy resource names
  nameOverride: pipes

global:
  backend_url: https://api-orchesty.stage.hanaboso.net
  frontend_url: https://orchesty.stage.hanaboso.net
  starting_point_url: https://sp-orchesty.stage.hanaboso.net
  applinth_marketplace_url: https://applinth-orchesty.stage.hanaboso.net

  imageOverrides:
    applinth-marketplace-ui: dkr.hanaboso.net/pipes/pipes/applinth-marketplace-ui:541b6ac4
    backend: dkr.hanaboso.net/pipes/pipes/applinth:2.0.0

  applinthMarketplaceUI:
    auth_backlink: https://demo-applinth-orchesty.stage.hanaboso.net
    service:
      type: NodePort
      nodePort: 30153

  startingPoint:
    service:
      type: NodePort
      nodePort: 30152

  backend:
    alpha_instance_id: hb-stage
    service:
      type: NodePort
      nodePort: 30151

  frontend:
    service:
      type: NodePort
      nodePort: 30150

  workers:
    default:
      sdk: nodejs
      image: hanaboso/demo-nodejs:master
      extraEnv:
        AWS_SES_KEY:
          valueFrom:
            secretKeyRef:
              name: pipes-secrets
              key: aws_ses_key
        AWS_SES_SECRET:
          valueFrom:
            secretKeyRef:
              name: pipes-secrets
              key: aws_ses_secret

customPersistence:
  node: k3snode1
  pvDir: /srv/pipes3
  pvPrefix: pipes3
  pvcPrefix: pipes3

mongodb:
  pvcName: pipes3-mongodb
  nodeSelector:
    kubernetes.io/hostname: "k3snode1"

rabbitmq:
  pvcName: pipes3-rabbitmq
  nodeSelector:
    kubernetes.io/hostname: "k3snode1"
