---

orchesty:
  nameOverride: pipes

  valkey:
    enabled: true

  grafana:
    enabled: true
    
    service:
      type: LoadBalancer

    admin:
      existingSecret: pipes-secrets

  loki:
    enabled: true

    singleBinary:
      extraEnv:
        - name: S3_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: pipes-secrets
              key: s3-endpoint
        - name: S3_BUCKET
          valueFrom:
            secretKeyRef:
              name: pipes-secrets
              key: s3-bucket
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: pipes-secrets
              key: s3-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: pipes-secrets
              key: s3-secret-key

  alloy:
    enabled: true

global:
  orchestyVersion: "2.1"
  backend_url: https://api-orchesty.stage.hanaboso.net
  frontend_url: https://orchesty.stage.hanaboso.net
  starting_point_url: https://sp-orchesty.stage.hanaboso.net
  applinth_marketplace_url: https://applinth-orchesty.stage.hanaboso.net

  orchestyImageRegistry:
    enablePullSecret: true
    pullSecret: hanaboso-registry-pull-secret

  imageOverrides:
    applinth-marketplace-ui: dkr.hanaboso.net/pipes/pipes/applinth-marketplace-ui:master
    backend: dkr.hanaboso.net/pipes/pipes/applinth:master

  applinthMarketplaceUI:
    auth_backlink: https://demo-applinth-orchesty.stage.hanaboso.net
    service:
      type: LoadBalancer
      port: 80

  startingPoint:
    service:
      type: LoadBalancer
      port: 80

  backend:
    alpha_instance_id: hb-stage
    service:
      type: LoadBalancer
      nodePort: 80

  frontend:
    service:
      type: LoadBalancer
      nodePort: 80

  workers:
    default:
      sdk: nodejs
      image: hanaboso/demo-nodejs:master
      extraEnv:
        AWS_SES_KEY:
          valueFrom:
            secretKeyRef:
              name: pipes-secrets
              key: aws_ses_key
        AWS_SES_SECRET:
          valueFrom:
            secretKeyRef:
              name: pipes-secrets
              key: aws_ses_secret
  
  logs:
    lokiHostname: pipes-loki-gateway.pipes.svc.cluster.local

    filter:

      # Namespaces to include. If empty, all namespaces are included (except excluded ones).
      # Example: ["default", "monitoring"]
      namespaces:
        include: ["pipes"]
        exclude: []

      # Pod name patterns to exclude (regex supported by River relabel)
      # Example: ["debug-.*", ".*-test"]
      pods:
        # Pod name patterns to include (regex). If empty, all pods are included (except excluded ones).
        include: ["pipes-worker-.*", topology-.*]
        exclude: []
  
customPersistence:
  node: k3snode1
  pvDir: /srv/pipes3
  pvPrefix: pipes3
  pvcPrefix: pipes3

mongodb:
  pvcName: pipes3-mongodb
  nodeSelector:
    kubernetes.io/hostname: "k3snode1"

rabbitmq:
  pvcName: pipes3-rabbitmq
  nodeSelector:
    kubernetes.io/hostname: "k3snode1"
