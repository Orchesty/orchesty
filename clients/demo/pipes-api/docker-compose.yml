---

version: '3.5'

services:
    pipes-api:
        image: hanabosocom/php-dev:php-7.3
        user: ${DEV_UID}:${DEV_GID}
        ports:
            - ${DEV_IP}:8000:80
        working_dir: /var/www/pipes/clients/demo/pipes-api
        environment:
            PHP_WEBROOT: /var/www/pipes/clients/demo/pipes-api
            DEV_UID: ${DEV_UID}
            DEV_GID: ${DEV_GID}
            DEPLOYMENT_PREFIX: ${DEPLOYMENT_PREFIX}
            TOPOLOGY_MODE: ${TOPOLOGY_MODE}
            SMTP_USER: dev.email.hb@gmail.com
            SMTP_PASSWORD: jVME2RkX9xyYhj9v
            FRONTEND_HOST: ${DEV_IP}
            COMPOSER_HOME: ${HOME}/dev/.composer
        volumes:
            - ../../../:/var/www/pipes
            - ${SSH_AUTH_SOCK}:${SSH_AUTH}
            - ${HOME}/dev/.composer:${HOME}/dev/.composer
