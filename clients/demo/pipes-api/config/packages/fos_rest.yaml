fos_rest:
    format_listener:
        rules:
            - { path: '^/api/topologies/\w+/schema.bpmn', methods: ['PUT', 'POST'], priorities: ['xml'] }
            - { path: '^/topologies/\w+/schema.bpmn', methods: ['PUT', 'POST'], priorities: ['xml'] }
            - { path: '^/api', priorities: ['json'] }
            - { path: '^/webhook', priorities: ['json', 'xml'] }
            - { path: '^/', priorities: ['json'] }

    body_listener:
        decoders:
            json: fos_rest.decoder.json
            xml: fos_rest.decoder.xml
