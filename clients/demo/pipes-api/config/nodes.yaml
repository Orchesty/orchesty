services:
    _defaults:
        public: '%public.services%'

    # Application
    hbpf.application.http-status:
        class: Demo\HttpStatus\HttpStatusApplication

    # Batch
    hbpf.batch.list-posts:
        class: Demo\JsonPlaceholder\Batch\ListPosts
        calls:
          -   setSender: [ '@hbpf.transport.curl_manager' ]
        arguments:
          - '@hbpf.application_install.repository'

    hbpf.batch.http-status-batch:
        class: Demo\HttpStatus\Batch\HttpStatusBatch
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
            -   setApplication: [ '@hbpf.application.http-status' ]
        arguments:
            - '@hbpf.application_install.repository'

    # Connector
    hbpf.connector.pager-duty:
        class: Demo\Connector\PagerDutyConnector
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.connector.get-users:
        class: Demo\Connector\GetUsersConnector
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.connector.hub-spot.create-multiple-contact:
        class: Demo\Connector\HubSpotCreateMultipleContactsConnector
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
            -   setApplication: [ '@hbpf.application.hub-spot' ]
            -   setLogger: [ '@monolog.logger.commons' ]
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.connector.get-post:
        class: Demo\JsonPlaceholder\Connector\GetPost
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.connector.idnes-connector:
        class: Demo\Connector\IdnesConnector
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.connector.http-status-200-connector:
        class: Demo\HttpStatus\Connector\HttpStatus200Connector
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
            -   setApplication: [ '@hbpf.application.http-status' ]
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.connector.http-status-201-connector:
        class: Demo\HttpStatus\Connector\HttpStatus201Connector
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
            -   setApplication: [ '@hbpf.application.http-status' ]
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.connector.http-status-400-connector:
        class: Demo\HttpStatus\Connector\HttpStatus400Connector
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
            -   setApplication: [ '@hbpf.application.http-status' ]
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.connector.http-status-401-connector:
        class: Demo\HttpStatus\Connector\HttpStatus401Connector
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
            -   setApplication: [ '@hbpf.application.http-status' ]
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.connector.http-status-404-connector:
        class: Demo\HttpStatus\Connector\HttpStatus404Connector
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
            -   setApplication: [ '@hbpf.application.http-status' ]
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.connector.http-status-500-connector:
        class: Demo\HttpStatus\Connector\HttpStatus500Connector
        calls:
            -   setSender: [ '@hbpf.transport.curl_manager' ]
            -   setApplication: [ '@hbpf.application.http-status' ]
        arguments:
            - '@hbpf.application_install.repository'

    # CustomNode
    hbpf.custom_node.data-generator:
        class: Demo\CustomNode\DataGeneratorConnector
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.custom_node.package:
        class: Demo\CustomNode\DummyConnector
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.custom_node.pick-area:
        class: Demo\CustomNode\DummyConnector
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.custom_node.customer-notify:
        class: Demo\CustomNode\DummyConnector
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.custom_node.extra-insurance:
        class: Demo\CustomNode\DummyConnector
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.custom_node.print-label:
        class: Demo\CustomNode\DummyConnector
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.custom_node.request-carrier:
        class: Demo\CustomNode\DummyConnector
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.custom_node.fill-in-form:
        class: Demo\CustomNode\DummyConnectorSplit
        arguments:
            - '@hbpf.application_install.repository'

    hbpf.custom_node.check-insurance:
        class: Demo\CustomNode\DummyConnectorSplit
        arguments:
          - '@hbpf.application_install.repository'

    hbpf.custom_node.dummy-exception:
        class: Demo\CustomNode\DummyExceptionConnector
        arguments:
            - '@hbpf.application_install.repository'
        calls:
            - [ 'setLogger', [ '@monolog.logger.commons' ] ]

    hbpf.custom_node.filter-bids:
        class: Demo\CustomNode\FilterStockExchange
        arguments:
            - '@hbpf.application_install.repository'
            - 'bids'

    hbpf.custom_node.filter-asks:
        class: Demo\CustomNode\FilterStockExchange
        arguments:
            - '@hbpf.application_install.repository'
            - 'asks'
        calls:
            - [ 'setLogger', [ '@monolog.logger.commons' ] ]


    hbpf.custom_node.send-duty-email:
        class: Demo\CustomNode\SendDutyEmail
        arguments:
            - '@hbpf.application_install.repository'
            - '@mailer'
            - '@hbpf.connector.pager-duty'

    hbpf.custom_node.hub-spot.create-multiple-contact-mapper:
        class: Demo\CustomNode\HubSpotCreateMultipleContactsMapper
        arguments:
            - '@hbpf.application_install.repository'
