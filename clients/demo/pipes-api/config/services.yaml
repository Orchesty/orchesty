parameters:
    locale: en
    secret: ThisTokenIsNotSoSecretChangeIt
    container:
        dumper:
            inline_factories: true

    backend_host: '%env(BACKEND_HOST)%'
    starting_point_host: "%env(string:STARTING_POINT_DSN)%"

    access_token_refresh_interval: 3600
    node_services_dirs:
        - '%kernel.project_dir%/config'
        - '%kernel.project_dir%/vendor/hanaboso/pipes-connectors/src/Resources/config/'
        - '%kernel.project_dir%/vendor/hanaboso/pipes-php-sdk/src/HbPFLongRunningNodeBundle/Resources'

    applications:
        - '%kernel.project_dir%/vendor/hanaboso/pipes-connectors/src/Resources/config/'

    kernel.root_dir: '%kernel.project_dir%/src'

services:
    _defaults:
        autowire: false
        autoconfigure: true
        public: '%public.services%'

    Demo\Controller\DefaultController:
        class: Demo\Controller\DefaultController
        calls:
            - ['setContainer', ['@service_container']]


    Demo\Command\DownloaderCommand:
        arguments:
            - 'downloader:run'
            - '@hbpf.transport.curl_manager'
        tags:
            - { name: 'console.command', command: 'downloader:run' }

    Demo\Command\KapacitorCommand:
        arguments:
            - 'kapacitor:run'
        tags:
            - { name: 'console.command', command: 'kapacitor:run' }


    # Connector
    hbpf.connector.batch:
        class: Demo\Connector\BatchConnector

    hbpf.connector.pager-duty:
        class: Demo\Connector\PagerDutyConnector
        arguments:
            - '@hbpf.transport.curl_manager'

    # CustomNode
    hbpf.custom_node.batch:
        class: Demo\CustomNode\BatchCustomNode

    hbpf.custom_node.data-generator:
        class: Demo\CustomNode\DataGeneratorConnector

    hbpf.custom_node.package:
        class: Demo\CustomNode\DummyConnector

    hbpf.custom_node.pick-area:
        class: Demo\CustomNode\DummyConnector

    hbpf.custom_node.customer-notify:
        class: Demo\CustomNode\DummyConnector

    hbpf.custom_node.extra-insurance:
        class: Demo\CustomNode\DummyConnector

    hbpf.custom_node.print-label:
        class: Demo\CustomNode\DummyConnector

    hbpf.custom_node.request-carrier:
        class: Demo\CustomNode\DummyConnector

    hbpf.custom_node.fill-in-form:
        class: Demo\CustomNode\DummyConnectorSplit

    hbpf.custom_node.check-insurance:
        class: Demo\CustomNode\DummyConnectorSplit

    hbpf.custom_node.dummy-exception:
        class: Demo\CustomNode\DummyExceptionConnector
        calls:
            - ['setLogger', ['@monolog.logger.commons']]

    hbpf.custom_node.filter-bids:
        class: Demo\CustomNode\FilterStockExchange
        arguments:
            - 'bids'

    hbpf.custom_node.filter-asks:
        class: Demo\CustomNode\FilterStockExchange
        arguments:
            - 'asks'
        calls:
            - ['setLogger', ['@monolog.logger.commons']]

    hbpf.custom_node.idnes:
        class: Demo\CustomNode\IdnesConnector
        arguments:
            - '@hbpf.transport.curl_manager'

    hbpf.custom_node.split-file:
        class: Demo\CustomNode\SplitFileBatch

    hbpf.custom_node.split-file2:
        class: Demo\CustomNode\SplitFileBatch2
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.rabbit_mq.connection'
            - '@rabbit_mq.publisher.pipes-notifications'

    hbpf.rabbit_mq.connection:
        class: RabbitMqBundle\Connection\Connection
        arguments:
            - 'default'
            - '@rabbit_mq.client_factory'

    # LongRunningNode
    hbpf.long_running.time-stamper:
        class: Demo\LongRunningNode\TimeStamperHumanTask
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.long_running.time-stamper-one:
        class: Demo\LongRunningNode\TimeStamperHumanTask
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.long_running.time-stamper-two:
        class: Demo\LongRunningNode\TimeStamperHumanTask
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.send-duty-email:
        class: Demo\CustomNode\SendDutyEmail
        arguments:
            - '@mailer'
            - '@hbpf.connector.pager-duty'

    mailer:
        class: EmailServiceBundle\Mailer\Mailer
        arguments:
            - '@EmailServiceBundle\Transport\Impl\SwiftMailerTransport'

    hbpf.custom_node.hub-spot.create-multiple-contact-mapper:
        class: Demo\CustomNode\HubSpotCreateMultipleContactsMapper

    hbpf.connector.get-users:
        class: Demo\Connector\GetUsersConnector
        arguments:
            - '@hbpf.transport.curl_manager'

    hbpf.connector.hub-spot.create-multiple-contact:
        class: Demo\Connector\HubSpotCreateMultipleContactsConnector
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - [ 'setApplication', [ '@hbpf.application.hub-spot' ] ]
            - [ 'setLogger', [ '@monolog.logger.commons' ] ]

    hbpf.connector.load-application-users.hub-spot:
        class: Hanaboso\PipesPhpSdk\RabbitMq\Impl\BatchConnector\LoadApplicationUsersConnector
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - 'hub-spot'
        calls:
            - [ 'setApplication', [ '@hbpf.application.hub-spot' ] ]