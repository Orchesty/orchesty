---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: topology
  labels:
    app: topology
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: topology
  template:
    metadata:
      labels:
        app: topology
    spec:
      containers:
        - name: topology
          image: dkr.hanaboso.net/pipes/pipes/topology-api-v1:dev
          ports:
            - containerPort: 80
          env:
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: GENERATOR_MODE
              value: k8s
            - name: GENERATOR_PATH
              value: /srv/topology
            - name: MONGO_HOST
              value: mongodb://mongo
            - name: MONGO_DATABASE
              value: demo
            - name: RABBITMQ_HOST
              value: rabbitmq
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 64Mi
              cpu: "1"

---
apiVersion: v1
kind: Service
metadata:
  name: topology
spec:
  selector:
    app: topology
  ports:
    - protocol: TCP
      port: 80
