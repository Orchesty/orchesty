---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  labels:
    app: elasticsearch
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      hostname: elasticsearch
      containers:
        - name: elasticsearch
          image: elasticsearch:7.4.2
          ports:
            - containerPort: 9200
          env:
            - name: ES_JAVA_OPTS
              value: -Xms256m -Xmx256m
            - name: discovery.seed_hosts
              value: "elasticsearch"
            - name: cluster.initial_master_nodes
              value: "elasticsearch"
          resources:
            requests:
              memory: 256Mi
              cpu: 256m
            limits:
              memory: 512Mi
              cpu: "1"
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
      volumes:
        - name: elasticsearch-data
          persistentVolumeClaim:
            claimName: elasticsearch-data

---
apiVersion: v1
kind: Service
metadata:
  # should be "elasticsearch", but its hardcoded in many places
  name: elastic
spec:
  selector:
    app: elasticsearch
  type: NodePort
  ports:
    - protocol: TCP
      port: 9200
      nodePort: 30353
