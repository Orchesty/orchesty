---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: status
  labels:
    app: status
spec:
  selector:
    matchLabels:
      app: status
  template:
    metadata:
      labels:
        app: status
    spec:
      containers:
        - name: php-w-nginx
          image: dkr.hanaboso.net/pipes/demo/php-api:dev
          args: ["bin/console", "rabbit_mq:consumer:status-service"]
          ports:
            - containerPort: 80
          env:
            - name: __BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  key: backend_url
                  name: pipes-config
            - name: BACKEND_HOST
              value: "$(__BACKEND_URL)/"
            - name: FRONTEND_HOST
              value: "$(__BACKEND_URL)/"
            - name: ELASTIC_HOST
              value: elasticsearch
            - name: ELASTIC_INDEX
              value: index
            - name: PHP_FPM_MAX_REQUESTS
              value: "5000"
          resources:
            requests:
              memory: 128Mi
              cpu: 250m
            limits:
              memory: 128Gi
              cpu: "2"

---
apiVersion: v1
kind: Service
metadata:
  name: status
spec:
  selector:
    app: status
  ports:
    - protocol: TCP
      port: 80
