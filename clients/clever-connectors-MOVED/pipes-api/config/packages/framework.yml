framework:
    secret: '%secret%'
    router:
        strict_requirements: ~
    csrf_protection:
        enabled: false
    default_locale: '%locale%'
    trusted_hosts: ~
    session:
        handler_id: hbpf.commons.session_handler
    fragments: ~
    http_method_override: true
    test: false
    php_errors:
        log: true