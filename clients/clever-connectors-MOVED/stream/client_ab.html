<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.0.3/socket.io.js"></script>
<script>
	var socket = io('http://localhost:8080/stream');
	var userId = 'test';
	var groups = ['a', 'b'];
	var token = 'userToken';

	socket.on('connect', function () {
		console.log('Connection to websockets created.');
		socket.emit('subscribe', { groups: groups, token: token });

		// When user wants to unsubscribe, he send following message
		// socket.emit('unsubscribe', { groups: groups, token: token });
	});

	socket.on('disconnect', function () {
		console.log('Connection to web sockets closed.');
	});

	socket.on('error_message', function (data) {
		console.log(data);
		document.body.innerHTML += '<p style="color: red">' + data + '</p>';
	});

	socket.on('info_message', function (data) {
		console.log(data);
		document.body.innerHTML += '<p style="color: green">' + data + '</p>';
	});

	socket.on('message', function (data) {
		console.log(data);
		document.body.innerHTML += '<p>event:'+ data.event + ', content: ' + data.content + '</p>';
	});

</script>

<html>
    <body>
        <h1>WS stream for: <script>document.write(userId)</script></h1>
    </body>
</html>
