# To get started with security, check out the documentation:
# https://symfony.com/doc/current/security.html
security:
    encoders:
        Hanaboso\PipesFramework\User\Document\User:
            algorithm: bcrypt
            cost: 12
    providers:
        user_provider:
            mongodb:
                class: Hanaboso\PipesFramework\User\Document\User
                property: email

    firewalls:
        unsecured_test:
            pattern: ^/(test/*)
            security: false
        unsecured_map_template:
            pattern: ^/(map)
            security: false
        unsecured_data_layout:
            pattern: ^/(layout)
            security: false
        unsecured_plugin:
            pattern: ^/(plugins)
            security: false
        unsecured_user:
            pattern: ^/(api/user/login|api/user/logout|api/user/\w+/activate|api/user/\w+/set_password|api/user/reset_password)
            security: false
        unsecured_webhook:
            pattern: ^/(webhook/*)
            security: false
        unsecured_clever_events:
            pattern: ^/(event/*)
            security: false
        unsecured_clever_monitor:
            pattern: ^/(user_systems/*|systems/*|system/*)
            security: false
        unsecured_starting_point:
            pattern: ^/(topologies/*/nodes/*/run|api/topologies/*/nodes/*)
            security: false
        unsecured_connectors:
            pattern: ^/(connector/[\w-\.]+/action|connector/[\w-\.]+/webhook|mapper/[\w-\.]+|xml-parser/[\w-\.]+|custom_node/[\w-\.]+/process)
            security: false
        unsecured_generator:
            pattern: ^/api/topology/(generate|run|stop|delete|info)/\w+
            security: false
        secured_area:
            pattern: ^/
            security: true
            provider: user_provider
            form_login:
                check_path: /api/user/login
                login_path: /api/user/login
                default_target_path: /

            logout:
                path: /api/user/logout
                target: /
                invalidate_session: true
                success_handler: hbpf.user.handler.user
        main:
            anonymous: ~