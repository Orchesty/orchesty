services:
    _defaults:
        public: '%public.services%'

    systems.facebookleads:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\FacebookLeads\FacebookLeadsSystem
        arguments:
            - '@hbpf.providers.oauth2_provider'
            - '@service_container'
        tags: ['%systems%']

    hbpf.connector.facebook-get-page-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\FacebookLeads\Connector\FacebookGetPageConnector
        arguments:
            - '@systems.facebookleads'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.facebook-get-leadform-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\FacebookLeads\Connector\FacebookGetLeadformConnector
        arguments:
            - '@systems.facebookleads'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.facebook-sync-leadform-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\FacebookLeads\Connector\FacebookSyncLeadformConnector
        arguments:
            - '@systems.facebookleads'
            - '@hbpf.transport.async_curl_factory'
            - '@doctrine_mongodb.odm.default_document_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.facebook-created-leadform-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\FacebookLeads\Connector\FacebookCreatedLeadformConnector
        arguments:
            - '@systems.facebookleads'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'
            - '@doctrine_mongodb.odm.default_document_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.custom_node.facebook-created-leadform-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\FacebookLeads\Mapper\FacebookCreatedLeadformMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
