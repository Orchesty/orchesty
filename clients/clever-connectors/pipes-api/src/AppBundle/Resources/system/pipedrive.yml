services:
    systems.pipedrive:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\PipedriveSystem
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
        tags: ['%systems%']

    hbpf.connector.pipedrive-sync-person-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Connector\PipedriveSyncPersonConnector
        arguments:
            - '@systems.pipedrive'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.async_curl_factory'
            - '@cc.progress_counter.async_progress_counter_service'

    hbpf.connector.pipedrive-updated-person-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Connector\PipedriveUpdatedPersonConnector
        arguments:

    hbpf.connector.pipedrive-deleted-person-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Connector\PipedriveDeletedPersonConnector
        arguments:

    hbpf.connector.pipedrive-create-person-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Connector\PipedriveCreatePersonConnector
        arguments:
            - '@systems.pipedrive'
            - '@hbpf.transport.curl_manager'
            - '@doctrine_mongodb.odm.default_document_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.pipedrive-update-person-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Connector\PipedriveUpdatePersonConnector
        arguments:
            - '@systems.pipedrive'
            - '@hbpf.transport.curl_manager'
            - '@doctrine_mongodb.odm.default_document_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.custom_node.pipedrive-updated-person-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Mapper\PipedriveUpdatedPersonMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.pipedrive-created-event-person-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Mapper\PipedriveCreatedEventPersonMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.pipedrive-deleted-person-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Mapper\PipedriveDeletedPersonMapper
        arguments:

    hbpf.custom_node.pipedrive-sync-person-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Mapper\PipedriveSyncPersonMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.pipedrive-created-person-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Mapper\PipedriveCreatedPersonMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.pipedrive-update-person-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Mapper\PipedriveUpdatePersonMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.pipedrive-create-person-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Mapper\PipedriveCreatePersonMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@systems.pipedrive'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.custom_node.pipedrive-cm-event-activator:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\CMActivator\PipedriveCMActivator
        arguments:
            - '@cc.systems.manager'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.async_curl_factory'
            - '@rabbit-mq.producer.cm_activator_stream'

    hbpf.connector.pipedrive-get-limit-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Pipedrive\Connector\PipedriveGetLimitsConnector
        arguments:
            - '@systems.pipedrive'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

