services:
    systems.nutshell:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\NutshellSystem
        arguments:
            - '%backend_host%'
        tags: ['%systems%']

    hbpf.connector.nutshell-sync-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Connector\NutshellSyncContactConnector
        arguments:
            - '@systems.nutshell'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.async_curl_factory'
            - '@cc.progress_counter.async_progress_counter_service'
        calls:
            - [setLogger, ['@monolog.logger.notification']]

    hbpf.connector.nutshell-get-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Connector\NutshellGetContactConnector
        arguments:
            - '@systems.nutshell'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - [setLogger, ['@monolog.logger.notification']]

    hbpf.connector.nutshell-create-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Connector\NutshellCreateContactConnector
        arguments:
            - '@systems.nutshell'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - [setLogger, ['@monolog.logger.notification']]

    hbpf.connector.nutshell-update-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Connector\NutshellUpdateContactConnector
        arguments:
            - '@systems.nutshell'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - [setLogger, ['@monolog.logger.notification']]

    hbpf.connector.nutshell-updated-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Connector\NutshellUpdatedContactConnector
        arguments:

    hbpf.custom_node.nutshell-sync-update-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Mapper\NutshellSyncUpdateContactMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.nutshell-create-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Mapper\NutshellCreateContactMapper
        arguments:

    hbpf.custom_node.nutshell-update-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Mapper\NutshellUpdateContactMapper
        arguments:

    hbpf.custom_node.nutshell-created-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Mapper\NutshellCreatedContactMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.nutshell-updated-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Mapper\NutshellUpdatedContactMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.nutshell-deleted-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Mapper\NutshellDeletedContactMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.nutshell-created-event-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Nutshell\Mapper\NutshellCreatedEventContactMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
