services:
    _defaults:
        public: '%public.services%'

    systems.mailmunch:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Mailmunch\MailmunchSystem
        arguments:
            - '%backend_host%'
        tags: ['%systems%']

    hbpf.connector.mailmunch-created-email-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Mailmunch\Connector\MailmunchCreatedEmailConnector
        arguments:

    hbpf.custom_node.mailmunch-created-email-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Mailmunch\Mapper\MailmunchCreatedEmailMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
