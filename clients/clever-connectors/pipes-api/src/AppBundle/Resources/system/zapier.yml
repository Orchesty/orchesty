services:
    systems.zapier:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zapier\ZapierSystem
        arguments:
        tags: ['%systems%']

    hbpf.connector.zapier-created-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zapier\Connector\ZapierCreatedSubscriberConnector
        arguments:

    hbpf.connector.zapier-updated-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zapier\Connector\ZapierUpdatedSubscriberConnector
        arguments:

    hbpf.connector.zapier-deleted-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zapier\Connector\ZapierDeletedSubscriberConnector
        arguments:

    hbpf.custom_node.zapier-created-subscriber-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zapier\Mapper\ZapierCreatedSubscriberMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.zapier-updated-subscriber-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zapier\Mapper\ZapierUpdatedSubscriberMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
