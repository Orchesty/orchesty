services:
    hbpf.connector.cleverconnectors-create-subscriptions-connector:
        class: CleverConnectors\AppBundle\Model\CM\SubscriptionConnector\CMCreateSubscriptionConnector
        arguments:
            - '@hbpf.transport.curl_manager'
            - '%clevermonitor%'
        calls:
            - ['setLogger', ['@monolog.logger.commons']]

    hbpf.connector.cleverconnectors-update-subscriptions-connector:
        class: CleverConnectors\AppBundle\Model\CM\SubscriptionConnector\CMUpdateSubscriptionConnector
        arguments:
            - '@hbpf.transport.curl_manager'
            - '%clevermonitor%'
        calls:
            - ['setLogger', ['@monolog.logger.commons']]

    hbpf.connector.cleverconnectors-delete-subscriptions-connector:
        class: CleverConnectors\AppBundle\Model\CM\SubscriptionConnector\CMDeleteSubscriptionConnector
        arguments:
            - '@hbpf.transport.curl_manager'
            - '%clevermonitor%'
        calls:
            - ['setLogger', ['@monolog.logger.commons']]

    hbpf.connector.cleverconnectors-forward-connector:
        class: CleverConnectors\AppBundle\Model\CM\TestForwardConnector\CMTestForwardConnector
