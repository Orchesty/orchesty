services:
    hbpf.connector.cleverconnectors-create-subscriptions-connector:
        class: CleverConnectors\AppBundle\Model\CM\SubscriberConnector\CMCreateSubscriberConnector
        arguments:
            - '@cc.transport.curl.manager'
        calls:
            - ['setLogger', ['@monolog.logger.commons']]

    hbpf.connector.cleverconnectors-update-subscriptions-connector:
        class: CleverConnectors\AppBundle\Model\CM\SubscriberConnector\CMUpdateSubscriberConnector
        arguments:
            - '@cc.transport.curl.manager'
        calls:
            - ['setLogger', ['@monolog.logger.commons']]

    hbpf.connector.cleverconnectors-delete-subscriptions-connector:
        class: CleverConnectors\AppBundle\Model\CM\SubscriberConnector\CMDeleteSubscriberConnector
        arguments:
            - '@cc.transport.curl.manager'
        calls:
            - ['setLogger', ['@monolog.logger.commons']]

    hbpf.connector.cleverconnectors-get-distributions-connector:
        class: CleverConnectors\AppBundle\Model\CM\ListConnector\CMGetDistributionsConnector
        arguments:
            - '@cc.transport.curl.manager'

    hbpf.connector.cleverconnectors-validate-subscriptions-connector:
        class: CleverConnectors\AppBundle\Model\CM\SubscriberConnector\CMValidateSubscriberConnector
        arguments:
            - '@cc.transport.curl.manager'
        calls:
            - ['setLogger', ['@monolog.logger.commons']]

    hbpf.connector.cleverconnectors-get-subscribers-connector:
        class: CleverConnectors\AppBundle\Model\CM\SubscriberConnector\CMGetSubscribersConnector
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.async_curl_factory'
            - '@cc.progress_counter.async_progress_counter_service'
            - '%clevermonitor%'

    hbpf.connector.cleverconnectors-get-list-subscribers-connector:
        class: CleverConnectors\AppBundle\Model\CM\SubscriberConnector\CMGetListSubscribersConnector
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.async_curl_factory'
            - '@cc.progress_counter.async_progress_counter_service'
            - '%clevermonitor%'

    hbpf.custom_node.cleverconnectors-benchmark-batch-generator:
        class: CleverConnectors\AppBundle\Model\CM\TestBenchmarkConnector\CMTestBenchmarkBatchGenerator
        calls:
            - ['setLogger', ['@monolog.logger.commons']]

    hbpf.custom_node.cleverconnectors-benchmark-mapper:
        class: CleverConnectors\AppBundle\Model\CM\TestBenchmarkConnector\CMTestBenchmarkMapper

    hbpf.connector.cleverconnectors-benchmark-spitter-connector:
        class: CleverConnectors\AppBundle\Model\CM\TestBenchmarkConnector\CMTestBenchmarkSpitterConnector
        arguments:
            - '@hbpf.transport.curl_manager'
            - '%spitter_host%'
        calls:
            - ['setLogger', ['@monolog.logger.commons']]