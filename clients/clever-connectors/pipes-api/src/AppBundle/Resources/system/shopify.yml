services:
    systems.shopify:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\ShopifySystem
        arguments:
            - '@hbpf.providers.oauth2_provider'
        tags: ['%systems%']

    hbpf.connector.shopify-sync-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Connector\ShopifySyncCustomerConnector
        arguments:
            - '@systems.shopify'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.async_curl_factory'

    hbpf.connector.shopify-create-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Connector\ShopifyCreateCustomerConnector
        arguments:

    hbpf.connector.shopify-update-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Connector\ShopifyUpdateCustomerConnector
        arguments:

    hbpf.connector.shopify-customer-delete-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Connector\ShopifyDeleteCustomerConnector
        arguments:

    hbpf.custom_node.shopify-customer-update-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Mapper\ShopifyUpdateCustomerMapper
        arguments:

    hbpf.custom_node.shopify-customer-delete-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Mapper\ShopifyDeleteCustomerMapper
        arguments:
