services:
    systems.shopify:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\ShopifySystem
        arguments:
            - '@hbpf.providers.oauth2_provider'
        tags: ['%systems%']

    hbpf.connector.shopify-sync-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Connector\ShopifySyncCustomerConnector
        arguments:
            - '@systems.shopify'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.async_curl_factory'
            - '@cc.progress_counter.async_progress_counter_service'

    hbpf.connector.shopify-create-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Connector\ShopifyCreateCustomerConnector
        arguments:
            - '@systems.shopify'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'

    hbpf.custom_node.shopify-create-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Mapper\ShopifyCreateCustomerMapper
        arguments:

    hbpf.connector.shopify-created-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Connector\ShopifyCreatedCustomerConnector
        arguments:

    hbpf.connector.shopify-updated-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Connector\ShopifyUpdatedCustomerConnector
        arguments:

    hbpf.connector.shopify-deleted-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Connector\ShopifyDeletedCustomerConnector
        arguments:

    hbpf.custom_node.shopify-updated-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Mapper\ShopifyUpdatedCustomerMapper
        arguments:

    hbpf.custom_node.shopify-deleted-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shopify\Mapper\ShopifyDeletedCustomerMapper
        arguments:
