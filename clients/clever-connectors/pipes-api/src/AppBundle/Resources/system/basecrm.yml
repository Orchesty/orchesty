services:
    systems.basecrm:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Basecrm\BasecrmSystem
        arguments:
        tags: ['%systems%']

    hbpf.connector.basecrm-updated-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Basecrm\Connector\BasecrmUpdatedContactConnector
        arguments:
            - '@systems.basecrm'
            - '@hbpf.transport.async_curl_factory'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.basecrm-queue-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Basecrm\Connector\BasecrmQueueContactConnector
        arguments:
            - '@systems.basecrm'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.basecrm-acknowledge-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Basecrm\Connector\BasecrmAcknowledgeContactConnector
        arguments:
            - '@hbpf.transport.curl_manager'
            - '@systems.basecrm'
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.connector.basecrm-create-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Basecrm\Connector\BasecrmCreateContactConnector
        arguments:
            - '@systems.basecrm'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.basecrm-update-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Basecrm\Connector\BasecrmUpdateContactConnector
        arguments:
            - '@systems.basecrm'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.custom_node.basecrm-updated-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Basecrm\Mapper\BasecrmUpdatedContactMapper
        arguments:

    hbpf.custom_node.basecrm-deleted-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Basecrm\Mapper\BasecrmDeletedContactMapper
        arguments:

    hbpf.custom_node.basecrm-create-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Basecrm\Mapper\BasecrmCreateContactMapper
        arguments:
            - '@systems.basecrm'
            - '@doctrine_mongodb.odm.default_document_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.custom_node.basecrm-created-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Basecrm\Mapper\BasecrmCreatedContactMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.basecrm-update-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Basecrm\Mapper\BasecrmUpdateContactMapper
        arguments:
