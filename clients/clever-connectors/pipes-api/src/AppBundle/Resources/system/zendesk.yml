services:
    _defaults:
        public: '%public.services%'

    systems.zendesk:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\ZendeskSystem
        arguments:
            - '@hbpf.providers.oauth2_provider'
        tags: ['%systems%']

    hbpf.connector.zendesk-sync-user-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\Connector\ZendeskSyncUserConnector
        arguments:
            - '@systems.zendesk'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@cc.progress_counter.async_progress_counter_service'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.zendesk-get-limit-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\Connector\ZendeskGetLimitConnector
        arguments:
            - '@systems.zendesk'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.zendesk-updated-user-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\Connector\ZendeskUpdatedUserConnector
        arguments:
            - '@systems.zendesk'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@cc.progress_counter.progress_counter_service'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.zendesk-create-user-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\Connector\ZendeskCreateUserConnector
        arguments:
            - '@systems.zendesk'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.zendesk-update-user-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\Connector\ZendeskUpdateUserConnector
        arguments:
            - '@systems.zendesk'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.custom_node.zendesk-updated-user-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\Mapper\ZendeskUpdatedUserMapper
        arguments:

    hbpf.custom_node.zendesk-created-user-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\Mapper\ZendeskCreatedUserMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.zendesk-sync-user-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\Mapper\ZendeskSyncUserMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.zendesk-create-user-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\Mapper\ZendeskCreateUserMapper
        arguments:

    hbpf.custom_node.zendesk-update-user-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\Mapper\ZendeskUpdateUserMapper
        arguments:

    hbpf.custom_node.zendesk-created-event-user-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Zendesk\Mapper\ZendeskCreatedEventUserMapper
        arguments:
