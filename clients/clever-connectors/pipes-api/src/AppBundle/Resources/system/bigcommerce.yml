services:
    systems.bigcommerce:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\BigcommerceSystem
        arguments:
        tags: ['%systems%']

    hbpf.connector.bigcommerce-sync-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceSyncCustomerConnector
        arguments:
            - '@systems.bigcommerce'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.async_curl_factory'
            - '@cc.progress_counter.progress_counter_service'

    hbpf.connector.bigcommerce-get-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceGetCustomerConnector
        arguments:
            - '@systems.bigcommerce'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'

    hbpf.connector.bigcommerce-create-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceCreateCustomerConnector
        arguments:

    hbpf.connector.bigcommerce-update-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceUpdateCustomerConnector
        arguments:

    hbpf.connector.bigcommerce-delete-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceDeleteCustomerConnector
        arguments:

    hbpf.custom_node.bigcommerce-update-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Mapper\BigcommerceUpdateCustomerMapper
        arguments:

    hbpf.custom_node.bigcommerce-delete-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Mapper\BigcommerceDeleteCustomerMapper
        arguments:
