services:
    _defaults:
        public: '%public.services%'

    systems.bigcommerce:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\BigcommerceSystem
        arguments:
        tags: ['%systems%']

    hbpf.connector.bigcommerce-sync-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceSyncCustomerConnector
        arguments:
            - '@systems.bigcommerce'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.async_curl_factory'
            - '@cc.progress_counter.async_progress_counter_service'
        calls:
            - [setLogger, ['@monolog.logger.notification']]

    hbpf.connector.bigcommerce-get-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceGetCustomerConnector
        arguments:
            - '@systems.bigcommerce'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - [setLogger, ['@monolog.logger.notification']]

    hbpf.connector.bigcommerce-get-store-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceGetStoreConnector
        arguments:
            - '@systems.bigcommerce'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - [setLogger, ['@monolog.logger.notification']]

    hbpf.connector.bigcommerce-create-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceCreateCustomerConnector
        arguments:
            - '@systems.bigcommerce'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - [setLogger, ['@monolog.logger.notification']]

    hbpf.connector.bigcommerce-created-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceCreatedCustomerConnector
        arguments:

    hbpf.connector.bigcommerce-updated-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceUpdatedCustomerConnector
        arguments:

    hbpf.connector.bigcommerce-deleted-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Connector\BigcommerceDeletedCustomerConnector
        arguments:

    hbpf.custom_node.bigcommerce-created-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Mapper\BigcommerceCreatedCustomerMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.bigcommerce-updated-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Mapper\BigcommerceUpdatedCustomerMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.bigcommerce-deleted-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Mapper\BigcommerceDeletedCustomerMapper
        arguments:

    hbpf.custom_node.bigcommerce-create-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Bigcommerce\Mapper\BigcommerceCreateCustomerMapper
        arguments:
