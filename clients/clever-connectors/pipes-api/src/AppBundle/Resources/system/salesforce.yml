services:
    systems.salesforce:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\SalesforceSystem
        arguments:
            - '@hbpf.providers.oauth2_provider'
        tags: ['%systems%']

    hbpf.connector.salesforce-sync-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Connector\SalesforceSyncContactConnector
        arguments:
            - '@systems.salesforce'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@cc.progress_counter.progress_counter_service'

    hbpf.connector.salesforce-update-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Connector\SalesforceUpdateContactConnector
        arguments:
            - '@systems.salesforce'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'

    hbpf.connector.salesforce-delete-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Connector\SalesforceDeleteContactConnector
        arguments:
            - '@systems.salesforce'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'

    hbpf.custom_node.salesforce-update-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Mapper\SalesforceUpdateContactMapper
        arguments:

    hbpf.custom_node.salesforce-delete-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Mapper\SalesforceDeleteContactMapper
        arguments:
