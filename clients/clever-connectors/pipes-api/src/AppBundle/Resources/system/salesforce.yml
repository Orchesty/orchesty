services:
    systems.salesforce:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\SalesforceSystem
        arguments:
            - '@hbpf.providers.oauth2_provider'
        tags: ['%systems%']

    hbpf.connector.salesforce-sync-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Connector\SalesforceSyncContactConnector
        arguments:
            - '@systems.salesforce'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@cc.progress_counter.async_progress_counter_service'

    hbpf.connector.salesforce-get-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Connector\SalesforceGetContactConnector
        arguments:
            - '@systems.salesforce'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'

    hbpf.connector.salesforce-create-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Connector\SalesforceCreateContactConnector
        arguments:
            - '@systems.salesforce'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'

    hbpf.connector.salesforce-update-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Connector\SalesforceUpdateContactConnector
        arguments:
            - '@systems.salesforce'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'

    hbpf.connector.salesforce-updated-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Connector\SalesforceUpdatedContactConnector
        arguments:
            - '@systems.salesforce'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'

    hbpf.connector.salesforce-deleted-contact-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Connector\SalesforceDeletedContactConnector
        arguments:
            - '@systems.salesforce'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'

    hbpf.custom_node.salesforce-create-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Mapper\SalesforceCreateContactMapper
        arguments:

    hbpf.custom_node.salesforce-created-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Mapper\SalesforceCreatedContactMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.salesforce-updated-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Mapper\SalesforceUpdatedContactMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.salesforce-deleted-contact-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Mapper\SalesforceDeletedContactMapper
        arguments:
