services:
    _defaults:
        public: '%public.services%'

    systems.shipstation:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shipstation\ShipstationSystem
        arguments:
        tags: ['%systems%']

    hbpf.connector.shipstation-sync-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shipstation\Connector\ShipstationSyncCustomerConnector
        arguments:
            - '@systems.shipstation'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@cc.progress_counter.async_progress_counter_service'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.shipstation-update-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shipstation\Connector\ShipstationUpdateCustomerConnector
        arguments:
            - '@systems.shipstation'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.custom_node.shipstation-created-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shipstation\Mapper\ShipstationCreatedCustomerMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.shipstation-updated-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Shipstation\Mapper\ShipstationUpdatedCustomerMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
