services:
    _defaults:
        public: '%public.services%'

    systems.salesforceapp:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\SalesforceAppSystem
        arguments:
            - '@hbpf.providers.oauth2_provider'
            - '@hbpf.connector.salesforce_app-auth-connector'
            - '@hbpf.handler.starting_point'
            - '@cc.system_limit.manager'
        tags: ['%systems%']

    hbpf.connector.salesforce_app-auth-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\Connector\SalesforceAuthConnector
        arguments:
            - '@hbpf.transport.curl_manager'

    hbpf.connector.salesforce_app-sync-subscribers-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\Connector\SalesforceAppSyncSubscribersConnector
        arguments:
            - '@systems.salesforceapp'
            - '@hbpf.transport.async_curl_factory'
            - '@doctrine_mongodb.odm.default_document_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.custom_node.salesforce_app-create-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Mapper\SalesforceCreateContactMapper

    hbpf.custom_node.salesforce_app-update-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Mapper\SalesforceCreateContactMapper

    hbpf.custom_node.salesforce_app-delete-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Salesforce\Mapper\SalesforceCreateContactMapper