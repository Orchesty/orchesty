services:
    _defaults:
        public: '%public.services%'

    systems.salesforceapp:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\SalesforceAppSystem
        arguments:
            - '@hbpf.providers.oauth2_provider'
            - '@hbpf.connector.salesforce_app-auth-connector'
            - '@hbpf.handler.starting_point'
            - '@cc.system_limit.manager'
            - '@hbpf.connector.clevermonitors-get-custom-fields-connector'
        tags: ['%systems%']

    hbpf.connector.salesforce_app-auth-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\Connector\SalesforceAuthConnector
        arguments:
            - '@hbpf.transport.curl_manager'

    hbpf.connector.salesforce_app-sync-subscribers-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\Connector\SalesforceAppSyncSubscribersConnector
        arguments:
            - '@systems.salesforceapp'
            - '@hbpf.transport.async_curl_factory'
            - '@doctrine_mongodb.odm.default_document_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.salesforce_app-upsert-campaign-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\Connector\SalesforceAppUpsertCampaignConnector
        arguments:
            - '@systems.salesforceapp'
            - '@cc.transport.curl.manager'
            - '@doctrine_mongodb.odm.default_document_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.salesforce_app-map_fields-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\Connector\SalesforceAppMapFieldsConnector
        arguments:
            - '@hbpf.transport.curl_manager'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@systems.salesforceapp'

    hbpf.custom_node.salesforce_app-create-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\Mapper\SalesforceAppCreateMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.salesforce_app-update-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\Mapper\SalesforceAppUpdateMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.salesforce_app-delete-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\Mapper\SalesforceAppDeleteMapper
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.salesforce_app-campaigns-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\SalesforceApp\Mapper\SalesforceAppCampaignsMapper