services:
    _defaults:
        public: '%public.services%'

    hbpf.connector.plugin-created-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Plugins\Connector\PluginCreatedSubscriberConnector
        arguments:

    hbpf.connector.plugin-updated-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Plugins\Connector\PluginUpdatedSubscriberConnector
        arguments:

    hbpf.connector.plugin-deleted-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Plugins\Connector\PluginDeletedSubscriberConnector
        arguments:

    hbpf.connector.plugin-validate-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Plugins\Connector\PluginValidateSubscriberConnector
        arguments:

    hbpf.connector.plugin-create-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Plugins\Connector\PluginCreateSubscriberConnector
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
            - '@cc.systems.loader'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.plugin-hard-bounce-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Plugins\Connector\PluginHardBounceSubscriberConnector
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
            - '@cc.systems.loader'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.plugin-unsubscribe-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Plugins\Connector\PluginUnsubscribeSubscriberConnector
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
            - '@cc.systems.loader'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.plugin-sync-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Plugins\Connector\PluginSyncSubscriberConnector
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.async_curl_factory'
            - '@cc.progress_counter.async_progress_counter_service'
            - '@cc.systems.loader'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.plugin-switch-token-connector:
        class: CleverConnectors\AppBundle\Model\Plugins\Connector\PluginSwitchTokenConnector
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
            - '@cc.systems.loader'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.plugin-subscribe-subscriber-connector:
        class: CleverConnectors\AppBundle\Model\Plugins\Connector\PluginSubscribeSubscriberConnector
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
            - '@cc.systems.loader'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

