parameters:
    aim:
        host:
            america: env(SYSTEM_AIM_AMERICA_HOST): ''
            asia: env(SYSTEM_AIM_ASIA_HOST): ''
            europe: env(SYSTEM_AIM_EUROPE_HOST): ''

services:
    _defaults:
        public: '%public.services%'

    systems.aim:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Aim\AimSystem
        arguments:
            - '@hbpf.handler.starting_point'
        tags: ['%systems%']

    hbpf.connector.aim-america-connector:
            class: CleverConnectors\AppBundle\Model\Systems\Impl\Aim\Connector\AmericaAimConnector
            arguments:
                - '@systems.aim'
                - '@hbpf.transport.curl_manager'
                - '%aim.host.america%'
            calls:
                - ['setLogger', ['@monolog.logger.notification']]
    hbpf.connector.aim-asia-connector:
            class: CleverConnectors\AppBundle\Model\Systems\Impl\Aim\Connector\AsiaAimConnector
            arguments:
                - '@systems.aim'
                - '@hbpf.transport.curl_manager'
                - '%aim.host.asia%'
            calls:
                - ['setLogger', ['@monolog.logger.notification']]
    hbpf.connector.aim-europe-connector:
            class: CleverConnectors\AppBundle\Model\Systems\Impl\Aim\Connector\EuropeAimConnector
            arguments:
                - '@systems.aim'
                - '@hbpf.transport.curl_manager'
                - '%aim.host.europe%'
            calls:
                - ['setLogger', ['@monolog.logger.notification']]

    hbpf.custom_node.aim-america-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Aim\Mapper\AimAmericaMapper

    hbpf.custom_node.aim-asia-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Aim\Mapper\AimAsiaMapper

    hbpf.custom_node.aim-europe-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Aim\Mapper\AimEuropeMapper
