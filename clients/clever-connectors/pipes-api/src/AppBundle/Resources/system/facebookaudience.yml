            - '@hbpf.transport.curl_manager'
            - '%env(AIM_HOST)%'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.facebookaudience-update-audience-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Connector\FacebookaudienceUpdateAudienceConnector
        arguments:
            - '@systems.facebookaudience'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.facebook-get-cmsubscribers-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Connector\FacebookaudienceGetCMListSubscribers
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.async_curl_factory'
            - '@cc.progress_counter.async_progress_counter_service'
            - '%clevermonitor%'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.custom_node.facebookaudience-run-createad-action:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Connector\FacebookaudienceRunCreateAdActionConnector
        arguments:
