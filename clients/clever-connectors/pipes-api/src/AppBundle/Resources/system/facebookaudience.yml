services:
    _defaults:
        public: '%public.services%'

    systems.facebookaudience:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\FacebookaudienceSystem
        arguments:
            - '@hbpf.providers.oauth2_provider'
            - '@service_container'
            - '%backend_host%'
            - '@cc.system_topology.runner'
            - '@doctrine_mongodb.odm.default_document_manager'
        tags: ['%systems%']

    hbpf.connector.facebookaudience-create-subscribers-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Connector\FacebookaudienceCreateSubscribersConnector
        arguments:
            - '@systems.facebookaudience'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.facebookaudience-get-accounts-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Connector\FacebookaudienceGetAccountsConnector
        arguments:
            - '@systems.facebookaudience'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.facebookaudience-get-audiences-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Connector\FacebookaudienceGetAudiencesConnector
        arguments:
            - '@systems.facebookaudience'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.custom_node.facebookaudience-get-subscribers-filter:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Filter\FacebookaudienceGetSubscribersFilter
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.facebookaudience-get-list-subscribers-filter:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Filter\FacebookaudienceGetListSubscribersFilter
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    hbpf.custom_node.facebookaudience-create-subscribers-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Mapper\FacebookaudienceCreateSubscribersMapper
        arguments:

    # socMultChann conns
    hbpf.connector.facebookaudience-upload-image-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Connector\FacebookaudienceImageUploadConnector
        arguments:
            - '@systems.facebookaudience'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.facebookaudience-create-campaign-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Connector\FacebookaudienceCreateCampaignConnector
        arguments:
            - '@systems.facebookaudience'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.facebookaudience-create-adset-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Connector\FacebookaudienceCreateAdsetConnector
        arguments:
            - '@systems.facebookaudience'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.facebookaudience-create-ad-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Connector\FacebookaudienceCreateAdConnector
        arguments:
            - '@systems.facebookaudience'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.transport.curl_manager'
        calls:
            - ['setLogger', ['@monolog.logger.notification']]

    hbpf.connector.facebookaudience-update-adstate-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Facebookaudience\Connector\FacebookaudienceUpdateAdstateConnector
        arguments:
