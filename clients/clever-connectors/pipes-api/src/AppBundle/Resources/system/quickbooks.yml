services:
    systems.quickbooks:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Quickbooks\QuickbooksSystem
        arguments:
            - '@hbpf.providers.oauth2_provider'
        tags: ['%systems%']

    hbpf.connector.quickbooks-sync-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Quickbooks\Connector\QuickbooksSyncCustomerConnector
        arguments:
            - '@systems.quickbooks'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@cc.progress_counter.progress_counter_service'

    hbpf.connector.quickbooks-create-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Quickbooks\Connector\QuickbooksCreateCustomerConnector
        arguments:
            - '@systems.quickbooks'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'

    hbpf.connector.quickbooks-update-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Quickbooks\Connector\QuickbooksUpdateCustomerConnector
        arguments:
            - '@systems.quickbooks'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'

    hbpf.connector.quickbooks-delete-customer-connector:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Quickbooks\Connector\QuickbooksDeleteCustomerConnector
        arguments:
            - '@systems.quickbooks'
            - '@cc.last_sync.manager'
            - '@hbpf.transport.async_curl_factory'

    hbpf.custom_node.quickbooks-customer-mapper:
        class: CleverConnectors\AppBundle\Model\Systems\Impl\Quickbooks\Mapper\QuickbooksCustomerMapper
        arguments:
