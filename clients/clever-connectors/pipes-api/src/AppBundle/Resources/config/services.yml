services:

    cc.systems.controller:
        class: CleverConnectors\AppBundle\Controller\SystemController
        arguments:
            - '@cc.systems.handler'

    cc.systems.handler:
        class: CleverConnectors\AppBundle\Handler\SystemHandler
        arguments:
            - '@cc.systems.manager'
            - '@doctrine_mongodb.odm.default_document_manager'

    cc.systems.manager:
        class: CleverConnectors\AppBundle\Model\Systems\SystemManager
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@cc.systems.loader'
            - '@cc.webhook.manager'
            - '@hbpf.starting_point.starting_point'
            - '@hbpf.topology_generator.request.request_handler'
            - '@cc.events.manager'
            - '@cc.map_template.manager'
            - '@cc.layout.manager'

    cc.systems.loader:
        class: CleverConnectors\AppBundle\Model\Systems\SystemLoader
        arguments:
            - '@service_container'

    cc.last_sync.manager:
        class: CleverConnectors\AppBundle\Model\LastSync\LastSyncManager
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    cc.events.controller:
        class: CleverConnectors\AppBundle\Controller\CMEventsController
        arguments:
            - "@cc.events.handler"

    cc.events.handler:
        class: CleverConnectors\AppBundle\Handler\CMEventsHandler
        arguments:
            - "@cc.events.manager"

    cc.events.manager:
        class: CleverConnectors\AppBundle\Model\CMEvents\CMEventsManager
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.handler.starting_point'
            - '@cc.systems.loader'
        calls:
            - [setLogger, ['@monolog.logger']]

    cc.progress_counter.sync_publisher:
        class: CleverConnectors\AppBundle\Model\ProgressCounter\Publisher\SyncPublisher
        arguments:
            - "@rabbit-mq.producer.progress_counter"

    cc.progress_counter.async_publisher:
        class: CleverConnectors\AppBundle\Model\ProgressCounter\Publisher\AsyncPublisher
        arguments:
            - '@rabbit-mq.manager'

    cc.progress_counter.progress_counter_service:
        class: CleverConnectors\AppBundle\Model\ProgressCounter\ProgressCounterService
        arguments:
            - '@snc_redis.default'
            - '@cc.progress_counter.sync_publisher'

    cc.progress_counter.async_progress_counter_service:
        class: CleverConnectors\AppBundle\Model\ProgressCounter\ProgressCounterService
        arguments:
            - '@snc_redis.default'
            - '@cc.progress_counter.async_publisher'

    cc_plugins.plugins.controller:
        class: CleverConnectors\AppBundle\Controller\PluginsController
        arguments:
            - '@cc.plugins.handler'

    cc.plugins.security_manager:
        class: CleverConnectors\AppBundle\Model\Plugins\PluginsSecurityManager
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'

    cc.plugins.manager:
        class: CleverConnectors\AppBundle\Model\Plugins\PluginsManager
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.starting_point.starting_point'
            - '@cc.systems.manager'
            - '@cc.systems.loader'
            - '@hbpf.connector.cleverconnectors-get-distributions-connector'

    cc.plugins.handler:
        class: CleverConnectors\AppBundle\Handler\PluginsHandler
        arguments:
            - '@cc.plugins.manager'
            - '@cc.plugins.security_manager'

    cc.transport.curl.manager:
        class: CleverConnectors\AppBundle\Transport\Curl\CMCurlManager
        arguments:
            - '@hbpf.transport.curl_client_factory'
            - '%clevermonitor%'

    cc.install.manager:
        class: CleverConnectors\AppBundle\Model\Installer\InstallManager
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@snc_redis.default'
            - '@hbpf.configurator.manager.topology'
            - '@hbpf.topology_generator.request.request_handler'
            - ['%connectors_topologies%', '%plugins_topologies%', '%service_topologies%']
        calls:
            - [setLogger, ['@monolog.logger']]

    cc.layout.controller:
        class: CleverConnectors\AppBundle\Controller\LayoutController
        arguments:
            - '@cc.layout.handler'

    cc.layout.handler:
        class: CleverConnectors\AppBundle\Handler\LayoutHandler
        arguments:
            - '@cc.layout.manager'
            - '@cc.systems.manager'

    cc.layout.manager:
        class: CleverConnectors\AppBundle\Model\DataLayout\LayoutManager
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@cc.systems.loader'

    cc.map_template.controller:
        class: CleverConnectors\AppBundle\Controller\MapController
        arguments:
            - '@cc.map_template.handler'

    cc.map_template.handler:
        class: CleverConnectors\AppBundle\Handler\MapHandler
        arguments:
            - '@cc.map_template.manager'
            - '@cc.systems.manager'

    cc.map_template.manager:
        class: CleverConnectors\AppBundle\Model\MapTemplate\MapManager
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@cc.systems.loader'