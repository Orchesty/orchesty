framework:
    translator: { fallbacks: ['%locale%'] }
    secret: '%secret%'
    router:
        resource: '%kernel.root_dir%/../app/config/routing.yml'
        strict_requirements: ~
    csrf_protection:
        enabled: false
    default_locale: "%locale%"
    templating:
        engines: ['twig']
    default_locale: '%locale%'
    trusted_hosts: ~
    session:
        handler_id: hbpf.commons.session_handler
    fragments: ~
    http_method_override: true
    assets: ~
    test: ~
    php_errors:
        log: true

# Twig Configuration
twig:
    debug: '%kernel.debug%'
    strict_variables: '%kernel.debug%'