services:
    clever_connectors.cron.get_system_callback:
        class: CleverConnectors\AppBundle\Command\GetSystemsCommand
        arguments:
            - '@doctrine.odm.mongodb.document_manager'
        tags:
            -  { name: console.command }

    clever_connector.async_command_factory:
        class: CleverConnectors\AppBundle\Model\Command\AsyncCommandFactory
        arguments:
            - '%kernel.project_dir%'

    clever_connectors.cron.get_topology_callback:
        class: CleverConnectors\AppBundle\Command\GetTopologyCommand
        arguments:
            - '@doctrine.odm.mongodb.document_manager'
        tags:
            -  { name: console.command }

    clever_connectors.cron.get_installs_by_expires_command:
        class: CleverConnectors\AppBundle\Command\GetInstallsBeforeExpirationCommand
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '%access_token_refresh_interval%'
        tags:
            -  { name: console.command }

    hbpf.configurator.handler.topology:
        class: CleverConnectors\AppBundle\Handler\TopologyHandler
        arguments:
            - '@hbpf.database_manager_locator'
            - '@hbpf.configurator.manager.topology'
            - '@hbpf.handler.generator_handler'
            - '@hbpf.transport.curl_manager'
            - '@cc.systems.manager'
