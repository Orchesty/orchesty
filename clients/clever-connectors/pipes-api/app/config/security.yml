# To get started with security, check out the documentation:
# https://symfony.com/doc/current/security.html
security:
    encoders:
        Hanaboso\PipesFramework\User\Document\User:
            algorithm: bcrypt
            cost: 12
    providers:
        user_provider:
            mongodb:
                class: Hanaboso\PipesFramework\User\Document\User
                property: email

    firewalls:
        unsecured_user:
            pattern: ^/(api/user/login|api/user/logout|api/user/\w+/activate|api/user/\w+/set_password|api/user/reset_password)
            security: false
        unsecured_webhook:
            pattern: ^/(webhook/*)
            security: false
        unsecured_clever_mnonitor:
            pattern: ^/(user_systems/*|systems/*)
            security: false
        unsecured_starting_point:
            pattern: ^/(topologies/\w+/nodes/[\w-]+/run|api/topologies/\w+/nodes/[\w-]+/run)
            security: false
        unsecured_connectors:
            pattern: ^/(connector/[\w-\.]+/action|connector/[\w-\.]+/webhook|mapper/[\w-\.]+|xml-parser/[\w-\.]+|mailer/[\w-\.]+|custom_node/[\w-\.]+/process)
            security: false
        unsecured_generator:
            pattern: ^/(api/topology/generate/\w+|api/topology/run/\w+)
            security: false
        secured_area:
            pattern: ^/
            security: true
            provider: user_provider
            form_login:
                check_path: /api/user/login
                login_path: /api/user/login
                default_target_path: /

            logout:
                path: /api/user/logout
                target: /
                invalidate_session: true
                success_handler: hbpf.user.handler.user
        main:
            anonymous: ~