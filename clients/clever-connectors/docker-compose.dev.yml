services:
    # Nodes
    ## BEGIN DEV
    batch:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:${TAG_PHPDEV}
        user: ${DEV_UID}:${DEV_GID}
        environment:
          BACKEND_HOST: ${BACKEND_URL}/
          AIM_HOST: ${AIM_HOST}/
          ELASTIC_HOST: elasticsearch
          ELASTIC_INDEX: 'index'
        command: bash -c 'while ! [ -f vendor/autoload.php ];do sleep 1; echo "sleep 1"; done; bin/console rabbit-mq:async-consumer batch'
        working_dir: /var/www/pipes/clients/clever-connectors/pipes-api
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/tmp/bound-ssh-agent
          - ${HOME}/.composer:/srv/.composer
    ## END DEV
    ## BEGIN STAGE
    #batch:
    #    image: dkr.hanaboso.net/pipes/client-cm/monolith:${TAG_MONOLITH}
    #    command: bin/console rabbit-mq:async-consumer batch
    #    environment:
    #      BACKEND_HOST: ${BACKEND_URL}/
    #      ELASTIC_HOST: elasticsearch
    #      ELASTIC_INDEX: 'logstash-2018.01.31'
    #    secrets:
    #      - source: clevermonitor-ca.pem
    #        target: /var/www/html/var/secret/ca.crt
    #      - source: clevermonitor-hanaboso.pem
    #        target: /var/www/html/var/secret/keypair.pem
    ## END STAGE


    ## BEGIN DEV
    batch-connector:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:dev
        user: ${DEV_UID}:${DEV_GID}
        environment:
          BACKEND_HOST: ${BACKEND_URL}/
          ELASTIC_HOST: elasticsearch
          ELASTIC_INDEX: 'index'
        command: bash -c 'while ! [ -f vendor/autoload.php ];do sleep 1; echo "sleep 1"; done; bin/console rabbit-mq:async-consumer batch-connector'
        working_dir: /var/www/pipes/clients/clever-connectors/pipes-api
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/tmp/bound-ssh-agent
          - ${HOME}/.composer:/srv/.composer
    ## END DEV
    ## BEGIN STAGE
    #batch-connector:
    #    image: dkr.hanaboso.net/pipes/client-cm/monolith:${TAG_MONOLITH}
    #    command: bin/console rabbit-mq:async-consumer batch-connector
    #    environment:
    #      BACKEND_HOST: ${BACKEND_URL}/
    #      ELASTIC_HOST: elasticsearch
    #      ELASTIC_INDEX: 'logstash-2018.01.31'
    #    secrets:
    #      - source: clevermonitor-ca.pem
    #        target: /var/www/html/var/secret/ca.crt
    #      - source: clevermonitor-hanaboso.pem
    #        target: /var/www/html/var/secret/keypair.pem
    ## END STAGE

    ## BEGIN DEV
    status-service:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:${TAG_PHPDEV}
        user: ${DEV_UID}:${DEV_GID}
        environment:
          BACKEND_HOST: ${BACKEND_URL}/
          ELASTIC_HOST: elasticsearch
          ELASTIC_INDEX: 'index'
        command: bash -c 'while ! [ -f vendor/autoload.php ];do sleep 1; echo "sleep 1"; done; bin/console rabbit-mq:consumer status-service'
        working_dir: /var/www/pipes/clients/clever-connectors/pipes-api
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/tmp/bound-ssh-agent
          - ${HOME}/.composer:/srv/.composer
    ## END DEV
    ## BEGIN STAGE
    #status-service:
    #    image: dkr.hanaboso.net/pipes/client-cm/monolith:${TAG_MONOLITH}
    #    command: bin/console rabbit-mq:consumer status-service
    #    environment:
    #      BACKEND_HOST: ${BACKEND_URL}/
    #      ELASTIC_HOST: elasticsearch
    #      ELASTIC_INDEX: 'logstash-2018.01.31'
    ## END STAGE

    ## BEGIN DEV
    notification-sender:
        image: dkr.hanaboso.net/clever-monitor/clever-notification-sender:master
        environment:
          - DEV_UID=${DEV_UID}
          - DEV_GID=${DEV_GID}
          - BACKEND_HOST=${BACKEND_URL}/
        depends_on:
          - mongo
          - redis
          - mailhog
        command: bin/console rabbit_mq:consumer:notification
    ## END DEV
    ## BEGIN STAGE
    #notification-sender:
    #    image: dkr.hanaboso.net/clever-monitor/clever-notification-sender:master
    #    command: bin/console rabbit_mq:consumer:notification
    #    environment:
    #      BACKEND_HOST: ${BACKEND_URL}/
    ## END STAGE

    notification-sender-fpm:
        image: dkr.hanaboso.net/clever-monitor/clever-notification-sender:master
        ## BEGIN DEV
        environment:
            - DEV_UID=${DEV_UID}
            - DEV_GID=${DEV_GID}
            - BACKEND_HOST=${BACKEND_URL}
        ## END DEV
        ## BEGIN STAGE
        #environment:
        #    - BACKEND_HOST=${BACKEND_URL}
        ## END STAGE

    notification-center:
        image: cmhanaboso.azurecr.io/clever-monitor/notification-center:master
        command: bin/console rabbit_mq:consumer:clever-notification-client
        environment:
            - TEMPLATE_HOST=127.0.0.1
            - RABBIT_HOST=rabbitmq
            - MONGO_HOST=mongodb
            - REDIS_HOST=redis

    notification-center-fpm:
        image: cmhanaboso.azurecr.io/clever-monitor/notification-center:master
        environment:
            - TEMPLATE_HOST=127.0.0.1
            - RABBIT_HOST=rabbitmq
            - MONGO_HOST=mongodb
            - REDIS_HOST=redis

    multi-probe:
      image: 'dkr.hanaboso.net/pipes/pipes/multi-probe:dev'
      environment:
        REDIS_HOST: 'redis'
        REDIS_PORT: '6379'
        REDIS_PASS: ''
        REDIS_DB: '0'
      ports:
        - ${DEV_IP}:8007:8007

    multi-counter:
      image: 'dkr.hanaboso.net/pipes/pipes/pf-bridge:dev'
      user: ${DEV_UID}:${DEV_GID}
      command: './dist/src/bin/pipes.js start multi_counter'
      environment:
        RABBITMQ_HOST: rabbitmq
        RABBITMQ_PORT: '5672'
        RABBITMQ_USER: guest
        RABBITMQ_PASS: guest
        RABBITMQ_VHOST: /
        REDIS_HOST: 'redis'
        REDIS_PORT: '6379'
        REDIS_PASS: ''
        REDIS_DB: '0'
        COUNTER_PREFETCH: '100'
      ports:
        - ${DEV_IP}:8005:8005
      # TODO: unify usages and remove the alias
      networks:
        default:
          aliases:
            - multi-counter-api

    repeater:
      image: 'dkr.hanaboso.net/pipes/pipes/pf-bridge:dev'
      user: ${DEV_UID}:${DEV_GID}
      command: './dist/src/bin/pipes.js start repeater'
      environment:
        RABBITMQ_HOST: rabbitmq
        RABBITMQ_PORT: '5672'
        RABBITMQ_USER: guest
        RABBITMQ_PASS: guest
        RABBITMQ_VHOST: /
        MONGO_HOST: mongo
        REPEATER_CHECK_TIMEOUT: '5000'

    # PHP Services monolith
    ## BEGIN DEV
    monolith-api:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:${TAG_PHPDEV}
        user: ${DEV_UID}:${DEV_GID}
        environment:
          PHP_WEBROOT: /var/www/pipes/clients/clever-connectors/pipes-api/public
          BACKEND_HOST: ${BACKEND_URL}/
          AIM_HOST: ${AIM_HOST}/
          ELASTIC_HOST: elasticsearch
          ELASTIC_INDEX: 'index'
        working_dir: /var/www/pipes/clients/clever-connectors/pipes-api
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/tmp/bound-ssh-agent
          - ${HOME}/.composer:/srv/.composer
    ## END DEV
    ## BEGIN STAGE
    #monolith-api:
    #    image: dkr.hanaboso.net/pipes/client-cm/monolith:${TAG_MONOLITH}
    #    environment:
    #      BACKEND_HOST: ${BACKEND_URL}/
    #      ELASTIC_HOST: elasticsearch
    #      ELASTIC_INDEX: 'logstash-2018.01.31'
    #    secrets:
    #      - source: clevermonitor-ca.pem
    #        target: /var/www/html/var/secret/ca.crt
    #      - source: clevermonitor-hanaboso.pem
    #        target: /var/www/html/var/secret/keypair.pem
    ## END STAGE

    ## BEGIN DEV
    topology-api:
        user: ${DEV_UID}:${DEV_GID}
        image: dkr.hanaboso.net/pipes/pipes/topology-api:dev
        environment:
          DEPLOYMENT_PREFIX: cleverconnectors
          GENERATOR_NETWORK: cleverconnectors_default
          GENERATOR_MODE: compose
          GENERATOR_PATH: /srv/topology
          MONGO_HOST: mongo
          MONGO_DATABASE: clever-connectors
          RABBITMQ_HOST: rabbitmq
          PROJECT_SOURCE_PATH: ${PROJECT_SOURCE_PATH}/../topology
        volumes:
          - ${DOCKER_SOCKET_PATH}:/var/run/docker.sock
          - ../topology:/srv/topology
    ## END DEV
    ## BEGIN STAGE
    #topology-api:
    #    image: dkr.hanaboso.net/pipes/pipes/topology-api:dev
    #    environment:
    #      DEPLOYMENT_PREFIX: ${DEPLOYMENT_PREFIX}
    #      DOCKER_HOST: tcp://${DOCKER_HOST}
    #      DOCKER_CERT_PATH: /srv/docker-pki
    #      DOCKER_TLS_VERIFY: 1
    #      GENERATOR_NETWORK: ${DEPLOYMENT_PREFIX}_default
    #      GENERATOR_MODE: swarm
    #      GENERATOR_PATH: /tmp
    #      MONGO_HOST: mongo
    #      MONGO_DATABASE: clever-connectors
    #      RABBITMQ_HOST: rabbitmq
    #    secrets:
    #      - source: docker-ca.pem
    #        target: /srv/docker-pki/ca.pem
    #      - source: docker-client-cert.pem
    #        target: /srv/docker-pki/cert.pem
    #      - source: docker-client-key.pem
    #        target: /srv/docker-pki/key.pem
    #      - source: docker-config.json
    #        target: /root/.docker/config.json
    ## END STAGE

    xml-parser-api:
        image: 'dkr.hanaboso.net/pipes/pipes/python-xml-parser:prod'
        environment:
          ## BEGIN DEV
          PARSER_HOST: xml-parser-api
          ## END DEV
          ## BEGIN STAGE
          #PARSER_HOST: 0.0.0.0
          ## END STAGE
          PARSER_PORT: '80'
          PARSER_RELOADED: '1'
          METRICS_HOST: influxdb
          METRICS_PORT: '8089'
        ports:
          - ${DEV_IP}:8080:80

    frontend:
    ## BEGIN DEV
        image: dkr.hanaboso.net/pipes/pipes/nodejs-build:${TAG_NJSBUILD}
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www/pipes/frontend
        environment:
          PHP_WEBROOT: /var/www/pipes/clients/clever-connectors/pipes-api/public
          NPM_INSTALL: ${NPM_INSTALL}
          NPM_START: "yes" # webpackserver
        ports:
          - ${DEV_IP}:80:80
          - ${DEV_IP}:81:8080
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/tmp/bound-ssh-agent
        # TODO: Use dynamic dns resolution in Nginx instead
        depends_on:
          - monolith-api
          - api-demo-fpm
          - kibana
          - grafana
          - spitter-api
          - topology-api
          - notification-sender-fpm
          - notification-center-fpm
    ## END DEV
    ## BEGIN STAGE
    #    image: dkr.hanaboso.net/pipes/pipes/frontend:${TAG_FRONTEND}
    #    environment:
    #      BACKEND_URL: ${BACKEND_URL}/api
    #      PHP_WEBROOT: /var/www/html/public
    #    ports:
    #      - ${PUBLISH_HTTP_PORT}:80
    ## END STAGE
    # TODO: check if we can move some of these aliases directly to monolith-api
        networks:
          default:
            aliases:
              - connector-api
              - mailer-api
              - ftp-api
              - mapper-api
              - notification-sender-api
              - notification-center-api

    stream:
        image: dkr.hanaboso.net/pipes/pipes/stream:dev
        environment:
          - RABBITMQ_HOST=rabbitmq
          - STREAM_WS_PORT=80
          - STREAM_HTTP_PORT=3030
          - STREAM_QUEUE=pipes.stream
        ports:
          - ${DEV_IP}:3030:3030
        # - ${DEV_IP}:8080:80

    # RabbitMQ
    rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - ${DEV_IP}:15672:15672
        volumes:
          - rabbitmq:/var/lib/rabbitmq
        ## BEGIN STAGE
        #ports:
        #  - 15672:15672
        ## END STAGE

    # Storage
    mongo:
        image: mongo:3.4
        ports:
          - ${DEV_IP}:27017:27017
        volumes:
          - mongodb:/data/db
        ## BEGIN STAGE
        #ports:
        #  - 27017:27017
        ## END STAGE

    mariadb:
        image: mariadb:10.3
        command: "mysqld --innodb_flush_method=nosync"
        environment:
          MYSQL_ROOT_PASSWORD: root
        volumes:
          - mariadb:/var/lib/mysql
        ## BEGIN STAGE
        #ports:
        #  - 3306:3306
        ## END STAGE

    redis:
        image: redis:3.2-alpine
        ports:
        - ${DEV_IP}:6379:6379
        volumes:
        - redis:/data
        ## BEGIN STAGE
        #ports:
        #  - 6379:6379
        ## END STAGE

    # ELK
    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:5.6.0
        environment:
          xpack.security.enabled: "false"
        ports:
          - ${DEV_IP}:9200:9200
        volumes:
          - elasticsearch:/usr/share/elasticsearch/data
        ## BEGIN STAGE
        #deploy:
        #  placement:
        #    constraints:
        #      - node.labels.es == ready
        ## END STAGE

    kibana:
        image: docker.elastic.co/kibana/kibana:5.6.0
        command: sh -c 'bin/kibana-plugin remove x-pack; /usr/local/bin/kibana-docker'
        ports:
          - ${DEV_IP}:5601:5601
        ## BEGIN STAGE
        #ports:
        #  - 5601:5601
        ## END STAGE

    logstash:
        image: docker.elastic.co/logstash/logstash:5.6.0
        ## BEGIN DEV
        volumes:
          - ./stack/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
        ## END DEV
        ## BEGIN STAGE
        #configs:
        #  - source: logstash.conf
        #    target: /usr/share/logstash/pipeline/logstash.conf
        ## END STAGE

    # Metrics

    # Grafana is now accessible on route /grafana of the webserver
    grafana:
        image: grafana/grafana:4.2.0
        environment:
          GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
          GF_SECURITY_ADMIN_PASSWORD: password
        volumes:
          - grafana:/var/lib/grafana

    influxdb:
        image: dkr.hanaboso.net/pipes/pipes/influxdb:dev
        environment:
          - INFLUXDB_DB=pipes
        ports:
          - ${DEV_IP}:8083:8083
          - ${DEV_IP}:8086:8086
          - ${DEV_IP}:8089:8089/udp
        volumes:
          - influxdb:/var/lib/influxdb

    telegraf:
        image: telegraf:1.5-alpine
        ## BEGIN DEV
        volumes:
          - ./stack/telegraf.conf:/etc/telegraf/telegraf.conf
        ## END DEV
        ## BEGIN STAGE
        #configs:
        #  - source: telegraf.conf
        #    target: /etc/telegraf/telegraf.conf
        ## END STAGE

    kapacitor:
        image: dkr.hanaboso.net/pipes/pipes/kapacitor:dev

    # Fake Services
    mailhog:
        image: mailhog/mailhog
        ports:
          - ${DEV_IP}:8025:8025

    # Spitter
    spitter-api:
        image: dkr.hanaboso.net/hanaboso/spitter/image:dev
        ports:
            - ${DEV_IP}:8090:80
        restart: always
        environment:
            - NODE_ENV=dev
            - SPITTER_HOST=0.0.0.0
            - SPITTER_PORT=80
#            - SPITTER_PREFFIX=/spitter

    api-demo-fpm:
        image: dkr.hanaboso.net/pipes/client-cm/api-demo:latest
        ## BEGIN DEV
        volumes:
          - ./cc-api-demo/cert:/var/www/html/cert
        environment:
          BASE_URI: https://clever-conn1.stage.hanaboso.net/
        ## END DEV
        ## BEGIN STAGE
        #environment:
        #  BASE_URI: ${BACKEND_URL}/
        #secrets:
        #  - source: stage-staff.pem
        #    target: /var/www/html/cert/stage-staff.pem
        #    mode: 0644
        #  - source: clevermonitor-ca.pem
        #    target: /var/www/html/cert/ca.crt
        #  - source: clevermonitor-hanaboso.pem
        #    target: /var/www/html/cert/clever.pem
        ## END STAGE

    cron-api:
        image: dkr.hanaboso.net/pipes/pipes/python-cron:dev
        ## BEGIN DEV
        user: ${DEV_UID}:${DEV_GID}
        environment:
          - DEV_UID={DEV_UID}
          - DEV_GID={DEV_GID}
        ## END DEV
        ports:
          - ${DEV_IP}:5000:5000
        links:
          - mongo

## BEGIN DEV
volumes:
  mongodb: {}
  grafana: {}
  rabbitmq: {}
  elasticsearch: {}
  redis: {}
  influxdb: {}
  mariadb: {}
## END DEV

