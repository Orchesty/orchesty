version: '2'

services:

    # Services
    cm-api:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:dev
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www/pipes/clients/clever-connectors
        environment:
          DEV_UID: ${DEV_UID}
          DEV_GID: ${DEV_GID}
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/ssh-agent
        depends_on:
          - mongo
          - rabbitmq

    # Frontend
    frontend:
        image: dkr.hanaboso.net/pipes/pipes/nodejs-build:dev
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www/pipes/frontend
        environment:
          DEV_UID: ${DEV_UID}
          DEV_GID: ${DEV_GID}
          PHP_WEBROOT: /var/www/pipes/clients/clever-connectors/web
        ports:
          - ${DEV_IP}:80:80
          #- ${DEV_IP}:81:8080
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/ssh-agent
        depends_on:
          - cm-api
        #command: bash -c "npm install && npm start"

    # Backend
    app:
        image: dkr.hanaboso.net/pipes/pipes/php-dev:dev
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www/pipes/clients/clever-connectors
        environment:
          DEV_UID: ${DEV_UID}
          DEV_GID: ${DEV_GID}
        volumes:
          - ../../:/var/www/pipes
          - ${SSH_AUTH_SOCK}:/ssh-agent
        depends_on:
          - mongo
          - rabbitmq

    # Nginx
    nginx:
        image: nginx
        ports:
          - ${DEV_IP}:8000:8000
        volumes:
          - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
          - ./:/srv/project
        depends_on:
          - cm-api

    # RabbitMQ
    rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - ${DEV_IP}:15672:15672
        volumes:
          - ./.docker-volumes/rabbitmq:/var/lib/rabbitmq

    # Storage
    mongo:
        image: mongo:3.4
        ports:
          - ${DEV_IP}:27017:27017
        volumes:
          - ./.docker-volumes/mongodb:/data/db

volumes:
  mongo: {}
  rabbit-mq: {}