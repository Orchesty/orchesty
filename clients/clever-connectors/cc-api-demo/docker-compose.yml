---
version: '2'

services:
  rabbitmq:
    image: 'rabbitmq:management-alpine'
    ports:
      - 15672:15672

  stream:
    image: 'dkr.hanaboso.net/pipes/pipes/stream:dev'
    environment:
      - RABBITMQ_HOST=rabbitmq
      - STREAM_WS_PORT=80
      - STREAM_HTTP_PORT=3030
      - STREAM_QUEUE=stream
    ports:
      - 3030:3030
      - 8080:80

  webserver:
    build:
        context: .
        args:
            DEV_USERNAME: ${DEV_USERNAME}
            DEV_UID: ${DEV_UID}
    volumes:
      - ./:/var/www/html
      - ../cc-api-extension/:/var/www/cc-api-extension
      - ../cm-stream/:/var/www/cm-stream
    ports:
      - 80:80
  
