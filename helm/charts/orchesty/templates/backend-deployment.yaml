{{- $componentName := "backend" -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pipes.fullname" (dict "suffix" $componentName "root" .) }}
  labels:
{{ include "pipes.labels" . | indent 4 }}
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 4 }}
spec:
  selector:
    matchLabels:
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 6 }}
  template:
    metadata:
      labels:
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 8 }}
    spec:
{{ include "pipes.imagePullSecrets" . | indent 6 }}
      containers:
        - name: php-w-nginx
          image: {{ include "pipes.imageFullname" (dict "image" "backend" "root" .) }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          env:
            - name: TZ
              value: "{{ .Values.global.timezone }}"
            - name: BACKEND_URL
              value: "{{ .Values.global.backend_url }}"
            - name: STARTING_POINT_URL
              value: "{{ .Values.global.starting_point_url }}"
            - name: ALPHA_INSTANCE_ID
              value: "{{ .Values.global.backend.alphaInstanceId }}"
            - name: INSTANCE_URL_PREFIX
              value: "{{ .Values.global.backend.instanceUrlPrefix }}"
            - name: CRON_DSN
              value: "http://{{ include "pipes.fullname" (dict "suffix" "cron-api" "noPrefix" true "root" .) }}:8080"
            - name: PHP_FPM_MAX_REQUESTS
              value: "200"
            - name: PHP_FPM_MAX_CHILDREN
              value: "20"
{{- if (index .Values.global.imageOverrides "applinth-marketplace-ui") }}
            - name: JWE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  key: applinth_jwe_private_key
                  name: {{ include "pipes.secretName" . }}
{{- end }}
            - name: CHECK_INFINITY_LOOP
              value: "{{ .Values.global.backend.checkInfinityLoop }}"
            - name: RABBITMQ_DSN
              valueFrom:
                secretKeyRef:
                  key: rabbitmq_dsn
                  name: {{ include "pipes.secretName" . }}
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  key: backend_jwt_key
                  name: {{ include "pipes.secretName" . }}
            - name: MONGODB_DSN
              valueFrom:
                secretKeyRef:
                  key: mongodb_dsn
                  name: {{ include "pipes.secretName" . }}
            - name: MONGODB_DB
              valueFrom:
                secretKeyRef:
                  key: mongodb_db
                  name: {{ include "pipes.secretName" . }}
            - name: METRICS_DB
              valueFrom:
                secretKeyRef:
                  key: metrics_db
                  name: {{ include "pipes.secretName" . }}
            - name: METRICS_DSN
              valueFrom:
                secretKeyRef:
                  key: metrics_dsn
                  name: {{ include "pipes.secretName" . }}
            - name: TOPOLOGY_API_DSN
              value: "{{ include "pipes.fullname" (dict "suffix" "topology-api" "noPrefix" true "root" .) }}:8080"
            - name: LIMITER_URL
              value: "{{ include "pipes.fullname" (dict "suffix" "limiter" "noPrefix" true "root" .) }}:80"
            - name: FRONTEND_URL
              value: "{{ .Values.global.frontend_url }}/"
{{- if .Values.loki.enabled }}
            - name: LOKI_URL
              value: "http://{{ .Values.global.logs.lokiHostname }}"
{{- end }}

{{- if .Values.global.cloud.enabled }}
            - name: CRON_LIMITS
              value: "1"
            - name: NOTIFIER_DSN
              value: "http://{{ include "pipes.fullname" (dict "suffix" "notifier" "noPrefix" true "root" .) }}:8080"
            - name: TUNNEL_PROXY_HOST
              value: "http://{{ include "pipes.fullname" (dict "suffix" "tunnel-proxy" "noPrefix" true "root" .) }}:8080"
            - name: ORCHESTY_CLOUD_BACKEND_URL
              value: "{{ .Values.global.cloud.backendUrl }}"
            - name: ORCHESTY_CLOUD_FRONTEND_URL
              value: "{{ .Values.global.cloud.frontendUrl }}"
            - name: ORCHESTY_CLOUD_STARTING_POINT_URL
              value: "{{ .Values.global.cloud.startingPointUrl }}"
            - name: ORCHESTY_CLOUD_INSTANCE_ID
              valueFrom:
                secretKeyRef:
                  key: orchesty_cloud_instance_id
                  name: {{ include "pipes.secretName" . }}
            - name: ORCHESTY_CLOUD_INSTANCE_SECRET
              valueFrom:
                secretKeyRef:
                  key: orchesty_cloud_instance_secret
                  name: {{ include "pipes.secretName" . }}
            - name: ORCHESTY_FEATURE_ENTERPRISE_DASHBOARDS
              value: "{{ .Values.global.cloud.features.enterpriseDashboards }}"
            - name: ORCHESTY_FEATURE_TRACE_AUDITING
              value: "{{ .Values.global.cloud.features.traceAuditing }}"
            - name: ORCHESTY_FEATURE_AUDIT_LOGS
              value: "{{ .Values.global.cloud.features.auditLogs }}"
            - name: ORCHESTY_FEATURE_PULSE
              value: "{{ .Values.global.cloud.features.pulse }}"
            - name: ORCHESTY_LIMIT_TOPOLOGY_SLOTS
              value: "{{ .Values.global.cloud.limits.topologySlots }}"
            - name: ORCHESTY_LIMIT_MESSAGES
              value: "{{ .Values.global.cloud.limits.messages }}"
            - name: ORCHESTY_LIMIT_STORAGE_GB
              value: "{{ .Values.global.cloud.limits.storageGb }}"
            - name: ORCHESTY_LIMIT_TRASH_DUPLICATION
              value: "{{ .Values.global.cloud.limits.trashDuplication }}"
            - name: AUTH0_DOMAIN
              value: "{{ .Values.global.cloud.auth0.domain }}"
            - name: AUTH0_AUDIENCE
              value: "{{ .Values.global.cloud.auth0.audience }}"
            - name: TRIALS_ENDS_AT
              value: "{{ .Values.global.cloud.trialEndsAt }}"
            - name: DOCS_SEARCH_URL
              value: "{{ .Values.global.cloud.docsSearchUrl }}"
            - name: DOCS_SEARCH_TOKEN
              valueFrom:
                secretKeyRef:
                  key: orchesty_cloud_docs_search_token
                  name: {{ include "pipes.secretName" . }}
{{- end }}

{{- if not .Values.global.imageOverrides.bridge }}
            - name: DOCKER_PF_BRIDGE_IMAGE
              value: {{ .Values.global.orchestyImageRegistry.server }}/{{ .Values.global.orchestyImageRegistry.path }}/{{ .Values.global.images.bridge }}:{{ .Values.global.orchestyVersion }}
{{- else }}
            - name: DOCKER_PF_BRIDGE_IMAGE
              value: {{ .Values.global.imageOverrides.bridge }}
{{- end }}
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
{{ toYaml .Values.global.backend.resources | indent 12 }}

{{- with .Values.global.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.global.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
