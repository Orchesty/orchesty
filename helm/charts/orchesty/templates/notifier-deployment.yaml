{{- $componentName := "notifier" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pipes.fullname" (dict "suffix" $componentName "root" .) }}
  labels:
{{ include "pipes.labels" . | indent 4 }}
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 6 }}
  template:
    metadata:
      labels:
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 8 }}
    spec:
{{ include "pipes.imagePullSecrets" . | indent 6 }}
      containers:
        - name: notifier
          image: {{ include "pipes.imageFullname" (dict "image" $componentName "root" .) }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TZ
              value: "{{ .Values.global.timezone }}"
            - name: APP_DEBUG
              value: "false"
            - name: MONGO_DSN
              valueFrom:
                secretKeyRef:
                  key: mongodb_dsn
                  name: {{ include "pipes.secretName" . }}
{{- if not .Values.valkey.enabled }}
            - name: REDIS_DSN
              value: "redis://{{ include "pipes.fullname" (dict "suffix" "valkey" "root" .) }}"
{{- end }}
            - name: STARTING_POINT_URL
              value: "{{ .Values.global.notifier.startingPointDsn }}"
            - name: STARTING_POINT_TIMEOUT
              value: "{{ .Values.global.notifier.startingPointTimeout }}"
            - name: THROTTLE_MODE
              value: "{{ .Values.global.notifier.throttleMode }}"
            - name: BUFFER_WINDOW
              value: "{{ .Values.global.notifier.bufferWindow }}"
            - name: THROTTLE_WINDOW
              value: "{{ .Values.global.notifier.throttleWindow }}"
            - name: INAPP_THROTTLE_WINDOW
              value: "{{ .Values.global.notifier.inAppThrottleWindow }}"
          resources:
{{ toYaml .Values.global.notifier.resources | indent 12 }}

{{- with .Values.global.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.global.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
