.base-tunnel-proxy:
  variables:
    DIR: tunel-proxy
    IMAGE: ${REGISTRY}/${IMAGE_PREFIX}tunnel-proxy

tunnel-proxy:test:
  stage: test
  extends:
    - .base-test
    - .base-tunnel-proxy

tunnel-proxy:build:
  stage: build
  needs:
    - job: tunnel-proxy:test
      optional: false
  extends:
    - .base-dind-build
    - .base-tunnel-proxy
