services:
    app:
        image: hanabosocom/go-base:1.26
        user: ${DEV_UID}:${DEV_GID}
        environment:
            DEV_UID: ${DEV_UID}
            DEV_GID: ${DEV_GID}
            APP_DEBUG: 'true'
        volumes:
            - .:/app:cached
            - ${GOPATH}/pkg:/go/pkg
        ports:
            - ${DEV_IP}:8080:8080
            - ${DEV_IP}:50051:50051
            - ${DEV_IP}:2345:2345
        command: /run.sh -p cmd/server/main.go -l 2345
        security_opt: ['seccomp:unconfined']
