services:

    app:
        image: node-sdk:tag
        build: docker
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www
        volumes:
            - ./:/var/www:cached
        environment:
            # Envs for tests are load from node-sdk/.jest/testEnvs.js
            JEST_DOCKER: 1
            APP_ENV: debug
        command: sleep infinity

    redis:
        image: redis
        ports:
            - ${DEV_IP}:6379:6379
