version: '3.5'

services:

    app:
        image: node-sdk:tag
        build: docker
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www
        volumes:
            - ./:/var/www:cached
        environment:
            # Envs for tests are load from node-sdk/.jest/testEnvs.js
            JEST_DOCKER: 1
            APP_ENV: debug
        command: sh -c 'pnpm install && pnpm run start'

    mongodb:
        image: mongo
        ports:
            - ${DEV_IP}:27017:27017

volumes:
    mongodb: {}
