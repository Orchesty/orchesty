.base-pf-bundles-enterprise:
  variables:
    DIR: pf-bundles-enterprise
    IMAGE: ${REGISTRY}/${IMAGE_PREFIX}pf-bundles-enterprise

pf-bundles-enterprise:test:
  stage: test
  extends:
    - .base-test
    - .base-pf-bundles-enterprise

pf-bundles-enterprise:build:
  stage: build
  needs:
    - job: pf-bundles-enterprise:test
      optional: false
  extends:
    - .base-dind-build
    - .base-pf-bundles-enterprise
