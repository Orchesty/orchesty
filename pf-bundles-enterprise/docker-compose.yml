services:
    app:
        image: hanabosocom/php-dev:php-8.4-alpine
        user: ${DEV_UID}:${DEV_GID}
        ports:
            - ${DEV_IP}:80:80
        working_dir: /var/www/pipes/pf-bundles-enterprise
        volumes:
            - ../:/var/www/pipes:cached
            - ${HOME}/dev/.composer:${HOME}/dev/.composer:cached
        environment:
            APP_ENV: dev
            APP_DEBUG: 'true'
            PHP_WEBROOT: /var/www/pipes/pf-bundles-enterprise/public
            DEV_UID: ${DEV_UID}
            DEV_GID: ${DEV_GID}
            KERNEL_CLASS: Hanaboso\PipesFrameworkEnterprise\Kernel
            COMPOSER_HOME: ${HOME}/dev/.composer
            FRONTEND_URL: ${DEV_IP}
            BACKEND_URL: ${DEV_IP}
            MONGODB_DSN: mongodb://mongo
            MONGODB_DB: pipes
            METRICS_DSN: mongodb://mongo
            METRICS_DB: metrics
            CHECK_INFINITY_LOOP: 'true'
            TOPOLOGY_API_DSN: topology-api:80
            STARTING_POINT_URL: starting-point:8080
            CRON_DSN: http://cron-api:8080
            RABBITMQ_DSN: amqp://rabbitmq:5672
            WORKER_DEFAULT_PORT: 8008
            JWT_KEY: BWoCz4gxw3YHDMkqE5HD1WT2u6zqIAtiJkYVyf6UucL4ZtbhhatQooP5IgTQRwowYR6z8wE3biqZTl37
            ORCHESTY_CLOUD_URL: ''
            ORCHESTY_CLOUD_INSTANCE_ID: ''
            ORCHESTY_CLOUD_INSTANCE_SECRET: ''
            ORCHESTY_CLOUD_INSTANCE_NAME: ''
            AUTH0_DOMAIN: ''
            AUTH0_AUDIENCE: ''
            SYSTEM_ORCHESTY_URL: ''
            ORCHESTY_FEATURE_ENTERPRISE_DASHBOARDS: 'false'
            ORCHESTY_FEATURE_TRACE_AUDITING: 'false'
            ORCHESTY_FEATURE_AUDIT_LOGS: 'false'
            ORCHESTY_FEATURE_PULSE: 'false'
            ORCHESTY_LIMIT_TOPOLOGY_SLOTS: '0'
            ORCHESTY_LIMIT_MESSAGES: '0'
            ORCHESTY_LIMIT_STORAGE_GB: '0'

    swagger-ui:
        image: swaggerapi/swagger-ui
        ports:
            - ${DEV_IP}:8080:8080
        volumes:
            - ./openapi.yaml:/api.yaml
        environment:
            SWAGGER_JSON: /api.yaml

    mongo:
        image: mongo:latest
        ports:
            - ${DEV_IP}:27017:27017
        volumes:
            - mongo:/data/db

volumes:
    mongo: {}
