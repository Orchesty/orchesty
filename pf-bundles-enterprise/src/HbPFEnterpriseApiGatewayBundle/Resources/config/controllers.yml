services:
    _defaults:
        public: '%public.services%'
        autowire: true
        autoconfigure: true

    Hanaboso\PipesFramework\HbPFApiGatewayBundle\Controller\StatusController:
        class: Hanaboso\PipesFramework\HbPFApiGatewayBundle\Controller\StatusController
        arguments:
            $orchesryCloudUrl: '%orchesty_cloud_url%'
            $orchesryCloudFrontendUrl: '%orchesty_cloud_frontend_url%'
            $orchesryCloudInstanceName: '%orchesty_cloud_instance_name%'
            $featureEnterpriseDashboards: '%feature_enterprise_dashboards%'
            $featureTraceAuditing: '%feature_trace_auditing%'
            $featureAuditLogs: '%feature_audit_logs%'
            $featurePulse: '%feature_pulse%'

    Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\AuditEntityController:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\AuditEntityController

    Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\EnterpriseUserController:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\EnterpriseUserController
        arguments:
            - '@hbpf.user.handler.users'
            - '@security.token_storage'

    Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\CloudWebhookController:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\CloudWebhookController
        arguments:
            - '@hbpf.cloud.handler.user_sync'
            - '@hbpf.cloud.member_sync'
            - '@hbpf.user.manager.security'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '%orchesty_cloud_instance_secret%'

    hbpf.cloud.handler.user_sync:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseConfiguratorBundle\Handler\CloudUserSyncHandler
        arguments:
            - '@hbpf.transport.curl_manager'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@security.password_hasher_factory'
            - '@hbpf.manager.group'
            - '%orchesty_cloud_url%'

    hbpf.cloud.member_sync:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseConfiguratorBundle\Handler\CloudMemberSyncService
        arguments:
            - '@hbpf.transport.curl_manager'
            - '%orchesty_cloud_url%'
            - '%orchesty_cloud_instance_id%'
            - '%orchesty_cloud_instance_secret%'

    hbpf.system_topology:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseConfiguratorBundle\Handler\SystemTopologyService
        arguments:
            $curlManager: '@hbpf.transport.curl_manager'
            $dml: '@hbpf.database_manager_locator'
            $systemOrchestyUrl: '%system_orchesty_url%'
            $startingPointHost: '%startingPointHost%'
            $frontendHost: '%frontendHost%'
            $cloudFrontendUrl: '%orchesty_cloud_frontend_url%'
            $logger: '@?logger'

    hbpf.user.handler.users:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseConfiguratorBundle\Handler\EnterpriseUserHandler
        arguments:
            - '@hbpf.user.manager.user'
            - '@hbpf.user.manager.users'
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.user.manager.token'
            - '@hbpf.user.provider.resource'
            - '@hbpf.cloud.member_sync'
            - '@security.password_hasher_factory'
            - '@hbpf.manager.group'
            - '@hbpf.system_topology'

    hbpf.group.handler:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseConfiguratorBundle\Handler\EnterpriseGroupHandler
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.access.manager'
            - '@hbpf.manager.group'
            - '@hbpf.factory.mask'

    Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\EnterpriseGroupController:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\EnterpriseGroupController
        arguments:
            - '@hbpf.group.handler'
            - '@security.token_storage'

    Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseConfiguratorBundle\Subscriber\UserActivateSubscriber:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseConfiguratorBundle\Subscriber\UserActivateSubscriber
        arguments:
            - '@doctrine_mongodb.odm.default_document_manager'
            - '@hbpf.manager.group'
        tags:
            - { name: kernel.event_subscriber }

    Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\NotificationController:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\NotificationController

    hbpf.audit_log.handler:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseConfiguratorBundle\Handler\AuditLogHandler
        arguments:
            - '@Hanaboso\PipesFrameworkEnterprise\AuditLog\Repository\AuditLogRepository'

    Hanaboso\PipesFrameworkEnterprise\AuditLog\Repository\AuditLogRepository:
        class: Hanaboso\PipesFrameworkEnterprise\AuditLog\Repository\AuditLogRepository
        factory: ['@doctrine_mongodb.odm.default_document_manager', 'getRepository']
        arguments:
            - 'Hanaboso\PipesFrameworkEnterprise\AuditLog\Document\AuditLog'

    Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\AuditLogController:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\AuditLogController
        arguments:
            - '@hbpf.audit_log.handler'

    Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\ResourceController:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\ResourceController
        arguments:
            - '@hbpf.configurator.handler.topology'

    Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\CloudMetricsController:
        class: Hanaboso\PipesFrameworkEnterprise\HbPFEnterpriseApiGatewayBundle\Controller\CloudMetricsController
        arguments:
            - '@hbpf.cloud.metrics_handler'
            - '%orchesty_cloud_instance_id%'
            - '%orchesty_cloud_instance_secret%'

    hbpf.auth0.jwks_cache:
        class: Hanaboso\PipesFrameworkEnterprise\ApiGateway\Authenticator\Auth0\JwksCacheService
        arguments:
            - '%auth0_domain%'
            - '@cache.app'

