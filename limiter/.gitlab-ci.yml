.base-limiter:
  variables:
    DIR: limiter
    IMAGE: ${REGISTRY}/${IMAGE_PREFIX}limiter

limiter:test:
  stage: test
  extends:
    - .base-test
    - .base-limiter

limiter:build:
  stage: build
  needs:
    - job: limiter:test
      optional: false
  extends:
    - .base-dind-build
    - .base-limiter
