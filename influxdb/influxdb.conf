[meta]
  dir = "/var/lib/influxdb/meta"

[data]
  dir = "/var/lib/influxdb/data"
  engine = "tsm1"
  wal-dir = "/var/lib/influxdb/wal"

[http]
  enabled = true
  bind-address = "0.0.0.0:8086"

[[udp]]
  enabled = true
  bind-address = "0.0.0.0:8089"
  database = "pipes"
  batch-size = 5000
  batch-timeout = "2s"
  batch-pending = 10
  read-buffer = 0
