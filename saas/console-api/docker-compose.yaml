version: '3.5'
services:

    console-api:
        image: console-api:tag
        build: ./docker
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www
        ports:
            - ${DEV_IP}:3000:3000
        volumes:
            - ./:/var/www
        environment:
            # Envs for tests are load from .jest/testEnvs.js
            JEST_DOCKER: 1
            APP_ENV: 'debug'
            NODE_ENV: 'dev'
            MONGODB_DSN: mongodb://mongo
            FIREBASE_API_KEY: AIzaSyANIRePUXX1f8fr-IS2ljSU8FgLkC53a0o
            FIREBASE_AUTH_DOMAIN: 'orchesty-cloud-stage.firebaseapp.com'
            USCCP_URI: 'http://usscp'
            CLOUD_CONTROLLER_URI: 'http://cloud_controller'
            CLOUD_BRIDGE: 'false'
        command: sleep infinity
        depends_on:
            mongo:
                condition: service_healthy

    mongo:
        image: mongo:latest
        ports:
            - ${DEV_IP}:27017:27017
        volumes:
            - mongo:/data/db
        healthcheck:
            test: echo 'db.runCommand("ping").ok' | mongosh mongo:27017/test --quiet
            interval: 10s
            timeout: 10s
            retries: 5
            start_period: 40s

volumes:
    mongo: { }
