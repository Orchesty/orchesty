openapi: 3.0.0
info:
    title: Sample API
    description: |
        # Error codes:
        ## DateTime format error
        - 1001 - timeRangeStart and/or timeRangeEnd are in invalid format
        - 1002 - installedDate is in invalid format
        - 1003 - tail is used with timeRange parameters
    version: 0.1.9
paths:
    /status:
        get:
            description: Service status for health checking
            x-swagger-router-controller: status
            operationId: status
            security: [ ]
            tags:
                - Health check
            responses:
                '200':
                    description: Healthy
    /billing/reports/apps:
        get:
            description: Get billing report aggregated by an appId
            x-swagger-router-controller: usageStats
            operationId: usageStatsApps
            tags:
                - Billing
            parameters:
                -   $ref: "#/components/parameters/tenantId"
                -   $ref: "#/components/parameters/instanceId"
                -   $ref: "#/components/parameters/timeRangeStart"
                -   $ref: "#/components/parameters/timeRangeEnd"
                -   $ref: "#/components/parameters/appId"
                -   $ref: "#/components/parameters/tail"
                -   $ref: "#/components/parameters/granularity"
            responses:
                '200':
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/UsageStatsApps"
                '400':
                    $ref: "#/components/responses/400BadRequest"
                '401':
                    $ref: "#/components/responses/401Unauthorized"
                '403':
                    $ref: "#/components/responses/403Forbidden"
                '404':
                    $ref: "#/components/responses/404NotFound"
                '500':
                    $ref: "#/components/responses/500BadRequest"
    /billing/reports/installedApps:
        get:
            description: Get list of installed apps for one end user
            x-swagger-router-controller: usageStats
            operationId: usageStatsInstalledApps
            tags:
                - Billing
            parameters:
                -   $ref: "#/components/parameters/tenantId"
                -   $ref: "#/components/parameters/instanceId"
                -   $ref: "#/components/parameters/requiredEndUserId"
                -   $ref: "#/components/parameters/tail"
                -   in: query
                    name: installedDate
                    description: Filter by installedDate, used now if not sent, cannot be used with tail
                    required: false
                    schema:
                        type: string
            responses:
                '200':
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/UsageStatsInstalledApps"
                '400':
                    $ref: "#/components/responses/400BadRequest"
                '401':
                    $ref: "#/components/responses/401Unauthorized"
                '403':
                    $ref: "#/components/responses/403Forbidden"
                '404':
                    $ref: "#/components/responses/404NotFound"
                '500':
                    $ref: "#/components/responses/500BadRequest"
