security:
    -   Bearer: [ ]
components:
    securitySchemes:
        identityPlatform:
            type: "oauth2"
            flows:
                implicit:
                    authorizationUrl: "https://localhost:3000"
                    scopes: { }
                    x-google-issuer: "https://securetoken.google.com/orchesty-cloud-stage"
                    x-google-jwks_uri: "https://www.googleapis.com/service_accounts/v1/metadata/x509/securetoken@system.gserviceaccount.com"
                    x-google-audiences: "orchesty-cloud-stage"
    parameters:
        tenantId:
            in: query
            name: tenantId
            description: Tenant ID to get data for. If not specified, logged-in user is assumed
            required: false
            schema:
                type: string
        tenantIdPath:
            in: path
            name: tenantId
            description: Tenant ID to get data for.
            required: true
            schema:
                type: string
        _idPath:
            in: path
            name: _id
            description: Entity ID to get data for.
            required: true
            schema:
                type: string
        requiredTimeRangeStart:
            in: query
            name: timeRangeStart
            description: Start of the time range to show (inclusive). Must be in ISO 8601 format.
            required: true
            schema:
                type: string
                example: 2018-03-20T09:12:28Z
        requiredTimeRangeEnd:
            in: query
            name: timeRangeEnd
            description: End of the time range to show (exclusive). Must be in ISO 8601 format.
            required: true
            schema:
                type: string
                example: 2018-03-20T09:12:28Z
        timeRangeStart:
            in: query
            name: timeRangeStart
            description: Start of the time range to show (inclusive). Must be in ISO 8601 format. If not selected, start of month is used.
            required: false
            schema:
                type: string
                example: 2018-03-20T09:12:28Z
        timeRangeEnd:
            in: query
            name: timeRangeEnd
            description: End of the time range to show (exclusive). Must be in ISO 8601 format. If not selected, end of month is used.
            required: false
            schema:
                type: string
                example: 2018-03-20T09:12:28Z
        instanceId:
            in: query
            name: instanceId
            description: Filter by instanceId
            required: false
            schema:
                type: string
        endUserId:
            in: query
            name: endUserId
            description: Filter by endUserId
            required: false
            schema:
                type: string
        requiredEndUserId:
            in: query
            name: endUserId
            description: Filter by endUserId
            required: true
            schema:
                type: string
        appName:
            in: query
            name: appName
            description: Filter by appName
            required: false
            schema:
                type: string
        tail:
            in: query
            name: tail
            description: Show installed data. Not to use with time range parameters.
            required: false
            schema:
                type: boolean
        appId:
            in: query
            name: appId
            description: Filter by appId
            required: false
            schema:
                type: string
        requiredAppName:
            in: query
            name: appName
            description: Filter by appName
            required: true
            schema:
                type: string
        requiredAppId:
            in: query
            name: appId
            description: Filter by appId
            required: true
            schema:
                type: string
        granularity:
            in: query
            name: granularity
            description: Set time granularity
            required: false
            schema:
                type: string
                example: 'hourly'
                enum:
                    - 'hourly'
                    - 'daily'
                    - 'monthly'
                default: 'monthly'
        granularityDailyMonthly:
            in: query
            name: granularity
            description: Set time granularity
            required: false
            schema:
                type: string
                example: 'daily'
                enum:
                    - 'daily'
                    - 'monthly'
                default: 'monthly'
        emails:
            in: query
            name: emails
            description: List of user emails, separated by comma
            required: false
            schema:
                type: string
        uid:
            in: query
            name: uid
            description: User identifier
            required: false
            schema:
                type: string
        uidPath:
            in: path
            name: uid
            description: User identifier
            required: true
            schema:
                type: string

    requestBodies:
        UserBody:
            description: A JSON object containing user information
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            -   $ref: '#/components/schemas/CreateUser'
        UpdateUserBody:
            description: A JSON object containing user information
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            -   $ref: '#/components/schemas/UpdateUser'
        TenantBody:
            description: A JSON object containing user information
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            -   $ref: '#/components/schemas/CreateTenant'
        UpdateTenantBody:
            description: A JSON object containing user information
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            -   $ref: '#/components/schemas/UpdateTenant'
        ClientBody:
            description: A JSON object containing user information
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            -   $ref: '#/components/schemas/CreateClient'
        AddressBody:
            description: A JSON object containing user information
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            -   $ref: '#/components/schemas/CreateAddress'
        CloudBody:
            description: A JSON object containing user information
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            -   $ref: '#/components/schemas/CreateCloud'
        ApplinthBody:
            description: A JSON object containing user information
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            -   $ref: '#/components/schemas/CreateApplinth'
        OrchestyBody:
            description: A JSON object containing user information
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            -   $ref: '#/components/schemas/CreateOrchesty'
        CorrectionBody:
            description: A JSON object containing user information
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            -   $ref: '#/components/schemas/CreateCorrection'
        ModuleBody:
            description: A JSON object containing user information
            required: true
            content:
                application/json:
                    schema:
                        oneOf:
                            -   $ref: '#/components/schemas/CreateModule'
    schemas:
        UsageStatsApps:
            type: object
            properties:
                rows:
                    type: array
                    items:
                        type: object
                        properties:
                            appName:
                                description: Application name (also ID)
                                type: string
                            appId:
                                description: Application id (also Name)
                                type: string
                            endUsers:
                                description: Number of unique end users having the app installed within the given period
                                type: integer
                            totalCost:
                                description: Total installs cost for this app
                                type: integer
                            estimatedTotalCost:
                                description: Total estimated installs cost for this app
                                type: integer
                            installCount:
                                description: Total number of installs
                                type: integer
                            instanceIds:
                                description: Array of instance ids
                                type: array
                                items:
                                    type: string
                billingHistoryStart:
                    type: string
                billingHistoryEnd:
                    type: string
        UsageStatsInstalledApps:
            type: object
            properties:
                rows:
                    type: array
                    items:
                        type: object
                        properties:
                            appName:
                                description: Application name (also ID)
                                type: string
                            appId:
                                description: Application ID (also Name)
                                type: string
                            installed:
                                description: App installation date
                                type: string
                            instanceId:
                                description: App instance id
                                type: string
                billingHistoryStart:
                    type: string
                billingHistoryEnd:
                    type: string
        UsageStatsTimeBucketUsers:
            type: object
            properties:
                rows:
                    type: array
                    items:
                        type: object
                        properties:
                            timeBucketName:
                                description: Name of time bucket in format (MM/YYYY)
                                type: string
                            endUsers:
                                description: Number of unique end users having the app installed within the given period
                                type: integer
