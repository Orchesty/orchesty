apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "instance-proxy.fullname" . }}
  labels:
    {{- include "instance-proxy.labels" . | nindent 4 }}
data:
  haproxy.cfg: |
    global
      user haproxy
      group haproxy
      stats      socket /var/run/api.sock mode 660 level admin expose-fd listeners
      log        stdout format raw local0
      maxconn    5000


    resolvers system
        parse-resolv-conf


    defaults
        log                     global
        option                  dontlognull
        option                  httplog

        option                  redispatch
        option http-keep-alive
        retries                 3
        timeout connect         5s
        timeout client          60s
        timeout server          30s
        timeout http-keep-alive 2s

        default-server resolvers system init-addr none


    frontend stats
        mode http
        bind *:8081
        stats enable
        stats uri /
        stats refresh 10s
        stats admin if LOCALHOST


    frontend ping
        mode http
        bind *:8082
        http-request set-log-level silent
        use_backend ping


    frontend instance_proxy
        mode http
        bind *:8080

        # instance-iqnb4x3vhd

        acl api-instance-iqnb4x3vhd hdr_beg(host) api-iqnb4x3vhd.eu1.cloud.orchesty.io
        use_backend api-iqnb4x3vhd if api-instance-iqnb4x3vhd

        acl ui-instance-iqnb4x3vhd hdr_beg(host) ui-iqnb4x3vhd.eu1.cloud.orchesty.io
        use_backend ui-iqnb4x3vhd if ui-instance-iqnb4x3vhd

        acl start-instance-iqnb4x3vhd hdr_beg(host) start-iqnb4x3vhd.eu1.cloud.orchesty.io
        use_backend start-iqnb4x3vhd if start-instance-iqnb4x3vhd

        acl applinth-instance-iqnb4x3vhd hdr_beg(host) applinth-iqnb4x3vhd.eu1.cloud.orchesty.io
        use_backend applinth-iqnb4x3vhd if applinth-instance-iqnb4x3vhd

        acl shoptet-cs-instance-iqnb4x3vhd hdr_beg(host) shoptet-cs-iqnb4x3vhd.eu1.cloud.orchesty.io
        use_backend shoptet-cs-iqnb4x3vhd if shoptet-cs-instance-iqnb4x3vhd

        # legacy
        acl shoptet-cs-instance-iqnb4x3vhd hdr_beg(host) shoptet-cs-yr2de-g59q8.tenant-eu1.cloud.orchesty.io
        use_backend shoptet-cs-iqnb4x3vhd if shoptet-cs-instance-iqnb4x3vhd


        # instance-nezqa6b4df

