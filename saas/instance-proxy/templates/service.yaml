apiVersion: v1
kind: Service
metadata:
  name: {{ include "instance-proxy.fullname" . }}
  labels:
    {{- include "instance-proxy.labels" . | nindent 4 }}
  annotations:
    cloud.google.com/neg: '{"exposed_ports": {"80":{"name": "{{ include "instance-proxy.fullname" . }}"}}}'
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "instance-proxy.selectorLabels" . | nindent 4 }}
