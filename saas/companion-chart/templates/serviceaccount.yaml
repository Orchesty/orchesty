---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchesty-cloud-companion


---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchesty-cloud-companion
rules:
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get"]


---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchesty-cloud-companion
subjects:
- kind: ServiceAccount
  name: orchesty-cloud-companion
roleRef:
  kind: Role
  name: orchesty-cloud-companion
  apiGroup: rbac.authorization.k8s.io
