apiVersion: v1
kind: Service
metadata:
  name: {{ include "usccp.fullname" . }}
  labels:
    {{- include "usccp.labels" . | nindent 4 }}
  annotations:
    cloud.google.com/neg: '{"exposed_ports": {"80":{"name": "usccp"}}}'
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP      
  selector:
    {{- include "usccp.selectorLabels" . | nindent 4 }}
