services:
    applinth-billing-processor:
        image: applinth-billing-processor:tag
        build: ./docker
        user: ${DEV_UID}:${DEV_GID}
        working_dir: /var/www
        ports:
            - ${DEV_IP}:3000:3000
        volumes:
            - ./:/var/www
        environment:
            # Envs for tests are load from .jest/testEnvs.js
            JEST_DOCKER: 1
            APP_ENV: 'debug'
            NODE_ENV: 'dev'
            MONGODB_DSN: mongodb://mongodb
        command: sleep infinity

    mongodb:
        image: mongo:latest
        ports:
            - ${DEV_IP}:27017:27017
