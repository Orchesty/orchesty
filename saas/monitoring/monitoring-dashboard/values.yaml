influxdb2:
    service:
        type: LoadBalancer

    adminUser:
        organization: default
        bucket: default
        user: admin
        retention_policy: 4w
        existingSecret: monitoring-dashboard-influxdb

grafana:
    persistence:
        enabled: true

    service:
        type: LoadBalancer

    admin:
        existingSecret: monitoring-dashboard-grafana
