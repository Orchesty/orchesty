apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cluster-telegraf.fullname" . }}
  labels:
    {{- include "cluster-telegraf.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cluster-telegraf.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml .Values.podAnnotations | nindent 8 }}
        {{- end }}
      labels:
        {{- include "cluster-telegraf.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cluster-telegraf.fullname" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: INFLUXDB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cluster-telegraf.fullname" . }}
                  key: INFLUXDB_URL
            - name: INFLUXDB_ORG
              valueFrom:
                secretKeyRef:
                  name: {{ include "cluster-telegraf.fullname" . }}
                  key: INFLUXDB_ORG
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "cluster-telegraf.fullname" . }}
                  key: INFLUXDB_TOKEN
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cluster-telegraf.fullname" . }}
                  key: RABBITMQ_URL
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "cluster-telegraf.fullname" . }}
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cluster-telegraf.fullname" . }}
                  key: RABBITMQ_PASSWORD
          volumeMounts:
            - name: config-volume
              mountPath: /etc/telegraf
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "cluster-telegraf.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
