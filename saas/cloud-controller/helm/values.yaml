# Default values for cloud-controller.
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: dkr.hanaboso.net/pipes/pipes/saas-cloud-controller
  pullPolicy: Always
  tag: test

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

secret:
  name: cloud-controller
  keys:
    mongodbDsn: mongodb_dsn
    mongodbHostname: mongodb_hostname
    rabbitHostname: rabbit_hostname
    rabbitManagementPort: rabbit_management_port
    rabbitAdminUser: rabbit_admin_user
    rabbitAdminPass: rabbit_admin_pass

env:
  appDebug: true
  appOrchestyVersion: "2.1"
  helmOrchestyVersion: "2.1.17"
  helmBridgePoolKey: bridgepool

kong:
  enabled: false
  adminUrl: "http://kong-kong-admin.kong.svc.cluster.local:8001"
  domainSuffix: "eu1.cloud.orchesty.io"

gcs:
  enabled: false
  projectId: "orchesty-cloud-prod"
  credentialsSecretName: "gcs-credentials"
  serviceAccountEmail: "cloud-control@orchesty-cloud-prod.iam.gserviceaccount.com"

resources: {}
