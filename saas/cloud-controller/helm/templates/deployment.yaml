apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloud-controller.fullname" . }}
  labels:
    {{- include "cloud-controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cloud-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cloud-controller.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccount: {{ include "cloud-controller.fullname" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_DEBUG
              value: {{ .Values.env.appDebug | quote }}
            - name: APP_ORCHESTY_VERSION
              value: {{ .Values.env.appOrchestyVersion | quote }}
            - name: HELM_ORCHESTY_VERSION
              value: {{ .Values.env.helmOrchestyVersion | quote }}
            - name: HELM_BRIDGEPOOL_KEY
              value: {{ .Values.env.helmBridgePoolKey | quote }}
            - name: MONGODB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.mongodbDsn }}
            - name: MONGODB_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.mongodbHostname }}
            - name: RABBIT_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.rabbitHostname }}
            - name: RABBIT_MANAGEMENT_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.rabbitManagementPort }}
            - name: RABBIT_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.rabbitAdminUser }}
            - name: RABBIT_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.rabbitAdminPass }}
          livenessProbe:
            httpGet:
              path: /status
              port: http
          readinessProbe:
            httpGet:
              path: /status
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
