apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloud-controller.fullname" . }}
  labels:
    {{- include "cloud-controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cloud-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cloud-controller.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccount: {{ include "cloud-controller.fullname" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_DEBUG
              value: {{ .Values.env.appDebug | quote }}
            - name: APP_ORCHESTY_VERSION
              value: {{ .Values.env.appOrchestyVersion | quote }}
            - name: HELM_ORCHESTY_VERSION
              value: {{ .Values.env.helmOrchestyVersion | quote }}
            - name: HELM_BRIDGEPOOL_KEY
              value: {{ .Values.env.helmBridgePoolKey | quote }}

            # MongoDB
            - name: MONGODB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.mongodbDsn }}
            - name: MONGODB_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.mongodbHostname }}

            # RabbitMQ
            - name: RABBIT_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.rabbitHostname }}
            - name: RABBIT_MANAGEMENT_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.rabbitManagementPort }}
            - name: RABBIT_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.rabbitAdminUser }}
            - name: RABBIT_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.keys.rabbitAdminPass }}

            # Kong
            - name: KONG_ENABLED
              value: {{ .Values.kong.enabled | quote }}
            - name: KONG_ADMIN_URL
              value: {{ .Values.kong.adminUrl | quote }}
            - name: KONG_DOMAIN_SUFFIX
              value: {{ .Values.kong.domainSuffix | quote }}

            # Cloud / Auth0
            - name: CLOUD_INSTANCE_PREFIX
              value: {{ .Values.cloud.instancePrefix | quote }}
            - name: CLOUD_INSTANCE
              value: {{ .Values.cloud.instance | quote }}
            - name: CLOUD_AUTH0_DOMAIN
              value: {{ .Values.cloud.auth0.domain | quote }}
            - name: CLOUD_AUTH0_AUDIENCE
              value: {{ .Values.cloud.auth0.audience | quote }}
            - name: CLOUD_AUTH0_CLIENT_ID
              value: {{ .Values.cloud.auth0.clientId | quote }}

            # GCS
            - name: GCS_ENABLED
              value: {{ .Values.gcs.enabled | quote }}
            - name: GCS_PROJECT_ID
              value: {{ .Values.gcs.projectId | quote }}
            {{- if .Values.gcs.credentialsSecretName }}
            - name: GCS_CREDENTIALS_FILE
              value: "/var/secrets/gcs/key.json"
            {{- end }}
            - name: GCS_SERVICE_ACCOUNT_EMAIL
              value: {{ .Values.gcs.serviceAccountEmail | quote }}
          livenessProbe:
            httpGet:
              path: /status
              port: http
          readinessProbe:
            httpGet:
              path: /status
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.gcs.credentialsSecretName }}
          volumeMounts:
            - name: gcs-credentials
              mountPath: /var/secrets/gcs
              readOnly: true
          {{- end }}

      {{- if .Values.gcs.credentialsSecretName }}
      volumes:
        - name: gcs-credentials
          secret:
            secretName: {{ .Values.gcs.credentialsSecretName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
