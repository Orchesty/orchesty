<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Installer - UI</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
              integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
              crossorigin="anonymous">
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
                integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
                crossorigin="anonymous"></script>
    </head>
    <body>
        <form action="http://127.0.0.88:8000/installer" method="post" class="col-lg-6">
            <div class="col-lg-12">
                <h1>Installer</h1>
            </div>
            <div>
                <div class="col-lg-12">
                    <h3>Choose Logs</h3>
                    <div class="col-lg-6">
                        <input type="radio" name="logs" value="elasticsearch" checked>Elasticsearch
                    </div>
                    <div class="col-lg-6">
                        <input type="radio" name="logs" value="logstash">Logstash
                    </div>
                </div>
                <div class="col-lg-12">
                    <h3>Choose metrics</h3>
                    <div class="col-lg-6">
                        <input type="radio" name="metrics" value="influxdb" checked>Influx
                    </div>
                    <div class="col-lg-6">
                        <input type="radio" name="metrics" value="mongo">Mongo
                    </div>
                </div>
                <div class="col-lg-12">
                    <h3>Choose database</h3>
                    <div class="col-lg-6">
                        <input id="database_input" type="checkbox" name="database" value="true" checked/>Database
                    </div>
                </div>
            </div>
            <div class="col-lg-12">
                <button class="btn btn-success mt-3" type="submit">Get Installer file</button>
            </div>
        </form>

    </body>
</html>
