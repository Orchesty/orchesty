openapi: 3.0.0

info:
    title: Applinth
    description: Applinth API
    version: '1.0'

servers:
    -   url: http://127.0.0.88
        description: Local Docker

    -   url: https://api-orchesty.stage.hanaboso.net/
        description: Orchesty/Applinth Stage

security:
    -   JWTAuth: [ ]

paths:
    /api/applinth/authorization/login:
        post:
            tags: [ Authorization ]
            security:
                - JWTAuth: []
            parameters:
                -   $ref: '#/components/parameters/Scope'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                allOf:
                                    -   $ref: '#/components/schemas/LoggedUser'
                                    -   type: object
                                        properties:
                                            refresh_token:
                                                type: string
                                                nullable: true
                                            oauth_redirect_link:
                                                type: string
                                                nullable: true

    /api/applinth/authorization/refresh:
        post:
            tags: [ Authorization ]
            security: [ ]
            requestBody:
                description: ''
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                refresh_token:
                                    type: string
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/LoggedUser'

    /api/applinth/authorization/logged:
        get:
            tags: [ Authorization ]
            security: [ ]
            description: 'Refresh token must be send in the "refresh_token" cookie.'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/LoggedUser'

    /api/applinth/application/installed:
        get:
            tags: [ Applications ]
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                allOf:
                                    -   $ref: '#/components/schemas/Grid'
                                    -   type: object
                                        properties:
                                            host:
                                                allOf:
                                                    -   $ref: '#/components/schemas/Host'
                                            items:
                                                type: array
                                                items:
                                                    $ref: '#/components/schemas/AppInstall'

    /api/applinth/application/available:
        get:
            tags: [ Applications ]
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                allOf:
                                    -   $ref: '#/components/schemas/Grid'
                                    -   type: object
                                        properties:
                                            host:
                                                allOf:
                                                    -   $ref: '#/components/schemas/Host'
                                            items:
                                                type: array
                                                items:
                                                    $ref: '#/components/schemas/BasicApp'

    /api/applinth/application/{key}/preview:
        get:
            tags: [ Applications ]
            parameters:
                -   $ref: '#/components/parameters/Key'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/BasicApp'

    /api/applinth/application/{key}:
        get:
            tags: [ Applications ]
            parameters:
                -   $ref: '#/components/parameters/Key'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AppDetail'
        post:
            tags: [ Applications ]
            parameters:
                -   $ref: '#/components/parameters/Key'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AppDetail'
        put:
            tags: [ Applications ]
            parameters:
                -   $ref: '#/components/parameters/Key'
            requestBody:
                description: ''
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AppSettingsInput'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AppDetail'
        delete:
            tags: [ Applications ]
            parameters:
                -   $ref: '#/components/parameters/Key'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/EmptyObject'

    /api/applinth/application/{key}/authorize:
        get:
            description: 'If you want authorize OAuth App you must redirect to this endpoint.'
            tags: [ Applications ]
            parameters:
                -   $ref: '#/components/parameters/Key'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/EmptyObject'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/application/{key}/set-password:
        put:
            tags: [ Applications ]
            parameters:
                -   $ref: '#/components/parameters/Key'
            requestBody:
                description: ''
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AppPasswordInput'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AppDetail'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/application/{key}/change-state:
        put:
            tags: [ Applications ]
            parameters:
                -   $ref: '#/components/parameters/Key'
            requestBody:
                description: ''
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - enabled
                            properties:
                                enabled:
                                    type: boolean
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/EmptyObject'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/application/topologies/{topologyName}/nodes/{nodeName}/run-by-name:
        post:
            tags: [ Applications ]
            parameters:
                -   $ref: '#/components/parameters/TopologyName'
                -   $ref: '#/components/parameters/NodeName'
            requestBody:
                description: ''
                content:
                    application/json:
                        schema:
                            type: object
                            example: { key: val }
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/EmptyObject'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/logs:
        get:
            tags: [ Logs ]
            parameters:
                -   $ref: '#/components/parameters/Filter'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                allOf:
                                    -   $ref: '#/components/schemas/Grid'
                                    -   type: object
                                        properties:
                                            items:
                                                type: array
                                                items:
                                                    $ref: '#/components/schemas/LogObject'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/process/overview:
        get:
            tags: [ Process ]
            parameters:
                -   $ref: '#/components/parameters/Filter'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                allOf:
                                    -   $ref: '#/components/schemas/Grid'
                                    -   type: object
                                        properties:
                                            items:
                                                type: array
                                                items:
                                                    $ref: '#/components/schemas/ProcessObject'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/settings:
        get:
            tags: [ Settings ]
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AppDetail'
                500:
                    $ref: '#/components/responses/500'
        put:
            tags: [ Settings ]
            requestBody:
                description: ''
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AppSettingsInput'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AppDetail'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/settings/set-password:
        put:
            tags: [ Settings ]
            requestBody:
                description: ''
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AppPasswordInput'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AppDetail'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/settings/authorize:
        get:
            description: 'If you want authorize OAuth App you must redirect to this endpoint.'
            tags: [ Settings ]
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/EmptyObject'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/statistics/applications:
        get:
            tags: [ Statistics ]
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/StatisticsApplications'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/statistics/users:
        get:
            tags: [ Statistics ]
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/StatisticsUsers'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/statistics/applications/{application}:
        get:
            tags: [ Statistics ]
            parameters:
                -   $ref: '#/components/parameters/Application'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/StatisticsApplication'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/statistics/applications/application/{key}:
        get:
            tags: [ Statistics ]
            parameters:
                -   $ref: '#/components/parameters/Key'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    application:
                                        type: number
                400:
                    $ref: '#/components/responses/400'

    /api/applinth/statistics/applications/user/{user}:
        get:
            tags: [ Statistics ]
            parameters:
                -   $ref: '#/components/parameters/User'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    user:
                                        type: number
                400:
                    $ref: '#/components/responses/400'

    /api/applinth/trash:
        get:
            tags: [ Trash ]
            parameters:
                -   $ref: '#/components/parameters/Filter'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                allOf:
                                    -   $ref: '#/components/schemas/Grid'
                                    -   type: object
                                        properties:
                                            items:
                                                type: array
                                                items:
                                                    $ref: '#/components/schemas/TrashItemWithVersion'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/trash/{id}:
        get:
            tags: [ Trash ]
            parameters:
                -   $ref: '#/components/parameters/TrashId'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                allOf:
                                    -   $ref: '#/components/schemas/TrashItemWithVersion'
                500:
                    $ref: '#/components/responses/500'

        put:
            tags: [ Trash ]
            parameters:
                -   $ref: '#/components/parameters/TrashId'
            requestBody:
                description: ''
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - body
                                - headers
                            properties:
                                body:
                                    $ref: '#/components/schemas/EmptyJson'
                                headers:
                                    $ref: '#/components/schemas/EmptyJson'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                allOf:
                                    -   $ref: '#/components/schemas/TrashItem'
                                    -   type: object
                                        properties:
                                            auditLogs:
                                                type: string
                                            user:
                                                type: string
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/trash/{id}/accept:
        post:
            tags: [ Trash ]
            parameters:
                -   $ref: '#/components/parameters/TrashId'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/EmptyObject'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/trash/{id}/reject:
        post:
            tags: [ Trash ]
            parameters:
                -   $ref: '#/components/parameters/TrashId'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/EmptyObject'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/trash/accept:
        post:
            tags: [ Trash ]
            requestBody:
                description: ''
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TrashBatchInput'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/EmptyObject'
                500:
                    $ref: '#/components/responses/500'

    /api/applinth/trash/reject:
        post:
            tags: [ Trash ]
            requestBody:
                description: ''
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TrashBatchInput'
            responses:
                200:
                    description: ''
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/EmptyObject'
                500:
                    $ref: '#/components/responses/500'

components:
    responses:
        400:
            description: ''
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Message'
                    example:
                        type: ApplinthEception
                        status: INTERNAL_SERVER_ERROR
                        message: Something gone wrong
                        error_code: 400

        500:
            description: ''
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Message'
                    example:
                        type: ApplinthEception
                        status: INTERNAL_SERVER_ERROR
                        message: Something gone wrong
                        error_code: 500

    schemas:
        TrashBatchInput:
            type: object
            required:
                - ids
            properties:
                ids:
                    type: array
                    items:
                        type: integer
                    example: '[1, 2, 3]'

        TrashItem:
            type: object
            properties:
                correlationId:
                    type: string
                created:
                    type: string
                id:
                    type: string
                nodeId:
                    type: string
                nodeName:
                    type: string
                topologyId:
                    type: string
                topologyName:
                    type: string
                type:
                    type: string
                updated:
                    type: string

        TrashItemWithVersion:
            allOf:
                -   $ref: '#/components/schemas/TrashItem'
                -   type: object
                    properties:
                        topologyDeleted:
                            type: boolean
                        topologyDescr:
                            type: string
                        topologyVersion:
                            type: number

        Grid:
            type: object
            properties:
                filter:
                    $ref: '#/components/schemas/EmptyJson'
                paging:
                    type: object
                    properties:
                        itemsPerPage:
                            type: number
                        lastPage:
                            type: number
                        nextPage:
                            type: number
                        page:
                            type: number
                        previousPage:
                            type: number
                        total:
                            type: number
                search:
                    type: string
                sorter:
                    type: string

        Message:
            type: object
            properties:
                type:
                    type: string
                status:
                    type: string
                message:
                    type: string
                error_code:
                    type: integer

        Form:
            type: object
            properties:
                form_key:
                    type: object
                    properties:
                        key:
                            type: string
                            example: 'form_key'
                        publicName:
                            type: string
                        description:
                            type: string
                        readOnly:
                            type: boolean
                        fields:
                            type: array
                            items:
                                type: object
                                properties:
                                    type:
                                        type: string
                                        enum: [ text, number, url, password, selectbox, multiselect, checkbox ]
                                    key:
                                        type: string
                                    value:
                                        type: string
                                    label:
                                        type: string
                                    description:
                                        type: string
                                    required:
                                        type: boolean
                                    readOnly:
                                        type: boolean
                                    disabled:
                                        type: boolean
                                    choices:
                                        description: is used if field type === selectbox || multiselect
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                key:
                                                    type: string
                                                    example: 'value'

        BasicApp:
            type: object
            properties:
                name:
                    type: string
                authorization_type:
                    type: string
                    enum: [ basic, oauth, oauth2 ]
                application_type:
                    type: string
                    enum: [ cron, webhook ]
                key:
                    type: string
                description:
                    type: string
                info:
                    type: string
                logo:
                    type: string
                isInstallable:
                    type: boolean

        AppDetail:
            allOf:
                -   $ref: '#/components/schemas/BasicApp'
                -   type: object
                    properties:
                        isInstallable:
                            type: boolean
                        authorized:
                            type: boolean
                        enabled:
                            type: boolean
                        webhookSettings:
                            type: array
                            items:
                                type: object
                                properties:
                                    name:
                                        type: string
                                    topology:
                                        type: string
                                    default:
                                        type: boolean
                                    enabled:
                                        type: boolean
                        customActions:
                            type: array
                            items:
                                type: object
                                properties:
                                    name:
                                        type: string
                                    url:
                                        type: string
                                    action:
                                        type: string
                        host:
                            allOf:
                                -   $ref: '#/components/schemas/Host'
                        applicationSettings:
                            allOf:
                                -   $ref: '#/components/schemas/Form'

        AppInstall:
            type: object
            properties:
                id:
                    type: string
                user:
                    type: string
                key:
                    type: string
                enabled:
                    type: boolean
                deleted:
                    type: boolean
                authorized:
                    type: boolean
                created:
                    type: string
                update:
                    type: string
                expires:
                    type: string
                nonEncryptedSettings:
                    allOf:
                        -   $ref: '#/components/schemas/NonEncryptedSettings'

        NonEncryptedSettings:
            type: object
            example: { key: val }

        Host:
            type: string
            example: 'worker:80'

        AppSettingsInput:
            type: object
            properties:
                form_key:
                    type: object
                    properties:
                        field_key:
                            type: string
                            example: 'field_value'

        AppPasswordInput:
            type: object
            required:
                - password
                - formKey
                - fieldKey
            properties:
                password:
                    type: string
                formKey:
                    type: string
                fieldKey:
                    type: string

        EmptyObject:
            type: object
            example: { }

        EmptyJson:
            type: object
            example: '{}'

        LoggedUser:
            type: object
            properties:
                access_token:
                    type: string
                expires_in:
                    type: number

        LogObject:
            type: object
            properties:
                correlation_id:
                    type: string
                id:
                    type: string
                message:
                    type: string
                node_id:
                    type: string
                node_name:
                    type: string
                service:
                    type: string
                severity:
                    type: string
                timestamp:
                    type: string
                topology_id:
                    type: string
                topology_name:
                    type: string

        ProcessObject:
            type: object
            properties:
                correlationId:
                    type: string
                duration:
                    type: number
                failed:
                    type: string
                finished:
                    type: string
                id:
                    type: string
                name:
                    type: string
                nodesProcessed:
                    type: number
                nodesTotal:
                    type: number
                process:
                    type: string
                started:
                    type: string
                status:
                    type: string
                user:
                    type: string

        StatisticsApplication:
            type: object
            properties:
                _id:
                    type: string
                value:
                    type: object
                    properties:
                        users:
                            type: object
                            properties:
                                name:
                                    type: string
                                active:
                                    type: boolean

        StatisticsApplications:
            type: object
            properties:
                _id:
                    type: string
                value:
                    type: object
                    properties:
                        total_sum:
                            type: integer
                        non_expire_sum:
                            type: integer

        StatisticsUsers:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                user:
                    type: string
                nonEncryptedSettings:
                    allOf:
                        -   $ref: '#/components/schemas/NonEncryptedSettings'

    parameters:
        Scope:
            name: scope
            in: query
            allowEmptyValue: true
            schema:
                type: string
                enum: [ refresh_token ]

        Filter:
            name: filter
            in: query
            example: '{}'
            schema:
                type: string

        Application:
            name: application
            in: path
            required: true
            example: application
            schema:
                type: string

        User:
            name: user
            in: path
            required: true
            example: user
            schema:
                type: string

        Key:
            name: key
            in: path
            required: true
            example: key
            schema:
                type: string

        TrashId:
            name: id
            in: path
            required: true
            example: id
            schema:
                type: string

        TopologyName:
            name: topologyName
            in: path
            required: true
            example: topology
            schema:
                type: string

        NodeName:
            name: nodeName
            in: path
            required: true
            example: node
            schema:
                type: string

    securitySchemes:
        JWTAuth:
            type: apiKey
            in: header
            name: Authorization
            description: 'AccessToken returned from /login endpoint'

        JWSAuth:
            type: apiKey
            in: header
            name: Authorization
            description: 'JWS token generated form certificate.'
