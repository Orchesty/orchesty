openapi: 3.0.0

info:
    title: Applinth
    description: Applinth API
    version: '1.0'

servers:
    -   url: http://127.0.0.88
        description: Docker Localhost

paths:
    /:
        get:
            tags: [ Status ]
            responses:
                200:
                    $ref: '#/components/responses/Status'

    /api/statistics/applications:
        get:
            tags: [ Statistics ]
            responses:
                200:
                    $ref: '#/components/responses/ApplicationsStatistics'
                500:
                    $ref: '#/components/responses/500'

    /api/statistics/applications/{application}:
        get:
            tags: [ Statistics ]
            parameters:
                - $ref: '#/components/parameters/Application'
            responses:
                200:
                    $ref: '#/components/responses/ApplicationStatistics'
                500:
                    $ref: '#/components/responses/500'

    /api/statistics/applications/application/{key}:
        get:
            tags: [ Statistics ]
            parameters:
                - $ref: '#/components/parameters/Key'
            responses:
                200:
                    $ref: '#/components/responses/ApplicationStatistics'
                400:
                    $ref: '#/components/responses/400'

    /api/statistics/applications/user/{user}:
        get:
            tags: [ Statistics ]
            parameters:
                - $ref: '#/components/parameters/User'
            responses:
                200:
                    $ref: '#/components/responses/ApplicationStatistics'
                400:
                    $ref: '#/components/responses/400'

components:

    responses:
        Status:
            description: ''
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            name:
                                type: string
                            version:
                                type: string
                            status:
                                type: string

        ApplicationsStatistics:
            description: ''
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ApplicationsStatistics'

        ApplicationStatistics:
            description: ''
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ApplicationStatistics'

        400:
            description: ''
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Message'
                    example:
                        type: ApplinthEception
                        status: INTERNAL_SERVER_ERROR
                        message: Something gone wrong
                        error_code: 400

        500:
            description: ''
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Message'
                    example:
                        type: ApplinthEception
                        status: INTERNAL_SERVER_ERROR
                        message: Something gone wrong
                        error_code: 500

    schemas:
        ApplicationStatistics:
            type: object
            properties:
                items:
                    type: array
                    items:
                        type: object
                        properties:
                            _id:
                                type: string
                            value:
                                type: object
                                properties:
                                    users:
                                        type: object
                                        properties:
                                            name:
                                                type: string
                                            active:
                                                type: boolean

        ApplicationsStatistics:
            type: object
            properties:
                items:
                    type: array
                    items:
                        type: object
                        properties:
                            _id:
                                type: string
                            value:
                                type: object
                                properties:
                                    total_sum:
                                        type: integer
                                    non_expire_sum:
                                        type: integer

        Message:
            type: object
            properties:
                type:
                    type: string
                status:
                    type: string
                message:
                    type: string
                error_code:
                    type: integer

    parameters:
        Application:
            name: application
            in: path
            required: true
            example: application
            schema:
                type: string

        User:
            name: user
            in: path
            required: true
            example: user
            schema:
                type: string

        Key:
            name: key
            in: path
            required: true
            example: key
            schema:
                type: string