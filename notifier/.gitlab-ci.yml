.base-notifier:
  variables:
    DIR: notifier
    IMAGE: ${REGISTRY}/${IMAGE_PREFIX}notifier

notifier:test:
  stage: test
  extends:
    - .base-test
    - .base-notifier

notifier:build:
  stage: build
  needs:
    - job: notifier:test
      optional: false
  extends:
    - .base-dind-build
    - .base-notifier
