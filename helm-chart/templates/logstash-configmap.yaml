{{- $componentName := "logstash" -}}
{{- if .Values.global.logstash.enabled -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pipes.fullname" (dict "suffix" $componentName "root" .) }}
  labels:
{{ include "pipes.labels" . | indent 4 }}
data:
  logstash.conf: |
{{ .Files.Get "files/logstash.conf" | indent 4 }}
{{- end -}}
