---
{{- $componentName := "detector" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pipes.fullname" (dict "suffix" $componentName "root" .) }}
  labels:
{{ include "pipes.labels" . | indent 4 }}
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 6 }}
  template:
    metadata:
      labels:
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 8 }}
    spec:
{{ include "pipes.imagePullSecrets" . | indent 6 }}
      serviceAccountName: {{ include "pipes.fullname" (dict "suffix" $componentName "root" .) }}
      containers:
        - name: detector
          image: {{ include "pipes.imageFullname" (dict "image" $componentName "root" .) }}
          imagePullPolicy: Always
          env:
            {{- if .Values.global.monitoring.useInfluxDB }}
            - name: METRICS_DSN
              value: influxdb://kapacitor:9100
            {{- else }}
            - name: __MONGODB_AUTH_AND_HOSTS
              valueFrom:
                configMapKeyRef:
                  key: mongodb_auth_and_hosts
                  name: {{ include "pipes.fullname" (dict "suffix" "secrets" "root" .) }}
            - name: __METRICS_DB
              valueFrom:
                configMapKeyRef:
                  key: metrics_db
                  name: {{ include "pipes.fullname" (dict "suffix" "secrets" "root" .) }}
            - name: METRICS_DSN
              value: "mongodb://$(__MONGODB_AUTH_AND_HOSTS)/$(__METRICS_DB)?connectTimeoutMS=2500&serverSelectionTimeoutMS=2500&socketTimeoutMS=2500&heartbeatFrequencyMS=2500"
            {{- end }}
            - name: __RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  key: rabbitmq_host
                  name: {{ include "pipes.fullname" (dict "suffix" "secrets" "root" .) }}
            - name: RABBIT_HOST
              value: "http://$(__RABBITMQ_HOST):15672/"
            - name: PLATFORM
              value: k8s
            - name: RABBIT_VHOST  # probably not supported yet
              valueFrom:
                configMapKeyRef:
                  key: rabbitmq_vhost
                  name: {{ include "pipes.fullname" (dict "suffix" "secrets" "root" .) }}
            - name: RABBIT_USERNAME
              valueFrom:
                configMapKeyRef:
                  key: rabbitmq_user
                  name: {{ include "pipes.fullname" (dict "suffix" "secrets" "root" .) }}
            - name: RABBIT_PASSWORD
              valueFrom:
                configMapKeyRef:
                  key: rabbitmq_password
                  name: {{ include "pipes.fullname" (dict "suffix" "secrets" "root" .) }}
          resources:
{{ toYaml .Values.global.detector.resources | indent 12 }}

{{- with .Values.global.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.global.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
