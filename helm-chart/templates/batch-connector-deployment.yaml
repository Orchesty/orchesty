{{- $componentName := "batch-connector" -}}
{{- if .Values.global.batchConnector.enabled -}}
---
{{- if not .Values.global.imageOverrides.alpha_nodejssdk }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pipes.fullname" (dict "suffix" $componentName "root" .) }}
  labels:
{{ include "pipes.labels" . | indent 4 }}
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 4 }}
spec:
  replicas: {{ .Values.global.batchConnector.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 6 }}
  template:
    metadata:
      labels:
        timestamp: "{{ now | date "20060102150405" }}"
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 8 }}
    spec:
{{ include "pipes.imagePullSecrets" . | indent 6 }}
      containers:
        - name: php-w-nginx
          image: {{ include "pipes.imageFullname" (dict "image" "php-sdk" "root" .) }}
          imagePullPolicy: Always
          args: ["bin/console", "rabbit_mq:consumer:batch-connector"]
          env:
{{ include "pipes.monolithEnv" . | indent 12 }}
{{- range $name, $def := .Values.global.phpSdk.extraEnv }}
            - name: {{ $name }}
              {{- $def | toYaml | nindent 14}}
{{- end }}
          resources:
{{ toYaml .Values.global.batchConnector.resources | indent 12 }}

{{- with .Values.global.batchConnector.nodeSelector | default .Values.global.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.global.batchConnector.tolerations | default .Values.global.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}

{{- end }}

{{- end -}}
