{{- $componentName := "logstash" -}}
{{- if .Values.global.alpha_legacy }}
---
#
# this is a backward compatibility logstash-service (without release prefix)
#
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pipes.fullname" (dict "suffix" $componentName "noPrefix" true "root" .) }}
  labels:
{{ include "pipes.labels" . | indent 4 }}
spec:
  selector:
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 4 }}
  ports:
    - name: default
      protocol: TCP
      port: 9600
      targetPort: default
    - name: ingest-tcp
      protocol: TCP
      port: 5120
      targetPort: ingest-tcp
    - name: ingest-udp
      protocol: UDP
      port: 5120
      targetPort: ingest-udp

{{- end }}
