---
{{- $componentName := "limiter" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pipes.fullname" (dict "suffix" $componentName "root" .) }}
  labels:
{{ include "pipes.labels" . | indent 4 }}
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 6 }}
  template:
    metadata:
      labels:
{{ include "pipes.selectorLabels" (dict "suffix" $componentName "root" .) | indent 8 }}
    spec:
{{ include "pipes.imagePullSecrets" . | indent 6 }}
      containers:
        - name: {{ $componentName }}
          image: {{ include "pipes.imageFullname" (dict "image" "limiter" "root" .) }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3333
          env:
            - name: UDP_LOGGER_URL
              value: {{ include "pipes.fullname" (dict "suffix" "logstash" "root" .) }}:5120
            - name: LIMITER_ADDR
              value: "0.0.0.0:3333"
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  key: rabbitmq_host
                  name: {{ include "pipes.fullname" (dict "suffix" "secrets" "root" .) }}
            - name: RABBITMQ_USER
              valueFrom:
                configMapKeyRef:
                  key: rabbitmq_user
                  name: {{ include "pipes.fullname" (dict "suffix" "secrets" "root" .) }}
            - name: RABBITMQ_PASS
              valueFrom:
                configMapKeyRef:
                  key: rabbitmq_password
                  name: {{ include "pipes.fullname" (dict "suffix" "secrets" "root" .) }}
            - name: RABBITMQ_INPUT_QUEUE_PREFETCH_COUNT
              value: "500"
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  key: mongodb_auth_and_hosts
                  name: {{ include "pipes.fullname" (dict "suffix" "secrets" "root" .) }}
            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  key: mongodb_database
                  name: {{ include "pipes.fullname" (dict "suffix" "secrets" "root" .) }}
            - name: MONGO_COLLECTION
              value: LimiterMessages
            # todo: mongo auth, when limiter supports it
            - name: LOGSTASH_HOST
              value: logstash
            - name: LOGSTASH_PORT
              value: "5120"
            - name: LOG_LEVEL
              value: "info"
          resources:
{{ toYaml .Values.global.limiter.resources | indent 12 }}

{{- with .Values.global.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.global.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
