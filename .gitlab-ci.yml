git-pf-bundles:
    stage: stage4
    when: always
    only:
        - dev
        - master
        - ci
    script:
        - skip_unmodified pf-bundles
        - rm -rf _tmp_pipes_full
        - rm -rf _tmp_pipes
        - git clone -b ${CI_BUILD_REF_NAME} git@gitlab.hanaboso.net:pipes/pipes.git _tmp_pipes_full
        - git clone --bare git@gitlab.hanaboso.net:pipes/pipes.git _tmp_pipes
        - cd _tmp_pipes
        - git filter-branch -f --prune-empty --subdirectory-filter pf-bundles -- -q --all
        - git remote add dest git@gitlab.hanaboso.net:pipes/pf-bundles.git
        - git push --mirror dest
        - "[[ ${CI_BUILD_REF_NAME} == 'master' ]] && git push dest ${CI_BUILD_REF_NAME}:refs/tags/$(cat ../_tmp_pipes_full/pf-bundles/composer.json | grep version | grep -oE '[[:digit:]]+\\.[[:digit:]]+\\.[[:digit:]]+') || true"
        - "[[ ${CI_BUILD_REF_NAME} == 'dev' ]] && git push dest ${CI_BUILD_REF_NAME}:refs/tags/$(cat ../_tmp_pipes_full/pf-bundles/composer.json | grep version | grep -oE '[[:digit:]]+\\.[[:digit:]]+\\.[[:digit:]]+') || true"

