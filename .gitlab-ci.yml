stages:
  - stage1
  - stage2
  - stage3
  - cleanup

before_script:
  - . build/lib/gitlab-ci-helpers.sh
  - export REPO_ROOT=$(pwd)
  - eval $(ssh-agent)
  - ssh-add ~/.ssh/bob_the_builder_hanaboso

include:
  - local: '/portal/.gitlab-ci.yml'
  - local: '/website/.gitlab-ci.yml'

php-dev-image:
  stage: stage1
  script:
    - DIR=pf-bundles
    - cd $REPO_ROOT/$DIR
    - make build-dev
  only:
    - dev
    - master
    - ci

starting-point-dev-image:
  stage: stage1
  script:
    - DIR=starting-point
    - cd $DIR
    - make build-dev TAG=dev
  only:
    - dev
    - master

rabbitmq-telegraf-dev-image:
  stage: stage1
