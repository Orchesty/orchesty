    - DIR=rabbitmq-telegraf
    - cd $DIR
    - make build-dev-image
  only:
    - dev
    - master

lib-python-dev-build:
  stage: stage1
  script:
    - cd $REPO_ROOT/lib-python
    - make docker-push-dev-all
  only:
    - dev
    - master

njs-build-image:
  stage: stage1
  script:
    - cd $REPO_ROOT/frontend/docker/build
    - IMAGE=dkr.hanaboso.net/pipes/pipes/nodejs-build:${CI_BUILD_REF_NAME}
    - docker build -t ${IMAGE} .
    - docker push ${IMAGE}
    - IMAGE=hanabosocom/nodejs-build:${CI_BUILD_REF_NAME}
    - docker build -t ${IMAGE} .
    - docker push ${IMAGE}
