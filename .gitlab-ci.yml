# Client: demo
stage-demo:
    stage: stage5
    when: manual
    script:
        - cd clients/demo
        - make docker-compose.ci.yml
        - source <(../../build/bin/map-branch-image-tags.sh ./branch-image-tag-map ${CI_BUILD_REF_NAME} -e)
        - export DEPLOYMENT_PREFIX=demo
        - export PUBLISH_FE_HTTP_PORT=6539
        - export PUBLISH_BE_HTTP_PORT=14046
        - export PUBLISH_SP_HTTP_PORT=82
        - export BACKEND_URL=https://api-pipes-demo.stage.hanaboso.net
        - export FRONTEND_URL=https://pipes-demo.stage.hanaboso.net
        - export SP_URL=https://sp-pipes-demo.stage.hanaboso.net
        - export DOCKER_HOST=192.168.10.31:2376
        - export DOCKER_TLS_VERIFY=1
        - docker stack deploy --with-registry-auth -c docker-compose.ci.yml ${DEPLOYMENT_PREFIX}

cleanup:
    stage: cleanup
    when: always
    script:
        - ": TODO: we should do cleanups also in the end of every job that needs them,"
        - ":       this should be only the last resort when a job fails"

        - ": bundles"
        - cd $REPO_ROOT/pf-bundles
        - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-bundles
        - export COMPOSE_FILE=docker-compose.ci.yml
        - make ${COMPOSE_FILE} docker-down-clean || echo "bundles cleanup phase failed"

        - ": notification-sender"
        - cd $REPO_ROOT/notification-sender
        - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-notification-sender
        - export COMPOSE_FILE=docker-compose.ci.yml
        - make ${COMPOSE_FILE} docker-down-clean || echo "notification-sender cleanup phase failed"

        - ": app-store"
