stages:
  - stage1
  - stage2
  - stage3
  - cleanup

before_script:
  - . build/lib/gitlab-ci-helpers.sh
  - export REPO_ROOT=$(pwd)
  - export COMPOSE_PROJECT_NAME="p${CI_PIPELINE_ID}"
  - eval $(ssh-agent)
  - ssh-add ~/.ssh/bob_the_builder_hanaboso

php-dev-image:
  stage: stage1
  script:
    - DIR=pf-bundles/docker/php-dev
    - cd $REPO_ROOT/$DIR
    - IMAGE=dkr.hanaboso.net/pipes/pipes/php-dev:${CI_BUILD_REF_NAME}
    - docker pull dkr.hanaboso.net/hanaboso/symfony3-base:latest
    - docker build -t ${IMAGE} .
    - docker push ${IMAGE}
  only:
    - dev
    - master
    - ci

njs-build-image:
  stage: stage1
  script:
    - cd $REPO_ROOT/frontend/docker/build
    - IMAGE=dkr.hanaboso.net/pipes/pipes/nodejs-build:${CI_BUILD_REF_NAME}
    - docker build -t ${IMAGE} .
    - docker push ${IMAGE}
  only:
    - dev
    - master
    - ci

lib-sym3-test:
  stage: stage2
  script:
    - DIR=pf-bundles
    - skip_unmodified $DIR
    - ": TODO: modify this job to allow parallel execution!"
    - cd $REPO_ROOT/$DIR
    - make docker-up-force
    - make composer-install
    - make test

pf-bridge-test:
  stage: stage3
  script:
    - DIR=pf-bridge
    - skip_unmodified $DIR
    - ": TODO: modify this job to allow parallel execution!"
    - cd $REPO_ROOT/$DIR/test
    - export RABBITMQ_HOST=rabbitmq
    - export METRICS_HOST=influxdb
    - docker-compose up -d
    - docker-compose exec -T test npm run lint
    - docker-compose exec -T test npm test

frontend:
  stage: stage2
  script:
    - DIR=frontend
    - skip_unmodified $DIR
    - ${DIR}/docker/prod/build.sh ${CI_BUILD_REF_NAME}

pf-bridge:
  stage: stage2
  script:
    - DIR=pf-bridge
    - skip_unmodified $DIR
    - ${DIR}/build.sh ${CI_BUILD_REF_NAME}


# Client: demo

demo-stage:
  stage: stage3
  when: manual
  script:
    - rsync -a --delete --exclude '.git' ./ ~/pipes_demo
    - cd ~/pipes_demo/clients/demo
    - export COMPOSE_PROJECT_NAME=pipes_demo
    - export NPM_INSTALL="yes"
    - make ci-yml docker-pull-dev init-dev DEV_YML=docker-compose.ci.yml

# Client: Clever Monitor

cm-git:
  stage: stage1
  only:
    - dev
    - cm-git-test
  script:
    - ssh-add ~/.ssh/bob_the_builder_clevermon
    - clients/clever-connectors/bin/cm-git-sync.sh

###

cleanup:
  stage: cleanup
  when: always
  script:
    - cd $REPO_ROOT/pf-bundles
    - make docker-down-clean

    - cd $REPO_ROOT/pf-bridge/test
    - docker-compose down -v
