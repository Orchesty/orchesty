# Client: demo
stage-demo:
  stage: stage3
  when: manual
  script:
    - rsync -av --delete --exclude '.git' ./ ~/stage_demo
    - cd ~/stage_demo/clients/demo
    - export COMPOSE_PROJECT_NAME=stagedemo
    - export NPM_INSTALL="yes"
    - make docker-pull-dev init-dev DEV_YML=docker-compose.ci.yml
  script:
    - cd clients/demo
    - make docker-compose.ci.yml
    - source <(../../build/bin/map-branch-image-tags.sh ./branch-image-tag-map ${CI_BUILD_REF_NAME} -e)
    - export DEPLOYMENT_PREFIX=demo
    - export PUBLISH_HTTP_PORT=6539
    - export BACKEND_URL=https://pipes-demo.stage.hanaboso.net
    - export DOCKER_HOST=192.168.10.31:2376
    - export DOCKER_TLS_VERIFY=1
    - docker stack deploy --with-registry-auth -c docker-compose.ci.yml ${DEPLOYMENT_PREFIX}

monolith-demo:
  stage: stage2
  script:
    - ": This job is being run all the time because the most changes happen in its dependencies. Can anyone come up with an optimization?"
    - cd clients/demo
    - make build-monolith push-monolith TAG=${CI_BUILD_REF_NAME}
  only:
    - dev
    - master

git-pf-bundles:
  stage: stage3
  when: always
  only:
    - dev
    - master
    - pf-bundle-export
  script:
    - skip_unmodified pf-bundles
    - rm -rf _tmp_pipes_full
    - rm -rf _tmp_pipes
    - git clone -b ${CI_BUILD_REF_NAME} git@gitlab.hanaboso.net:pipes/pipes.git _tmp_pipes_full
    - git clone --bare git@gitlab.hanaboso.net:pipes/pipes.git _tmp_pipes
    - cd _tmp_pipes
    - git filter-branch -f --prune-empty --subdirectory-filter pf-bundles -- -q --all
    - git remote add dest git@gitlab.hanaboso.net:pipes/pf-bundles.git
    - git push --mirror dest
    - "[[ ${CI_BUILD_REF_NAME} == 'master' ]] && git push dest ${CI_BUILD_REF_NAME}:refs/tags/$(cat ../_tmp_pipes_full/pf-bundles/composer.json | grep version | grep -oE '[[:digit:]]\\.[[:digit:]]\\.[[:digit:]]') || true"

