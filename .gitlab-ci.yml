stages:
  - stage1
  - stage2
  - stage3
  - cleanup

before_script:
  - . build/lib/gitlab-ci-helpers.sh
  - export REPO_ROOT=$(pwd)
  - eval $(ssh-agent)
  - ssh-add ~/.ssh/bob_the_builder_hanaboso

php-dev-image:
  stage: stage1
  script:
    - DIR=pf-bundles/docker/php-dev
    - cd $REPO_ROOT/$DIR
    - IMAGE=dkr.hanaboso.net/pipes/pipes/php-dev:${CI_BUILD_REF_NAME}
    - docker pull dkr.hanaboso.net/hanaboso/symfony3-base:latest
    - docker build -t ${IMAGE} .
    - docker push ${IMAGE}
  only:
    - dev
    - master
    - ci

njs-build-image:
  stage: stage1
  script:
    - cd $REPO_ROOT/frontend/docker/build
    - IMAGE=dkr.hanaboso.net/pipes/pipes/nodejs-build:${CI_BUILD_REF_NAME}
    - docker build -t ${IMAGE} .
    - docker push ${IMAGE}
  only:
    - dev
    - master
    - ci

multi-probe-image:
  stage: stage1
  script:
    - cd $REPO_ROOT/go/src/hanaboso.com/multi-probe
    - IMAGE=dkr.hanaboso.net/pipes/pipes/multi-probe:${CI_BUILD_REF_NAME}
    - cd ../ && docker build -t ${IMAGE} -f ./multi-probe/Dockerfile .
    - docker push ${IMAGE}
  only:
    - dev
    - master
    - ci

limiter-image:
  stage: stage1
  script:
    - cd $REPO_ROOT/go/src/hanaboso.com/limiter
    - IMAGE=dkr.hanaboso.net/pipes/pipes/limiter:${CI_BUILD_REF_NAME}
    - cd ../ && docker build -t ${IMAGE} -f ./limiter/Dockerfile .
    - docker push ${IMAGE}
  only:
    - dev
    - master

limiter-test:
  stage: stage2
  script:
    - DIR=go/src/hanaboso.com/limiter
    - skip_unmodified $DIR
    - cd $REPO_ROOT/$DIR
    - export COMPOSE_PROJECT_NAME="p${CI_PIPELINE_ID}-go"
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} ci-test

pf-bundles-test:
  stage: stage2
  script:
    - DIR=pf-bundles
    - skip_unmodified $DIR
    - cd $REPO_ROOT/$DIR
    - export COMPOSE_PROJECT_NAME="p${CI_PIPELINE_ID}-bundles" # CLEANUP bundles
    - export COMPOSE_FILE=docker-compose.ci.yml                # CLEANUP bundles
    - make ${COMPOSE_FILE} docker-up-force composer-install test

pf-bridge-test:
  stage: stage3
  script:
    - DIR=pf-bridge
    - skip_unmodified $DIR
    - cd $REPO_ROOT/$DIR/test
    - export COMPOSE_PROJECT_NAME="p${CI_PIPELINE_ID}-bridge"  # CLEANUP bridge
    - export RABBITMQ_HOST=rabbitmq
    - export METRICS_HOST=influxdb
    - docker-compose up -d
    - docker-compose exec -T test npm run lint
    - docker-compose exec -T test bash -c 'apt-get update && apt-get install -y netcat'
    - docker-compose exec -T test bash -c 'while ! nc -z rabbitmq 5672; do sleep 1; done'
    - docker-compose exec -T test npm test

frontend:
  stage: stage2
  script:
    - DIR=frontend
    - skip_unmodified $DIR
    - cd $DIR
    - make build image push TAG=${CI_BUILD_REF_NAME}

pf-bridge:
  stage: stage2
  script:
    - DIR=pf-bridge
    - skip_unmodified $DIR
    - ${DIR}/build.sh ${CI_BUILD_REF_NAME}


# Client: demo

stage-demo:
  stage: stage3
  when: manual
  script:
    - rsync -av --delete --exclude '.git' ./ ~/stage_demo
    - cd ~/stage_demo/clients/demo
    - export COMPOSE_PROJECT_NAME=stagedemo
    - export NPM_INSTALL="yes"
    - make docker-pull-dev init-dev DEV_YML=docker-compose.ci.yml


# Client: Clever Monitor

monolith-cm:
  stage: stage2
  script:
    - ": This job is being run all the time because the most changes happen in its dependencies. Can anyone come up with an optimization?"
    - cd clients/clever-connectors
    - make build-monolith-fpm push-monolith-fpm TAG=${CI_BUILD_REF_NAME}

stage-cm:
  stage: stage3
  when: manual
  script:
    - rsync -av --delete --exclude 'clients/clever-connectors/pipes-api/var/secret' --exclude 'clients/clever-connectors/cc-api-demo/cert/' --exclude '.git' ./ ~/stage_cm
    - cd ~/stage_cm/clients/clever-connectors
    - export COMPOSE_PROJECT_NAME=stagecm
    - export NPM_INSTALL="yes"
    - make docker-compose.ci.yml init-dev DEV_YML=docker-compose.ci.yml

git-cm:
  stage: stage3
  only:
    - dev
    - cm-git-test
  script:
    - ssh-add ~/.ssh/bob_the_builder_clevermon
    - clients/clever-connectors/bin/cm-git-sync.sh

###

cleanup:
  stage: cleanup
  when: always
  script:
    - ": TODO: we should do cleanups also in the end of every job that needs them,"
    - ":       this shhould be only the last resort when a job fails"

    - ": bundles"
    - cd $REPO_ROOT/pf-bundles
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-bundles
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} docker-down-clean || echo "bundles cleanup phase failed"

    - ": bridge"
    - cd $REPO_ROOT/pf-bridge/test
    - export COMPOSE_FILE=docker-compose.yml
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-bridge
    - docker-compose down -v || echo "bridge cleanup phase failed"
