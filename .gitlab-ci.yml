.base-topology-api:
  variables:
    DIR: topology-generator
    IMAGE: ${REGISTRY}/${IMAGE_PREFIX}topology-api

topology-api:test:
  stage: test
  extends:
    - .base-test
    - .base-topology-api

topology-api:build:
  stage: build
  needs:
    - job: topology-api:test
      optional: false
  extends:
    - .base-dind-build
    - .base-topology-api
