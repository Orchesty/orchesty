stages:
  - stage1
  - stage2
  - stage3
  - cleanup

before_script:
  - . build/lib/gitlab-ci-helpers.sh
  - export REPO_ROOT=$(pwd)
  - eval $(ssh-agent)
  - ssh-add ~/.ssh/bob_the_builder_hanaboso

php-dev-image:
  stage: stage1
  script:
    - DIR=pf-bundles/docker/php-dev
    - cd $REPO_ROOT/$DIR
    - IMAGE=dkr.hanaboso.net/pipes/pipes/php-dev:${CI_BUILD_REF_NAME}
    - docker pull dkr.hanaboso.net/hanaboso/symfony3-base:php-7.3
    - docker build -t ${IMAGE} .
    - docker push ${IMAGE}
  only:
    - dev
    - master
    - ci

starting-point-dev-image:
  stage: stage1
  script:
    - DIR=go/src/hanaboso/starting-point
    - cd $DIR
    - make build-dev-image
  only:
    - dev
    - master

njs-build-image:
  stage: stage1
  script:
    - cd $REPO_ROOT/frontend/docker/build
    - IMAGE=dkr.hanaboso.net/pipes/pipes/nodejs-build:${CI_BUILD_REF_NAME}
    - docker build -t ${IMAGE} .
    - docker push ${IMAGE}
  only:
    - dev
    - master
    - ci

multi-probe-image:
  stage: stage1
  script:
    - cd $REPO_ROOT/go/src/hanaboso/multi-probe
    - IMAGE=dkr.hanaboso.net/pipes/pipes/multi-probe:${CI_BUILD_REF_NAME}
    - cd ../ && docker build -t ${IMAGE} -f ./multi-probe/Dockerfile .
    - docker push ${IMAGE}
  only:
    - dev
    - master
    - ci

logstash-build:
    stage: stage1
    script:
      - cd $REPO_ROOT/logstash
      - make docker-build docker-push
    only:
      - dev
      - master

influxdb-build:
    stage: stage1
    script:
      - cd $REPO_ROOT/influxdb
      - make docker-build docker-push
    only:
      - dev
      - master

kapacitor-build:
    stage: stage1
    script:
      - cd $REPO_ROOT/kapacitor
      - make docker-build docker-push
    only:
      - dev
      - master

topology-api:
  stage: stage1
  script:
    - cd go/src/hanaboso/topologygenerator && make docker-push
  only:
    - dev
    - master

pf-bridge:
  stage: stage1
  script:
    - DIR=pf-bridge
    - skip_unmodified $DIR
    - ${DIR}/build.sh ${CI_BUILD_REF_NAME}
  only:
    - dev
    - master

# GO LANG
.go_test: &go_test
  script:
    - skip_unmodified $DIR
    - cd $REPO_ROOT/$DIR
    - export COMPOSE_PROJECT_NAME="${CI_JOB_NAME}_${CI_PIPELINE_ID}"
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} ci-test

multi-probe-test:
  <<: *go_test
  variables:
    DIR: go/src/hanaboso/multi-probe
  stage: stage2

utils-test:
  <<: *go_test
  variables:
    DIR: go/src/hanaboso/utils
  stage: stage2

topology-generator-test:
  <<: *go_test
  variables:
    DIR: go/src/hanaboso/topologygenerator
  stage: stage2

pf-bundles-test:
  stage: stage2
  script:
    - DIR=pf-bundles
    - skip_unmodified $DIR
    - cd $REPO_ROOT/$DIR
    - export COMPOSE_PROJECT_NAME="p${CI_PIPELINE_ID}-bundles" # CLEANUP bundles
    - export COMPOSE_FILE=docker-compose.ci.yml                # CLEANUP bundles
    - make ${COMPOSE_FILE} docker-up-force composer-install test

demo-pipes-api-test:
  stage: stage2
  script:
    - DIR=clients/demo/pipes-api
    - skip_unmodified $DIR
    - cd $REPO_ROOT/$DIR
    - export COMPOSE_PROJECT_NAME="p${CI_PIPELINE_ID}-demo-pipes-api" # CLEANUP bundles
    - export COMPOSE_FILE=docker-compose.ci.yml                       # CLEANUP bundles
    - make ${COMPOSE_FILE} test

pf-bridge-test:
  stage: stage2
  script:
    - DIR=pf-bridge
    - skip_unmodified $DIR
    - cd $REPO_ROOT/$DIR/test
    - export COMPOSE_PROJECT_NAME="p${CI_PIPELINE_ID}-bridge"  # CLEANUP bridge
    - export RABBITMQ_HOST=rabbitmq
    - export METRICS_HOST=influxdb
    - docker-compose up -d
    - docker-compose exec -T test npm run lint
    - docker-compose exec -T test bash -c 'while ! nc -z rabbitmq 5672; do sleep 1; done'
    - docker-compose exec -T test npm test

frontend:
  stage: stage2
  script:
    - DIR=frontend
    - skip_unmodified $DIR
    - cd $DIR
    - make build image push TAG=${CI_BUILD_REF_NAME}
  only:
    - dev
    - master

starting-point:
  stage: stage2
  script:
    - DIR=go/src/hanaboso/starting-point
    - skip_unmodified $DIR
    - cd $DIR
    - make build-image push TAG=${CI_BUILD_REF_NAME}
  only:
    - dev
    - master

# Client: demo
stage-demo:
  stage: stage3
  when: manual
  script:
    - rsync -av --delete --exclude '.git' ./ ~/stage_demo
    - cd ~/stage_demo/clients/demo
    - export COMPOSE_PROJECT_NAME=stagedemo
    - export NPM_INSTALL="yes"
    - make docker-pull-dev init-dev DEV_YML=docker-compose.ci.yml
  script:
    - cd clients/demo
    - make docker-compose.ci.yml
    - source <(../../build/bin/map-branch-image-tags.sh ./branch-image-tag-map ${CI_BUILD_REF_NAME} -e)
    - export DEPLOYMENT_PREFIX=demo
    - export PUBLISH_HTTP_PORT=6539
    - export BACKEND_URL=https://pipes-demo.stage.hanaboso.net
    - export DOCKER_HOST=192.168.10.31:2376
    - export DOCKER_TLS_VERIFY=1
    - docker stack deploy --with-registry-auth -c docker-compose.ci.yml ${DEPLOYMENT_PREFIX}


# Client: Clever Monitor
monolith-demo:
  stage: stage2
  script:
    - ": This job is being run all the time because the most changes happen in its dependencies. Can anyone come up with an optimization?"
    - cd clients/demo
    - make build-monolith push-monolith TAG=${CI_BUILD_REF_NAME}
  only:
    - dev
    - master

stage-ranger2:
  stage: stage3
  when: manual
  script:
    - cd clients/ranger
    - make docker-compose.ci.yml
    - source <(../../build/bin/map-branch-image-tags.sh ./branch-image-tag-map ${CI_BUILD_REF_NAME} -e)
    - export DEPLOYMENT_PREFIX=cm-ranger2
    - export PUBLISH_HTTP_PORT=6543
    - export PUBLISH_HTTP_PORT_UI=6544
    - export BACKEND_URL=https://cm-ranger2.stage.hanaboso.net
    - export DOCKER_HOST=192.168.10.31:2376
    - export DOCKER_TLS_VERIFY=1
    - export EXTERNAL_NETWORK=cc-stage2_default
    - docker stack deploy --with-registry-auth -c docker-compose.ci.yml ${DEPLOYMENT_PREFIX}

git-pf-bundles:
  stage: stage3
  when: always
  only:
    - dev
    - master
    - pf-bundle-export
  script:
    - skip_unmodified pf-bundles
    - rm -rf _tmp_pipes
    - git clone --bare git@gitlab.hanaboso.net:pipes/pipes.git _tmp_pipes
    - cd _tmp_pipes
    - git filter-branch -f --prune-empty --subdirectory-filter pf-bundles -- -q --all
    - git remote add dest git@gitlab.hanaboso.net:pipes/pf-bundles.git
    - git push --mirror dest

cleanup:
  stage: cleanup
  when: always
  script:
    - ": TODO: we should do cleanups also in the end of every job that needs them,"
    - ":       this shhould be only the last resort when a job fails"

    - ": bundles"
    - cd $REPO_ROOT/pf-bundles
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-bundles
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} docker-down-clean || echo "bundles cleanup phase failed"

    - ": demo-pipes-api-test"
    - cd $REPO_ROOT/clients/demo/pipes-api
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-demo-pipes-api
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} docker-down-clean || echo "demo-pipes-api cleanup phase failed"

    - ": bridge"
    - cd $REPO_ROOT/pf-bridge/test
    - export COMPOSE_FILE=docker-compose.yml
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-bridge
    - docker-compose down -v || echo "bridge cleanup phase failed"

    - ": multi-probe"
    - cd $REPO_ROOT/go/src/hanaboso/multi-probe
    - export COMPOSE_PROJECT_NAME="multi-probe-test_${CI_PIPELINE_ID}"
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE}
    - docker-compose down -v || echo "multi-probe cleanup phase failed"

    - ": utils"
    - cd $REPO_ROOT/go/src/hanaboso/utils
    - export COMPOSE_PROJECT_NAME="utils-test_${CI_PIPELINE_ID}"
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE}
    - docker-compose down -v || echo "utils cleanup phase failed"

    - ": topology generator"
    - cd $REPO_ROOT/go/src/hanaboso/topologygenerator
    - export COMPOSE_PROJECT_NAME="topology-generator-test_${CI_PIPELINE_ID}"
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE}
    - docker-compose down -v || echo "topology generator cleanup phase failed"
