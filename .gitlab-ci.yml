cleanup:
  stage: cleanup
  when: always
  script:
    - ": TODO: we should do cleanups also in the end of every job that needs them,"
    - ":       this should be only the last resort when a job fails"

    - ": bundles"
    - cd $REPO_ROOT/pf-bundles
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-bundles
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} docker-down-clean || echo "bundles cleanup phase failed"

    - ": notification-sender"
    - cd $REPO_ROOT/notification-sender
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-notification-sender
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} docker-down-clean || echo "notification-sender cleanup phase failed"

    - ": app-store"
    - cd $REPO_ROOT/app-store
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-app-store
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} docker-down-clean || echo "app-store cleanup phase failed"

    - ": pipes-php-sdk"
    - cd $REPO_ROOT/pipes-php-sdk
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-pipes-php-sdk
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} docker-down-clean || echo "pipes-php-sdk cleanup phase failed"

    - ": pipes-connectors"
    - cd $REPO_ROOT/pipes-connectors
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-pipes-connectors
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} docker-down-clean || echo "pipes-connectors cleanup phase failed"

    - ": rabbitmq-telegraf"
    - cd $REPO_ROOT/rabbitmq-telegraf
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-rabbitmq-telegraf
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} docker-down-clean || echo "rabbitmq-telegraf cleanup phase failed"

    - ": demo-pipes-api-test"
    - cd $REPO_ROOT/clients/demo/pipes-api
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-demo-pipes-api
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} docker-down-clean || echo "demo-pipes-api cleanup phase failed"

    - ": bridge"
    - cd $REPO_ROOT/pf-bridge/test
    - export COMPOSE_FILE=docker-compose.yml
    - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-bridge
    - docker-compose down -v || echo "bridge cleanup phase failed"

    - ": multi-probe"
    - cd $REPO_ROOT/multi-probe
    - export COMPOSE_PROJECT_NAME="multi-probe-test_${CI_PIPELINE_ID}"
    - export COMPOSE_FILE=docker-compose.ci.yml
    - docker-compose down -v || echo "multi-probe cleanup phase failed"

    - ": limiter"
    - cd $REPO_ROOT/limiter
    - export COMPOSE_PROJECT_NAME="limiter-test_${CI_PIPELINE_ID}"
    - export COMPOSE_FILE=docker-compose.ci.yml
    - docker-compose down -v || echo "limiter cleanup phase failed"

    - ": topology generator"
    - cd $REPO_ROOT/topology-generator
    - export COMPOSE_PROJECT_NAME="topology-generator-test_${CI_PIPELINE_ID}"
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE}
    - docker-compose down -v || echo "topology generator cleanup phase failed"

    - ": starting point"
    - cd $REPO_ROOT/starting-point
    - export COMPOSE_PROJECT_NAME="starting-point-test_${CI_PIPELINE_ID}"
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE}
    - docker-compose down -v || echo "starting point cleanup phase failed"
