pf-bridge:
  stage: stage1
  script:
    - DIR=pf-bridge
    - skip_unmodified $DIR
    - ${DIR}/build.sh ${CI_BUILD_REF_NAME}
  only:
    - dev
    - master

# GO LANG
.go_test: &go_test
  script:
    - skip_unmodified $DIR
    - cd $REPO_ROOT/$DIR
    - export COMPOSE_PROJECT_NAME="${CI_JOB_NAME}_${CI_PIPELINE_ID}"
    - export COMPOSE_FILE=docker-compose.ci.yml
    - make ${COMPOSE_FILE} ci-test

multi-probe-test:
  <<: *go_test
  variables:
    DIR: multi-probe
  stage: stage2

limiter-test:
  <<: *go_test
  variables:
    DIR: limiter
  stage: stage2

topology-generator-test:
  <<: *go_test
  variables:
   DIR: topology-generator
  stage: stage2

pf-bundles-test:
  stage: stage2
  script:
    - DIR=pf-bundles
    - skip_unmodified $DIR
    - cd $REPO_ROOT/$DIR
    - export COMPOSE_PROJECT_NAME="p${CI_PIPELINE_ID}-bundles" # CLEANUP bundles
    - export COMPOSE_FILE=docker-compose.ci.yml                # CLEANUP bundles
    - make ${COMPOSE_FILE} test docker-down-clean

