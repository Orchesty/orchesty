pf-bridge-test:
  stage: stage2
  script:
    - DIR=pf-bridge
    - skip_unmodified $DIR
    - cd $REPO_ROOT/$DIR/test
    - export COMPOSE_PROJECT_NAME="p${CI_PIPELINE_ID}-bridge"  # CLEANUP bridge
    - export RABBITMQ_HOST=rabbitmq
    - export METRICS_HOST=influxdb
    - docker-compose pull
    - docker-compose up -d
    - docker-compose exec -T test npm run lint
    - docker-compose exec -T test sh -c 'while [ $(curl -s -o /dev/null -w "%{http_code}" http://guest:guest@rabbitmq:15672/api/overview) == 000 ]; do sleep 1; done'
    - docker-compose exec -T test npm run testunit
    - docker-compose exec -T test npm run testintegration

frontend:
  stage: stage2
  script:
    - DIR=frontend
    - skip_unmodified $DIR
