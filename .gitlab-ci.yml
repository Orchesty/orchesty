        - export COMPOSE_PROJECT_NAME="rabbitmq-telegraf-test_${CI_PIPELINE_ID}"
        - export COMPOSE_FILE=docker-compose.ci.yml
        - make ${COMPOSE_FILE} docker-down-clean || echo "rabbitmq-telegraf cleanup phase failed"

        - ": demo-pipes-api-test"
