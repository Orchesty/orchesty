# GO LANG
.go_test: &go_test
    script:
        - skip_unmodified $DIR
        - cd $REPO_ROOT/$DIR
        - export COMPOSE_PROJECT_NAME="${CI_JOB_NAME}_${CI_PIPELINE_ID}"
        - export COMPOSE_FILE=docker-compose.ci.yml
        - make ${COMPOSE_FILE} ci-test

cron-test:
