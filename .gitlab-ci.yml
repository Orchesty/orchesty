stages:
    - stage1 # pre-build
    - stage2 # tests
    - stage3 # builds
    - stage4 # git-clone
    - stage5 # deploy
    - cleanup

before_script:
    - . build/lib/gitlab-ci-helpers.sh
    - export REPO_ROOT=$(pwd)
    - eval $(ssh-agent)
    - ssh-add ~/.ssh/bob_the_builder_hanaboso

include:
    -   local: '/portal/.gitlab-ci.yml'
    -   local: '/website/.gitlab-ci.yml'

swagger-build:
    stage: stage1
    script:
        - DIR=swagger
        - skip_unmodified $DIR
        - cd $DIR
        - make build TAG=${CI_BUILD_REF_NAME}
    only:
        - dev
        - master
        - ci

lib-python-dev-build:
    stage: stage1
    script:
        - cd $REPO_ROOT/lib-python
        - make docker-push-dev-all
    only:
        - dev
        - master
        - ci

njs-build-image:
    stage: stage1
