        - export COMPOSE_FILE=docker-compose.yml
        - export COMPOSE_PROJECT_NAME=p${CI_PIPELINE_ID}-bridge
        - make docker-down-clean || echo "bridge cleanup phase failed"

        - ": multi-probe"
        - cd $REPO_ROOT/multi-probe
        - export COMPOSE_PROJECT_NAME="multi-probe-test_${CI_PIPELINE_ID}"
        - export COMPOSE_FILE=docker-compose.ci.yml
        - docker-compose down -v || echo "multi-probe cleanup phase failed"

        - ": limiter"
        - cd $REPO_ROOT/limiter
        - export COMPOSE_PROJECT_NAME="limiter-test_${CI_PIPELINE_ID}"
        - export COMPOSE_FILE=docker-compose.ci.yml
        - docker-compose down -v || echo "limiter cleanup phase failed"

        - ": topology generator"
        - cd $REPO_ROOT/topology-generator
        - export COMPOSE_PROJECT_NAME="topology-generator-test_${CI_PIPELINE_ID}"
        - export COMPOSE_FILE=docker-compose.ci.yml
        - make ${COMPOSE_FILE}
        - docker-compose down -v || echo "topology generator cleanup phase failed"

        - ": starting point"
        - cd $REPO_ROOT/starting-point
        - export COMPOSE_PROJECT_NAME="starting-point-test_${CI_PIPELINE_ID}"
        - export COMPOSE_FILE=docker-compose.ci.yml
        - make ${COMPOSE_FILE}
        - docker-compose down -v || echo "starting point cleanup phase failed"
