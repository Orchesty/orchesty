stages:
  - prepare
  - build
  - test
  - review
  - deploy
  - release
  - rel-x.y.z
  - rel-x.y

variables:
  REGISTRY: "dkr.hanaboso.net/pipes/pipes"
  REGISTRY_RELEASE: "index.docker.io/orchesty"
  IMAGE_PREFIX: ""
  FORCE_PIPELINE:
    description: Force running pipeline for a subset of components or ALL of them
    value: ""

  DEPLOY_DEMO_VERSION:
    description: Enter version [x.y.z] to deploy it to the demo environment.
    value: ""

  _BANNED_RUN_ALL_SHA: "0000000000000000000000000000000000000000"

default:
  interruptible: true

workflow:
  rules:
    # Don't run pipeline on first brach commit
    # Prevents triggering all jobs depending on `rules:changes:` with every new branch
    - if: '$CI_COMMIT_BEFORE_SHA == $_BANNED_RUN_ALL_SHA && $FORCE_PIPELINE == ""' # && $CI_COMMIT_REF_NAME !~ "^v[0-9]+\.[0-9]+\.[0-9]+$"'
      when: never
    - when: always


.base-dind:
  image: docker:20.10.11-alpine3.14

  variables:
    #DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_CERTDIR: ""
    #DOCKER_CERT_PATH: "${DOCKER_TLS_CERTDIR}/client"
    #DOCKER_TLS_VERIFY: 1
    DOCKER_DRIVER: overlay2

  services:
    - docker:20.10.11-dind-alpine3.14

  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY --username $CI_REGISTRY_USER --password-stdin

  tags:
    - dind

collect-tags:
  stage: prepare
  image:
    name: alpine/git:latest
    entrypoint: ["sh", "-c"]

  script:
    - export TAG_APPLINTH_MARKETPLACE_UI=$(git log -1 --pretty=%h --abbrev=8 ./applinth-marketplace-ui)
    - export TAG_BACKEND=$(git log -1 --pretty=%h --abbrev=8 ./pf-bundles)
    - export TAG_BRIDGE=$(git log -1 --pretty=%h --abbrev=8 ./bridge)
    - export TAG_COUNTER=$(git log -1 --pretty=%h --abbrev=8 ./counter)
    - export TAG_CRON=$(git log -1 --pretty=%h --abbrev=8 ./cron)
    - export TAG_DETECTOR=$(git log -1 --pretty=%h --abbrev=8 ./detector)
    - export TAG_FRONTEND=$(git log -1 --pretty=%h --abbrev=8 ./app-ui)
    - export TAG_KAPACITOR=$(git log -1 --pretty=%h --abbrev=8 ./kapacitor)
    - export TAG_LIMITER=$(git log -1 --pretty=%h --abbrev=8 ./limiter)
    - export TAG_LOGSTASH=$(git log -1 --pretty=%h --abbrev=8 ./logstash)
    - export TAG_NOTIFICATION_SENDER=$(git log -1 --pretty=%h --abbrev=8 ./notification-sender)
    - export TAG_PF_BRIDGE=$(git log -1 --pretty=%h --abbrev=8 ./pf-bridge)
    - export TAG_STARTING_POINT=$(git log -1 --pretty=%h --abbrev=8 ./starting-point)
    - export TAG_STATUS_SERVICE=$(git log -1 --pretty=%h --abbrev=8 ./status-service)
    - export TAG_TOPOLOGY_API=$(git log -1 --pretty=%h --abbrev=8 ./topology-generator)

    - env | grep ^TAG_ | sed 's/.*/export &/' > export_tags
    - cat export_tags

  artifacts:
    expire_in: 1 month
    paths:
      - ./export_tags

  tags:
    - docker
