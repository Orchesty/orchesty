openapi: 3.0.0

info:
    title: Portal
    description: Portal API
    version: '1.0'

servers:
    -   url: http://127.0.0.88
        description: Docker Localhost

paths:
    /:
        get:
            tags: [ Status ]
            responses:
                200:
                    $ref: '#/components/responses/Status'

    /installer:
        post:
            tags: [ Portal ]
            requestBody:
                $ref: '#/components/requestBodies/Installer'
            responses:
                200:
                    $ref: '#/components/responses/Installer'
                500:
                    $ref: '#/components/responses/500'

components:
    requestBodies:
        Installer:
            description: ''
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            logs:
                                type: string
                                enum: [elasticsearch, logstash]
                            metrics:
                                type: string
                                enum: [influxdb, mongo]
                            database:
                                type: boolean

    responses:
        Status:
            description: ''
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            name:
                                type: string
                            version:
                                type: string
                            status:
                                type: string

        Installer:
            description: ''
            content:
                text/plain:
                    schema:
                        type: string
                        format: text

        500:
            description: ''
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Message'
                    example:
                        type: InstallerException
                        status: INTERNAL_SERVER_ERROR
                        message: Something gone wrong
                        error_code: 500

    schemas:
        Message:
            type: object
            properties:
                type:
                    type: string
                status:
                    type: string
                message:
                    type: string
                error_code:
                    type: integer
