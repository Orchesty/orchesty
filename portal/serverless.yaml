service: pipes-portal-api

provider:
    name: aws
    region: eu-west-1
    stage: stage
    runtime: provided
    environment:
        # Symfony environment variables
        APP_ENV: serverless
        APP_DEBUG: false

Globals:
    Function:
        Environment:
            Variables:
                APP_ENV: serverless
                APP_DEBUG: false

plugins:
    - ./vendor/bref/bref

package:
    exclude:
        - tests/**

functions:
    website:
        handler: public/index.php
        timeout: 28 # in seconds (API Gateway has a timeout of 29 seconds)
        layers:
            - ${bref:layer.php-74-fpm}
        events:
            -   http: 'ANY /'
            -   http: 'ANY /{proxy+}'
    console:
        handler: bin/console
        timeout: 120 # in seconds
        layers:
            - ${bref:layer.php-74} # PHP
            - ${bref:layer.console} # The "console" layer
